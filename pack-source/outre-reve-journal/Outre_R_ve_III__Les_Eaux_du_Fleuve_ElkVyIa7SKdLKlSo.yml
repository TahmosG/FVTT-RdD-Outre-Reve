      content: "<table class=\"MsoTableGrid\" border=\"1\" style=\"border-collapse:collapse;mso-table-layout-alt:fixed;border:none;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;mso-yfti-tbllook:1184;mso-padding-alt:0in 5.4pt 0in 5.4pt;mso-border-insideh:.5pt solid gray;mso-border-insideh-themecolor:background1;mso-border-insideh-themeshade:128;mso-border-insidev:.5pt solid gray;mso-border-insidev-themecolor:background1;mso-border-insidev-themeshade:128\"><tbody><tr style=\"mso-yfti-irow:0;mso-yfti-firstrow:yes\"><td style=\"width:305.75pt;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"247\"><p><span lang=\"FR\" style=\"font-weight:normal;mso-bidi-font-weight:bold\"><strong>[CEF] </strong></span><span lang=\"FR\"><strong>La Carte des Eaux du Fleuve</strong></span></p></td><td style=\"width:229.5pt;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;border-left:none;mso-border-left-alt:solid gray .5pt;mso-border-left-themecolor:background1;mso-border-left-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"580\"><p class=\"MsoNormal\" style=\"line-height:normal;tab-stops:53.3pt\"><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Access</span></span></span><span style=\"font-family:'Calibri',sans-serif\"> : </span><span style=\"mso-tab-count:1\"><span style=\"font-family:'Calibri',sans-serif\">\_\_\_\_\_\_ </span></span><span style=\"font-family:'Calibri',sans-serif\">Imago ou Case Humide </span><span style=\"color:#A6A6A6;mso-themecolor:background1;mso-themeshade:166\"><span style=\"font-family:'Calibri',sans-serif\">(TMR)</span></span></p><p class=\"MsoNormal\" style=\"margin-right:-5.95pt;line-height:normal;tab-stops:53.1pt\"><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Fatigue</span></span></span><span style=\"font-family:'Calibri',sans-serif\"> : </span><span style=\"mso-tab-count:1\"><span style=\"font-family:'Calibri',sans-serif\">\_\_\_\_ </span></span><span style=\"font-family:'Calibri',sans-serif\">-1f par déplacement </span><span style=\"color:#A6A6A6;mso-themecolor:background1;mso-themeshade:166\"><span style=\"font-family:'Calibri',sans-serif\">(effet immédiat)</span></span></p><p class=\"MsoNormal\" style=\"margin-right:-5.95pt;line-height:normal;tab-stops:53.1pt\"><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Rencontre</span></span></span><span style=\"font-family:'Calibri',sans-serif\"> : 1d</span><sup><span style=\"font-family:'Calibri',sans-serif\">dr</span></sup><span style=\"font-family:'Calibri',sans-serif\"> par round </span><span style=\"color:#A6A6A6;mso-themecolor:background1;mso-themeshade:166\"><span style=\"font-family:'Calibri',sans-serif\">(probabilité selon climat)</span></span></p></td></tr><tr style=\"mso-yfti-irow:1;mso-yfti-lastrow:yes\"><td colspan=\"2\" style=\"width:535.25pt;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;border-top:none;mso-border-top-alt:solid gray .5pt;mso-border-top-themecolor:background1;mso-border-top-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"247,580\"><p class=\"MsoNormal\" style=\"margin-top:6.0pt;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:12.35pt;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt;text-align:center\"><span style=\"font-family:'Calibri',sans-serif\">Tel les Sorts en TMR,<strong> la CEF permet de lancer et de mettre en réserve des Actions</strong>, selon le type de case.</span></p><p class=\"MsoNormal\" style=\"margin-top:6.0pt;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Prérequis</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: Seul un Arpenteur (créature ayant acquis la Tête de Dragon @UUID[Compendium.a-perte-de-reve.arpenter-le-fleuve.Item.KMC7r4DHKU2StPC6]{Don d'Arpenter le Fleuve}) est capable d’accéder aux CEF.</span><span style=\"mso-spacerun:yes\"><span style=\"font-family:'Calibri',sans-serif\">\_ </span></span><span style=\"font-family:'Calibri',sans-serif\">L’accès aux CEF peut se faire en remontant le Fleuve, via le Fleuve en TMR.. ou potentiellement d'autre moyens mysterieux.</span></p><p class=\"MsoNormal\" style=\"margin-top:6.0pt;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Access aux CEF</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: Selon sa dernière descente, l’Arpenteur est lié soit à son <strong>Imago</strong>, soit à son <strong>Demi-Rêve</strong></span></p><p class=\"BulletCxSpFirst\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1;tab-stops:363.35pt\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span lang=\"FR\">Depuis les <strong>TMR </strong>: via case humide\_(sans combattre le Fleuve)<em>\_;</em></span><span style=\"color:gray;mso-themecolor:background1;mso-themeshade:128\"><em> -1f\_; Jet de rencontre en CEF</em></span></p><p class=\"BulletCxSpLast\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1;tab-stops:336.35pt\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\">Depuis les <strong>TBR</strong> : si dernièrement lié à son Imago\_; </span><span style=\"color:gray;mso-themecolor:background1;mso-themeshade:128\"><em>-1r et -1f\_; Jet de rencontre en CEF</em></span></p><p class=\"MsoNormal\" style=\"margin-top:0in;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">En CEF</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: Les voyages en CEF suivent les règles suivantes</span></p><p class=\"BulletCxSpFirst\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\">Toute action est instantanée, y compris les rencontres et dérives </span><span style=\"color:#A6A6A6;mso-themecolor:background1;mso-themeshade:166\">(ne prend pas de temps dans les TBR)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\">Toute fatigue s’applique</span><span style=\"mso-spacerun:yes\">\_ </span>instantanément <span style=\"color:#A6A6A6;mso-themecolor:background1;mso-themeshade:166\">(y compris celle cumulée en TMR)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\">Tout round nécessite un jet de rencontre </span><span style=\"color:#A6A6A6;mso-themecolor:background1;mso-themeshade:166\">(selon terrain et climat, même si immobile)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\">Tout déplacement coute 1f ; pas de fatigue tant que l’on reste sur la même case</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\">Les cases humides sont à Maitriser par <strong>rêve actuel/Arpentage</strong> OU <strong>Draconique</strong> </span><span lang=\"FR\" style=\"font-size:10.0pt;color:#A6A6A6;mso-themecolor:background1;mso-themeshade:166\">(à -7 comme en TMR)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span lang=\"FR\" style=\"font-size:10.0pt\">Vaincu avec l’Arpentage, le niveau du climat régresse d’autant de niveau que la réussite au jet de Maitrise.</span></p><p class=\"MsoNormal\" style=\"margin-top:0in;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Climat</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: Le climat en CEF fluctue selon les actions et rencontres de l’Arpenteur. Il perdure au fil de ses passages.</span></p><p class=\"BulletCxSpFirst\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span lang=\"FR\">L’Arpenteur peut rétrograder le climat en <strong>vainquant le Fleuve avec la compétence d’Arpentage</strong></span></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\">Une fois le niveau maximum atteint (Crue), le climat est réinitialisé à Beau Fixe à la fin de la prochaine HN.</span></p><img src=\"worlds/fdj/assets/pages/ElkVyIa7SKdLKlSo-pages-D3cYMdvYNwf7bv5m-image-GY0H2Q78nZoKQMkw.png\" /><p class=\"MsoNormal\" style=\"margin-top:6.0pt;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Rencontres</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: Les probabiltes de rencontres, ainsi que leur types dependent du Climat et de la case en question. Cfr. @UUID[.OkNptzbmgG77WDUc]{Rencontres en CEF}</span></p><p class=\"MsoNormal\" style=\"margin-top:6.0pt;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Mise en Réserve</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: il est possible de mettre en réserve des actions en CEF, pour déclenchement ultérieurs (à la qualité en réserve). Chaque type de case étant compatible avec un certain type d'action (ex. compétences générales, action de combat, Connaissance…) Selon son niveau, l'Arpenteur peut mettre plusieurs actions (du même type) dans la meme case. Cfr. @UUID[.h1yeD5emXiR2G9Qv]{Reserves en CEF}</span></p><p class=\"MsoNormal\" style=\"margin-top:6.0pt;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Jumelage</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: A tout moment, un Arpenteur Haut-Rêvant peut basculer de la CEF vers sa case jumelle en TMR</span></p><p class=\"BulletCxSpFirst\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span lang=\"FR\">Pas de cout mais jet de Rencontre en TMR (et combattre le Fleuve si besoin)</span></p><p class=\"BulletCxSpLast\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\">Les règles de TMR s’appliquent normalement (cumulation de fatigue, -1r supplémentaire si voyage rapide)</span></p><p></p><blockquote><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Le jumelage permet à l'Outre-Rêvant en CEF</span></strong></span> de</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span>Mettre en réserve un sort dans la case jumelée en TMR</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span>Déclencher un sort mis en réserve dans la case jumelée en TMR</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span>Déclencher un sort lanceable dans la case jumelée en TMR</p></blockquote><p></p><hr /><p></p><p class=\"MsoNormal\" style=\"margin-top:6.0pt;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Case Central</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: Escalader le pic rocheux coute <strong>20 points de fatigue</strong>… pour se retrouver face au gardien de la caverne, une gigantesque Chimère !</span></p><p></p><p class=\"MsoNormal\" style=\"margin-top:6.0pt;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Notes</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_1 : Ce système étant expérimental, des modifications sont à prévoir au fil</span><span style=\"mso-spacerun:yes\"><span style=\"font-family:'Calibri',sans-serif\">\_</span></span><span style=\"font-family:'Calibri',sans-serif\">des voyages…</span></p><p class=\"MsoNormal\" style=\"margin-top:6.0pt;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Notes</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_2 : remonter le fleuve (en TMR) est ardu et la flux du fleuve s’inverse durant le jour et la nuit.</span></p><p></p><p class=\"MsoNormal\" style=\"margin-top:3.0pt;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\"><em>– Source : Notre cher Gardien des Rêves, <strong>Alain Gurniki</strong> (experimenté et retranscrit par votre devoué Outre-Revant Philibert l’Accidenteur)</em></span></p></td></tr></tbody></table>"
