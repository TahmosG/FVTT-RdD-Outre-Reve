    image: {}
    text:
      format: 1
      content: "<p><span lang=\"EN-GB\">Les chances de rencontre dépendent du Climat et, réciproquement, chacune influe le climat.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Le climat empirant, les chances de rencontres s’accroit (</span><span lang=\"FR\" style=\"font-size:10.0pt\">cfr. colonne </span><span lang=\"FR\">d</span><sup><span lang=\"FR\">dr</span></sup><span lang=\"FR\">), de même que la gravite de celles-ci - Les types de rencontre trop tempérée sont à retirer </span><span lang=\"FR\" style=\"font-size:10.0pt;color:#A6A6A6;mso-themecolor:background1;mso-themeshade:166\"><em>(ex. en ‘Brume’, les deux 1</em></span><sup><span lang=\"FR\" style=\"font-size:10.0pt;color:#A6A6A6;mso-themecolor:background1;mso-themeshade:166\"><em>er</em></span></sup><span lang=\"FR\" style=\"font-size:10.0pt;color:#A6A6A6;mso-themecolor:background1;mso-themeshade:166\"><em> types sont à relancer)</em></span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span>Toute rencontre est à maitriser par rêve actuel / Arpentage OU Draconique - à moins qu’elle ne soit physique<span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\"> </span></span><span lang=\"FR\" style=\"font-size:9.0pt\">\_</span></p><img src=\"worlds/fdj/assets/pages/ElkVyIa7SKdLKlSo-pages-OkNptzbmgG77WDUc-image-evXPEFp9KwptlGXk.png\" /><p>Les <strong>ECNI</strong> (épaves) vaincues avec la compétence d’Arpentage peuvent être contrôlées au lieu d’être détruites\_:</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span>Elles restent attachées à l’Arpenteur pour la durée de son voyage sur la CEF uniquement</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span>Elles peuvent être lancées sur une autre ECNI ou rencontre afin d’esquiver un duel psychique. Elles sont alors perdues.</p>"
