    text:
      format: 1
      content: "<h3><span style=\"font-family:'Calibri',sans-serif\">Types de Cases</span></h3><p><span style=\"font-family:'Calibri',sans-serif\">Chaque type de case permet de mettre en réserve un certain type d’action</span></p><img src=\"worlds/fdj/assets/pages/ElkVyIa7SKdLKlSo-pages-h1yeD5emXiR2G9Qv-image-y1rUJx18oCmp1DJB.png\" /><p></p><h3>Fonctionement</h3><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">1 <strong>pt de seuil</strong> pour débloquer une case CEF </span>(récupéré librement en passant sur la case si aucune action en réserve)</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">1 <strong>Profondeur</strong> disponible par point positif en </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Arpenter le Fleuve</span></span> (minimum 1)</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">1 <strong>Action</strong> peut être mise en réserve </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">par Profondeur</span></span>\_<span lang=\"FR\" style=\"font-size:10.0pt\">:</span></p><p class=\"BulletCxSpFirst\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\"> · </span></span>En cas d’attaques multiples par round (Combat à 2 armes, Part. en rapidité...) Max 3 attaques sur la même <strong>Profondeur</strong></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\"> ·\_</span></span>Une action peut être instantanée (ex. esquive) ou longue (ex. cuisine), tant qu’elle n’exige qu’un seul jet de compétence.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span>Les Action/Sort mis en réserve ne sont pas déclenchés automatiquement lors du passage de l’Arpenteur sur cette case</p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\"> ·</span><span style=\"font-family:'Courier New'\"> </span></span><span lang=\"FR\">Action/sort mise en réserve sur la CEF : pas de remontée dans les Basses Terres.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\"> ·</span><span style=\"font-family:'Courier New'\"> </span></span><span lang=\"FR\">Action/sort déclenché sur la CEF : remontée automatique dans les Basses Terres.</span></p><h3>Mise en Réserve</h3><p><span style=\"font-family:'Calibri',sans-serif\">Jet fixe de <strong>rêve actuel / -0</strong> pour commencer à mettre une ou des actions en réserve.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Chaque action est mise en réserve à <strong>2r x niveau de réussite</strong> (1r pour un échec)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_1</span></span> Action/sort mis en réserve par round -même pour actions multiples mises en réserve dans la même Profondeur - <span lang=\"FR\"><strong>sauf les Part. en rapidité</strong> (</span><span lang=\"FR\" style=\"font-size:9.0pt\">mise en réserve ensemble au même round</span><span lang=\"FR\">).</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Action/sort peuvent </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">ne pas</span></span> être mis en réserve mais être <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">déclenchés sur l’instant</span></strong></span>, provoquant ainsi la remontée immédiate de l’Arpenteur dans les Basses Terres.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span>Possibilité de mettre en réserve plusieurs jets d’une même compétence, afin de réaliser, de retour dans les Basses Terres, une action exigeant ce même nombre de jets. Tous les jets mis en réserve doivent</p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">  ·\_</span></span>être sur des profondeurs successives (sans intercaler, sur profondeur séparée, d’autre action d’un autre type)</p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.3pt;mso-add-space:auto;text-indent:-13.7pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\"> ·</span></span>\_être réalisés, dans les Basses Terres, successivement sans interruption, effectuant donc complètement l’action en question en une seule fois (ex. lire tout un livre d’une traite).</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">L’expérience d’une particulière n’est gagnée que lors son déclenchent dans les Basses Terres.</span></p><p></p><h3>Déclenchement</h3><p><span style=\"font-family:'Calibri',sans-serif\">Sur une case où plusieurs actions sont mises en réserve, l’Arpenteur peut déclencher soit</span><span style=\"mso-spacerun:yes\"><span style=\"font-family:'Calibri',sans-serif\"> </span></span><span style=\"font-family:'Calibri',sans-serif\"><strong>une action</strong> (celle de la première profondeur), soit <strong>toutes les actions</strong>, mais pas un nombre arbitraire d’actions.</span></p><p class=\"BulletCxSpFirst\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.1pt;mso-add-space:auto;text-indent:-13.5pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span lang=\"FR\">1 action déclenchée par round dans les Basses Terres à la remontée <em>(sauf Attaques multiples dans la même Profondeur : Combat à deux armes, Arme &amp; Bouclier, particulière en rapidité...).</em></span></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:70.5pt;mso-add-space:auto;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_\_ </span></span><span lang=\"FR\"><strong>Sort déclenché</strong>\_: arrive le premier round puis les autres actions les rounds suivants à leurs phases d’initiative respectives.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:70.5pt;mso-add-space:auto;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_\_ </span></span><span lang=\"FR\"><strong>Action déclenchée</strong>\_: gagne automatiquement l’initiative lors du déclenchement. Les rounds suivants, l’initiative des actions déclenchées doit être tirée à la phase qui les concerne.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.1pt;mso-add-space:auto;text-indent:-13.5pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span lang=\"FR\">Une action est réalisée dans les Basses Terres au <strong>niveau de difficulté établ</strong>i lors de sa ‘création’ sur la CEF. Si ce niveau n’est pas suffisant pour être un succès, l’action est déclenchée mais échoue.</span></p><p class=\"BulletCxSpLast\" style=\"margin-top:0in;margin-right:7.9pt;margin-bottom:6.0pt;margin-left:35.1pt;mso-add-space:auto;text-indent:-13.5pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\">Toute altération dans le flot des actions en TBR interrompt immédiatement la séquence en cours.</span></p>"
