    text:
      format: 1
      content: "<table class=\"MsoTableGrid\" border=\"1\" style=\"border-collapse:collapse;mso-table-layout-alt:fixed;border:none;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;mso-yfti-tbllook:1184;mso-padding-alt:0in 5.4pt 0in 5.4pt;mso-border-insideh:.5pt solid gray;mso-border-insideh-themecolor:background1;mso-border-insideh-themeshade:128;mso-border-insidev:.5pt solid gray;mso-border-insidev-themecolor:background1;mso-border-insidev-themeshade:128\"><tbody><tr style=\"mso-yfti-irow:0;mso-yfti-firstrow:yes\"><td style=\"width:314.75pt;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"354\"><p class=\"MsoNormal\" style=\"line-height:normal\"><span style=\"font-family:'Calibri',sans-serif\">[Arpentage -5] <strong style=\"mso-bidi-font-weight:normal\">Rouvrir une déchirure</strong></span></p></td><td style=\"width:94.5pt;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;border-left:none;mso-border-left-alt:solid gray .5pt;mso-border-left-themecolor:background1;mso-border-left-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"107\"><p class=\"MsoNormal\" style=\"line-height:normal;text-align:center\"><span style=\"font-family:'Calibri',sans-serif\"><strong style=\"mso-bidi-font-weight:normal\">R-var\_; r-</strong><strong style=\"mso-bidi-font-weight:normal\">var</strong></span></p></td><td style=\"width:1.5in;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;border-left:none;mso-border-left-alt:solid gray .5pt;mso-border-left-themecolor:background1;mso-border-left-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"158\"><p><span style=\"text-decoration:underline\">Portée</span> : 10m</p><p><span style=\"text-decoration:underline\">Durée</span> : \_5 ronds</p></td></tr><tr style=\"mso-yfti-irow:1;mso-yfti-lastrow:yes\"><td colspan=\"3\" style=\"width:517.25pt;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;border-top:none;mso-border-top-alt:solid gray .5pt;mso-border-top-themecolor:background1;mso-border-top-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"354,107,158\"><h3>Effet</h3><p>Permt de rouvrir une ancienne déchirure, précédemment localisee par @UUID[.VR5nULWGfyIi60uB]{[Arpentage -5] Localiser la trace d’une déchirure refermée}</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Une déchirure bleue rouverte mènera au lieu auquel elle était initialement connectée, au point exact où elle aboutissait. Si ce lieu n’existe plus, la déchirure ne peut être rouverte.</span></p><h3>Fonctionement</h3><p><span lang=\"FR\">Nécessite un jet de pts actuels de rêve avec compétence Arpenter le Fleuve/–Difficulté</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Une déchirure ainsi rouverte ne conserve aucune de ses propriétés précédentes (durée prolongée, piège, blocage, …)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">La déchirure rouverte ne peut se voir attribuer aucune nouvelle propriété et peut seulement être rouverte pour 5 rounds.</span></p><p>– <span style=\"text-decoration:underline\">Difficulté</span> : niveau de la déchirure + niveau de réussite supérieur à celui du créateur</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Une déchirure créée avec une réussite particulière n’est donc pas re-ouvrable</span></p><p>– <span style=\"text-decoration:underline\">Coût</span> : pts actuels de rêve nécessaires à la création initiale de la déchirure souhaitée (voire règles plus haut) <strong>+ 1 pt de Seuil</strong> de Rêve (non récupéré à dissipation de la déchirure rouverte).</p><p></p><p><span style=\"font-family:Calibri, sans-serif\">– </span><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);text-decoration:underline\"><span style=\"font-family:Calibri, sans-serif\"><span style=\"text-decoration:underline\">Niveau minimum requis</span></span></span><span style=\"font-family:Calibri, sans-serif\">\_: -5 en compétence d'Arpentage</span></p><p class=\"MsoNormal\" style=\"margin-top:6.0pt;margin-right:2.9pt;margin-bottom:.0001pt;margin-left:.3in;text-indent:-9.35pt;line-height:normal;tab-stops:48.8pt\"><span style=\"font-family:'Calibri',sans-serif\">\_</span></p></td></tr></tbody></table>"
