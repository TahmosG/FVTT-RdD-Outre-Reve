      content: "<blockquote><p>La Compétence d' \"<strong>Arpenter le Fleuve</strong>\", malgrés quelques vague réfèrence dans de vieilles légendes gnomes, semble avoir été oubliée du commun des Rêvants… sauf quelques rares Arpenteurs, qui dénomment cette pratique par le simple sobriquet \"<strong>Arpentage</strong>\"</p></blockquote><p></p><p><span lang=\"FR\" style=\"font-size:16.0pt\"><span style=\"text-decoration:underline\">L'</span><strong><span style=\"text-decoration:underline\">Arpentage </span></strong><span style=\"text-decoration:underline\">est la Faculté de </span><strong><span style=\"text-decoration:underline\">contrôler les déchirures bleues</span></strong></span></p><p>Ce type de déchirures a pour qualité d’ouvrir sur le même rêve et d'être à double-sens. Il est églement possible qu’une déchirure bleue ouvre directement sur ce « lieu » que l’on nomme « le Fleuve ».<br /></p><h3>Progression</h3><p>Le principe du Fleuve entretient une relation assez distendue de ceux du Rêve et de l’Archétype. Ainsi, cette compétence évolue indépendamment de tout score d’Archétype</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Cette compétence se développe comme une <strong>Connaissance</strong> (-11 au départ)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">La progression provient <strong>uniquement avec l’expérience</strong> (la pratique et l’entrainement),</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Tous les points d’expérience gagnés en cas de particulière vont intégralement à la compétence et aucun à la caractéristique Rêve. (Pareillement, Exaltation et Dissolution n’impactent pas cette Comp.)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Limitation\_<strong>: </strong>L’Arpenteur ne peut gagner plus de niveaux que </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">1 par jour</span></span>, <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">5 par semaine</span></span>, <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">10 par mois</span></span>.</p><p class=\"BulletCxSpMiddle\" style=\"mso-list:l0 level1 lfo1\"><span lang=\"FR\"><strong>Apprentissage </strong>: avec un maitre à temps plein </span><span style=\"color:gray;mso-themecolor:background1;mso-themeshade:128\">(cfr. p77 du manuel.)\_</span>Permet également l’acquisition d’aptitudes spéciales pour cette compétence, pour un coût en XP distinct pour chaque aptitude.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o </span></span><span lang=\"FR\">Un Arpenteur peut acquérir ses niveaux dans la compétence par le biais de l’Apprentissage mais, la progression est beaucoup plus lente que par l'entraînement solitaire (car en Gris-Rêve)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Tout niveau en compétence d’Arpentage acquis avec un maître permet d’acquérir gratuitement une aptitude accessible à l’élève (selon son niveau au début de l’Apprentissage)</span></p><p class=\"BulletCxSpLast\" style=\"margin-bottom:0in;mso-add-space:auto;mso-list:l0 level1 lfo1\"><span lang=\"FR\"><strong>Entrainement\_Solitaire</strong> : consiste à exercer son aptitude en disciplinant son Rêve et sa concentration et en canalisant sur le tissu onirique sa capacité à en déformer et à en altérer la trame. L’Arpenteur doit procéder sans aller systématiquement jusqu’à l’ouverture effective de déchirures, ceci pour éviter une dépense trop importante de pts actuels de rêve durant l’entrainement.</span><span style=\"mso-spacerun:yes\">\_ </span><em>(pas de niv. Max)</em></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o </span></span><span lang=\"EN-GB\"><strong>Coût</strong>\_: l’Arpenteur décide du nombre de points de rêve à dépenser (max 5r/H, garantissant +1XP)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o </span></span><span lang=\"EN-GB\"><strong>Difficulté</strong>\_: jet sous le % de </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">rêve initial</span></span> (=<strong>r/-8</strong>) au début de l’heure d’entrainement</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o </span></span><span lang=\"EN-GB\"><strong>Durée</strong>\_: </span>1 heure (soit 1/2H Draconique, tel la Méditation)</p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o </span></span><span lang=\"EN-GB\"><strong>Gain\_</strong>: chaque point dépensé octroie un jet --&gt; +1XP par succès\_; minimum +1XP si 5r depensé</span></p><p></p><h3>Aptitudes Spéciales</h3><p><span lang=\"EN-GB\">Toute aptitude spéciale coute 5xp et nécessite un maitre </span><span style=\"color:gray;mso-themecolor:background1;mso-themeshade:128\">(Cfr. Apprentissage, page 77)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Les aptitudes ont un niveau minimum requis pour pouvoir être apprises par un Arpenteur.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Utiliser le niveau actuel de l’Arpenteur quand il commence son apprentissage pour « niveau visé ».</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Il est plus facile d’acquérir une aptitude lorsque l’on est peu expérimenté que lorsque l’on a trop de bouteille. (l’apprentissage rapportant plus d’expérience a bas niveau)</span></p><p></p><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Exemples connus</span></span>:</p><p class=\"BulletCxSpMiddle\" style=\"mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span lang=\"FR\"><strong>Arpentage -11</strong>\_: Ouvrir des Déchirures Bleues &gt;&gt; </span><span style=\"font-family:CaslonAntique\">l'Aptitude la plus sommaire, que tout Arpenteur obtient avec son Don </span></p><p class=\"BulletCxSpMiddle\" style=\"mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\"><strong>Arpentage -5</strong>\_: Localiser la trace d’une Déchirure Bleue déjà fermée</span></p><p class=\"BulletCxSpMiddle\" style=\"mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\"><strong>Arpentage -5</strong>\_: Réouvrir une Déchirure Bleue</span></p><p class=\"BulletCxSpMiddle\" style=\"mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·\_</span></span><span lang=\"FR\"><strong>Arpentage\_???</strong>\_: ??? Cette voie reserve bien des surprises à découvrir !</span></p><section class=\"secret\" id=\"secret-ahlm1etgXAmNJWxn\"><blockquote><p>NOTE DE DEV: creation de \"Sorts\" pour substituer ces aptitudes Speciales</p><p>--&gt; Sorts en voie d'Arpenteur</p></blockquote></section><p></p><h3>Fonctionement de l'Arpentage</h3><p><span style=\"font-family:CaslonAntique\">Pour utiliser une de ses Aptitudes Speciales, l'Arpenteur doit effectuer un jet de Rêve Actuel couplé avec son score en compétence d'Arpentage, modifié par la difficulté de l'action:</span></p><blockquote style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 10px;padding:0px 0px 0px 20px;border-left:3px solid var(--color-border-light-tertiary);font-style:italic;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-align:justify;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px\"><span style=\"font-family:CaslonAntique\"><em style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);font-style:normal\">==&gt;</em> <em style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);font-style:normal\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">Rêve Actuel / Arpentage - Difficulté</strong></em></span></p></blockquote><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:justify\"></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:justify\"><span style=\"font-family:CaslonAntique\">La <strong><span style=\"text-decoration:underline\">Difficulté</span></strong> dépend de l'Aptitude en question, mais tient généralement compte de</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span>Distance et valeur émotionelle de la destination</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span>Qualité de la cible ou du support utilisé</p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;min-height:1rem;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:justify\"></p><h3 data-anchor=\"echecs\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:1rem 0px 0.5rem;padding:0px;font-weight:bold;font-size:1.25em;border-bottom:1px solid var(--color-underline-header);color:rgb(25, 24, 19);font-family:CaslonAntique;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:1px;orphans:2;text-align:justify;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><span style=\"font-family:CaslonAntique\"><strong>Echecs</strong></span></h3><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:justify\"><span lang=\"EN-GB\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:CaslonAntique\">Tout jet d’Arpenter le Fleuve ne peut être tenté à nouveau, s’il est manqué, que le jour d’après.</span></span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">Echec normal</strong>\_: pas de dépense de points de rêve\_; pas d’ouverture de déchirure</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">Echec Total</strong>\_: dépense des points de rêve prévus mais pas des points de Seuil. Par ailleurs, selon jet de Chance, un </span><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);text-decoration:underline\"><span style=\"text-decoration:underline\">effet inattendu</span></span> se produit, lié soit à l’ouverture d’une déchirure aléatoire (jaune, mauve ou bleue)\_; soit à une sérieuse altération du point d’arrivée de la déchirure bleue créée.</p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;min-height:1rem;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:justify\"></p><h3 data-anchor=\"notion-de-«-lieu-»\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:1rem 0px 0.5rem;padding:0px;font-weight:bold;font-size:1.25em;border-bottom:1px solid var(--color-underline-header);color:rgb(25, 24, 19);font-family:CaslonAntique;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:1px;orphans:2;text-align:justify;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><span style=\"font-family:CaslonAntique\"><strong>Notion de « lieu »</strong></span></h3><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:justify\"><span style=\"font-family:CaslonAntique\">On considère comme un lieu unique et distinct tout endroit offrant une certaine continuité géographique et des traits propres, soit par l’aspect, la valeur émotionnelle, soit encore par ce qui y a été vécu ou la période de voyage (le scénario) auquel il se rattache.</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span>Dans les cas typiquement ambivalents des pièces d’une même maisons, des appartements d’un même immeuble, des parties d’une même forêt ou encore des portions d’une même route, l’Arpenteur doit, pour tenter de les traiter comme des lieux différents, pouvoir les distinguer par un trait propre, par exemple des vécus suffisamment distincts et/ou éloignés dans le temps, des épisodes ou événements suffisamment dissociés les uns des autres.</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span>Des tentatives d’<span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);text-decoration:underline\"><span style=\"text-decoration:underline\">Arpentage répétées vers des points aux </span><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"text-decoration:underline\">identités ambivalentes</span></strong></span> peuvent se voir attribuer une <span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);text-decoration:underline\"><span style=\"text-decoration:underline\">difficulté supplémentaire de </span><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"text-decoration:underline\">-3 cumulée</span></strong></span> à chaque tentative.</p>"
