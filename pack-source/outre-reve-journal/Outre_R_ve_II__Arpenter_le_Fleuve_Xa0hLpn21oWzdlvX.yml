    text:
      format: 1
      content: "<table class=\"MsoTableGrid\" border=\"1\" style=\"border-collapse:collapse;mso-table-layout-alt:fixed;border:none;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;mso-yfti-tbllook:1184;mso-padding-alt:0in 5.4pt 0in 5.4pt;mso-border-insideh:.5pt solid gray;mso-border-insideh-themecolor:background1;mso-border-insideh-themeshade:128;mso-border-insidev:.5pt solid gray;mso-border-insidev-themecolor:background1;mso-border-insidev-themeshade:128\"><tbody><tr style=\"mso-yfti-irow:0;mso-yfti-firstrow:yes\"><td style=\"width:382.25pt;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"424\"><p class=\"MsoNormal\" style=\"line-height:normal\"><span style=\"font-family:'Calibri',sans-serif\">[Arpentage -5] <strong style=\"mso-bidi-font-weight:normal\">Localiser la trace d’une déchirure refermée</strong></span></p></td><td style=\"width:31.5pt;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;border-left:none;mso-border-left-alt:solid gray .5pt;mso-border-left-themecolor:background1;mso-border-left-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"46\"><p class=\"MsoNormal\" style=\"line-height:normal;text-align:center\"><span style=\"font-family:'Calibri',sans-serif\"><strong style=\"mso-bidi-font-weight:normal\">r1</strong></span></p></td><td style=\"width:103.5pt;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;border-left:none;mso-border-left-alt:solid gray .5pt;mso-border-left-themecolor:background1;mso-border-left-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"149\"><p><span style=\"text-decoration:underline\">Portée</span> : 10m</p><p><span style=\"text-decoration:underline\">Durée</span> : \_1sem/mois</p></td></tr><tr style=\"mso-yfti-irow:1;mso-yfti-lastrow:yes\"><td colspan=\"3\" style=\"width:517.25pt;border:solid gray 1.0pt;mso-border-themecolor:background1;mso-border-themeshade:128;border-top:none;mso-border-top-alt:solid gray .5pt;mso-border-top-themecolor:background1;mso-border-top-themeshade:128;mso-border-alt:solid gray .5pt;mso-border-themecolor:background1;mso-border-themeshade:128;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"424,46,149\"><h3>  Effet</h3><p><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Effet</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: </span>Un Arpenteur du Fleuve peut détecter les traces d’une déchirure bleue déjà refermée car celle-ci laisse toujours des traces comparables à des cicatrices invisibles à l’œil nu, et pour une durée plus ou moins longue, dans le tissu onirique.<span lang=\"FR\" style=\"font-size:3.0pt\">\_</span></p><p>Localiser le point de fermeture d’<span lang=\"FR\">une déchirure revient pour l’Arpenteur à ressentir ce point à la façon d’un écho, d’une résonnance faisant encore vibrer le tissu onirique. Il peut aussi dans une moindre mesure ressentir si cette déchirure se déplaçait ou s’était déplacée dans la période de temps que sa compétence d’Arpenter le Fleuve lui permet de couvrir.</span></p><h3>Fonctionement</h3><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Aucun jet nécessaire, l’Arpenteur doit seulement dépenser d’1 pt actuel de rêve et être dans un rayon de 10m autour du point où s’est refermée la déchirure.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">L’Arpenteur peut retenter la localisation en dépensant 1 pt actuel de rêve autant de fois qu’il le souhaite tant qu’il lui reste des pts actuels de rêve à dépenser.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span><span style=\"font-family:Symbol\"> </span></span><span lang=\"FR\">L’Arpenteur peut ainsi localiser une déchirure s’étant refermée au maximum</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:70.5pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·</span><span style=\"font-family:'Courier New'\"> </span></span><span lang=\"FR\">1 semaine auparavant ou</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:70.5pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">·</span><span style=\"font-family:'Courier New'\"> </span></span><span lang=\"FR\">Depuis autant de mois que son score dans la compétence Arpenter le Fleuve.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left:30pt;mso-add-space:auto;text-indent:-.25in;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\">Si l’Arpenteur sait exactement où la déchirure qu’il cherche s’est refermée (ex. il l’a vue) il doit tout de même la localiser en dépensant 1 pt actuel de rêve s’il souhaite ensuite tenter de la rouvrir.</span></p><p></p><p><span style=\"font-family:'Calibri',sans-serif\">– </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Niveau minimum requis</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: -5 en compétence d'Arpentage</span></p><p></p></td></tr></tbody></table>"
