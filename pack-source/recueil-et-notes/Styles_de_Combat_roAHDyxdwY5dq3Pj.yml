      content: "<p>Apprendre un style de combat revient a <span style=\"font-family:CaslonAntique\">développer </span>une nouvelle <strong>Compétence Particulière</strong> (ouverte à -8)</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span>Chaque style de combat est lié à une compétence</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"font-family:CaslonAntique\"><em>\_ \_ (exemple: Combat Monté ==&gt; Equitation ; Combat Acrobatique ==&gt; Acrobatie)</em></span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span>Chaque style exige que sa compétence en question soit au moins au niveau +3, faute de quoi il ne peut pas être ni appris, ni utilisé.</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span>Le style de combat et la compétence « associée » n’ont aucun autre lien et doivent être développés parallèlement.</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span>Sauf exception, on ne peut utiliser simultanément deux styles de combat.</p><p></p><p><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Le niveau dans un style de combat n’a pour objet que de </span><strong><span style=\"text-decoration:underline\">caper les compétences d’armes</span></strong></span> lorsque ce style est utilisé. Aucun jet sous le style de combat n’est jamais requis. </p><p>Hors du cadre d’un combat, le personnage doit faire ses jets sous la compétence associée et le style de combat n’est pas sollicité.</p><p></p>"
