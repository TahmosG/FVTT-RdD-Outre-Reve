soNormal\" style=\"line-height:normal;text-align:center\"><span style=\"font-family:'Calibri',sans-serif\">@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.dLiMJO6aUkh0EuIZ]{Épée dragonne}</span></p></td><td style=\"width:1.3in;border:none;mso-border-left-alt:solid windowtext .5pt;padding:0in 5.4pt 0in 5.4pt;height:15.0pt\"><p class=\"MsoNormal\" style=\"line-height:normal;text-align:center\">@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.NCp2kdTKmQGyAh1U]{Dague}</p></td></tr></tbody></table></div><p style=\"vertical-align:baseline\"><span style=\"font-family:'Calibri',sans-serif\"><strong>\_</strong></span></p><h3>Feinte</h3><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><strong><span style=\"text-decoration:underline\">Feinte</span></strong><span style=\"text-decoration:underline\"> à la dague</span></span></span><span style=\"font-family:'Calibri',sans-serif\">\_: bonus de <strong>+2 au toucher</strong> et <strong>+3 aux dommages</strong> (au lieu du +1/+1 habituel)</span></p><p style=\"margin-left:.75in;text-indent:-13.5pt;mso-list:l0 level2 lfo1;vertical-align:baseline\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span style=\"font-family:'Calibri',sans-serif\">La Feinte à la dague peut être placée à n'importe quel moment des actions du personnage à ce round.</span></p><p style=\"margin-left:.75in;vertical-align:baseline\"><span style=\"font-family:'Calibri',sans-serif\"><em>Ex. cette Feinte peut arriver avec les bonus listes ci-dessus après une parade et un coup en mêlée effectués au même round.</em></span></p><p style=\"margin-left:.75in;text-indent:-13.5pt;mso-list:l0 level2 lfo1;vertical-align:baseline\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span style=\"font-family:'Calibri',sans-serif\">En cas de particulière en rapidité les bonus de Feinte ne s’appliquent pas aux attaques supplémentaires</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Part. en </span><strong><span style=\"text-decoration:underline\">Rapidité</span></strong></span></span><span style=\"font-family:'Calibri',sans-serif\">\_:<strong> +2 coups (sans bonus de force</strong>, seulement celui de l’arme) ou +1 coup avec bonus de force</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Part. en </span><strong><span style=\"text-decoration:underline\">Esquive</span></strong></span></span><span style=\"font-family:'Calibri',sans-serif\"><strong>\_: </strong>peut offrir une<strong> attaque supplémentaire </strong>à la dague au lieu d’une 2</span><sup><span style=\"font-family:'Calibri',sans-serif\">nd</span></sup><span style=\"font-family:'Calibri',sans-serif\"> esquive.</span><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">\_\_</span></span></p><p style=\"vertical-align:baseline\"><span style=\"font-family:'Calibri',sans-serif\"><strong>\_</strong></span></p><h3>Parade</h3><p><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><strong><span style=\"text-decoration:underline\">Sur une parade réussie</span></strong></span></span><span style=\"font-family:'Calibri',sans-serif\"><strong>\_:</strong> <strong>passage en corps-à-corps </strong>(empoignade)<strong> </strong>avec au choix</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Jet supplémentaire</span></span></span><span lang=\"FR\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);font-size:10pt;color:red;background:yellow\"><em style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);font-style:normal\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">**</strong></em></span><span style=\"font-family:'Calibri',sans-serif\"><strong> d’empoignade </strong>avec un bonus de </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><strong><span style=\"text-decoration:underline\">+2 </span></strong><span style=\"text-decoration:underline\">au toucher</span></span></span></p><p style=\"margin-left:.75in;text-indent:-13.5pt;mso-list:l0 level2 lfo1;vertical-align:baseline\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span style=\"font-family:'Calibri',sans-serif\">L’adversaire armé peut <strong>contrer l’empoignade/désarmement s’il n’a pas encore paré/attaqué</strong></span></p><p style=\"margin-left:.75in;text-indent:-13.5pt;mso-list:l0 level2 lfo1;vertical-align:baseline\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span style=\"font-family:'Calibri',sans-serif\">La dague ne peut plus être utilisée en attaque ce round</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Jet supplémentaire</span></span></span><span lang=\"FR\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);font-size:10pt;color:red;background:yellow\"><em style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);font-style:normal\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">**</strong></em></span><span style=\"font-family:'Calibri',sans-serif\"><strong> de coup de poing </strong>avec un bonus de </span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><strong><span style=\"text-decoration:underline\">+2</span></strong><span style=\"text-decoration:underline\"> au toucher</span></span></span></p><p style=\"margin-left:.75in;text-indent:-13.5pt;mso-list:l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span style=\"font-family:'Calibri',sans-serif\">L’adversaire peut <strong>esquiver le coup/désarmement s’il n’a pas encore effectué d’esquive</strong></span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Jet supplémentaire</span></span></span><span style=\"font-family:'Calibri',sans-serif\"><strong> de </strong></span><span style=\"text-decoration:underline\"><span style=\"font-family:'Calibri',sans-serif\"><strong><span style=\"text-decoration:underline\">désarmement à -3</span></strong></span></span><span style=\"font-family:'Calibri',sans-serif\"><strong> </strong>pour désarmer l’adversaire.</span></p><p style=\"margin-left:.75in;text-indent:-13.5pt;mso-list:l0 level2 lfo1;vertical-align:baseline\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span style=\"font-family:'Calibri',sans-serif\">Le désarmement n’est possible que contre une <strong>*</strong>arme ordinairement parée par la dague<strong>*</strong></span></p><p style=\"margin-left:.75in;text-indent:-13.5pt;mso-list:l0 level2 lfo1;vertical-align:baseline\"><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">· </span></span><span style=\"font-family:'Calibri',sans-serif\">L’arme perdue tombe au sol dans un rayon de 1 à 5m et prend 1 round entier à être récupérée.</span></p><blockquote style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 10px;padding:0px 0px 0px 20px;border-left:3px solid var(--color-border-light-tertiary);font-style:italic;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-align:justify;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px\"><span lang=\"FR\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);font-size:10pt;color:red;background:yellow\"><span style=\"font-family:CaslonAntique\"><em style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);font-style:normal\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">**</strong></em></span></span><span style=\"font-family:'Calibri',sans-serif\"> Cet avantage ne peut être employé dans le même round que sur une seule parade.</span></p></blockquote><p style=\"vertical-align:baseline\"><span style=\"font-family:'Calibri',sans-serif\">\_</span></p><h3>Empoignade</h3><p><span style=\"font-family:'Calibri',sans-serif\">Durant une Empoignade<strong>,</strong> les attaques/parades bonus de ce style de combat ne sont plus valides mais\_:</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"font-family:'Calibri',sans-serif\">Possibilité <strong>d’utiliser la dague sans malus</strong> tandis que l’adversaire a un malus en <strong>esquive (-4)</strong>.</span></p><p style=\"vertical-align:baseline\"><span style=\"font-family:'Calibri',sans-serif\">\_</span></p><h3>Limitations</h3><p><span style=\"font-family:'Calibri',sans-serif\">Ce style n’autorise, par round, pas plus de</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"font-family:'Calibri',sans-serif\">3x attaques à la dague (cas de Rapidité, par exemple) ou 1x Parade</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"font-family:'Calibri',sans-serif\">1x Parade bonus (sur <strong>*</strong>armes ordinairement parées par la dague<strong>*</strong>)</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"font-family:'Calibri',sans-serif\">1x attaque de Corps-à-Corps (que ce soit un coup, saisie ou désarmement)</span><span style=\"mso-list:Ignore\"><span style=\"font-family:Symbol\">\_ </span></span><br class=\"Apple-interchange-newline\" /></p>"
