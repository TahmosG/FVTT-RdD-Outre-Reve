      content: "<h2 data-anchor=\"[style]-combat-acrobatique\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:1rem 0px 0.5rem;padding:0px;font-weight:bold;font-size:1.5em;border-bottom:1px solid var(--color-underline-header);color:rgb(25, 24, 19);font-family:CaslonAntique;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:1px;orphans:2;text-align:justify;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><span style=\"font-family:CaslonAntique\"><strong>Aperçu</strong></span></h2><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:justify\"><span style=\"font-family:Calibri, sans-serif\">Succession de pirouettes visant à <strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">feinter</strong>, <strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">charger </strong>ou <strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">se désister</strong> des attaques adverses<strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">.</strong></span></p><blockquote style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 10px;padding:0px 0px 0px 20px;border-left:3px solid var(--color-border-light-tertiary);font-style:italic;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-align:justify;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px\"><span style=\"font-family:Calibri, sans-serif\"><em>Déplacement Acrobatique (DA) d'autant de mètres que le niveau en Acrobatie (min. 5m)</em></span></p></blockquote><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"text-decoration:underline\"><span style=\"font-family:Calibri, sans-serif\"><span style=\"text-decoration:underline\">Avant</span></span></span><span style=\"font-family:Calibri, sans-serif\">, </span><span style=\"text-decoration:underline\"><span style=\"font-family:Calibri, sans-serif\"><span style=\"text-decoration:underline\">après </span></span></span><span style=\"font-family:Calibri, sans-serif\">ou </span><span style=\"text-decoration:underline\"><span style=\"font-family:Calibri, sans-serif\"><span style=\"text-decoration:underline\">entre </span></span></span><span style=\"font-family:Calibri, sans-serif\">les attaques (sectionnable)</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"font-family:Calibri, sans-serif\">1pt de fatigue par 2m de DA, bénéfice annulé par blessure</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span style=\"font-family:Calibri, sans-serif\">Permet : Combat à 2 Armes, Arme &amp; Bouclier, Dague Seule</span></p><table class=\"MsoTableGrid\" border=\"0\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);--table-background-color:none;width:613px;border-collapse:collapse;background:rgba(0, 0, 0, 0.05);border:none;margin:0.5em 0px 0.5em -4.75pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-align:justify;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><tbody><tr style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);height:15pt\"><td style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);padding:0in 5.4pt;width:234.25pt;border:none;height:15pt\"><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 12.6pt;text-indent:-13.5pt\"><span style=\"text-decoration:underline\"><span style=\"font-family:Calibri, sans-serif\"><span style=\"text-decoration:underline\">Action Spéciale</span></span></span><span style=\"font-family:Calibri, sans-serif\"> :</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 12.6pt;text-indent:-13.5pt\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:Symbol\">·\_</span></span><span style=\"font-family:Calibri, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">Double Feinte </strong>:</span><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:Calibri, sans-serif\">\_ </span></span><span style=\"font-family:Calibri, sans-serif\">Att/dom +2 (après DA)</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 12.6pt;text-indent:-13.5pt\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:Symbol\">·\_</span></span><span style=\"font-family:Calibri, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">Charge :</strong></span><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:Calibri, sans-serif\">\_ </span></span><span style=\"font-family:Calibri, sans-serif\">100% DA puis charge (si initiative)</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 12.6pt;text-indent:-13.5pt\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:Symbol\">·\_</span></span><span style=\"font-family:Calibri, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">Désengagement </strong>: Attaque puis DA (si initiative)</span></p><p style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 12.6pt;text-indent:-13.5pt\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:Symbol\">·\_</span></span><span style=\"font-family:Calibri, sans-serif\"><strong style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\">Evitement </strong>: Tir-10/Esquive+5 (seulement DA)</span></p></td></tr></tbody></table><p></p><h3 data-anchor=\"particularites\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:1rem 0px 0.5rem;padding:0px;font-weight:bold;font-size:1.25em;border-bottom:1px solid var(--color-underline-header);color:rgb(25, 24, 19);font-family:CaslonAntique;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:1px;orphans:2;text-align:justify;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><span style=\"font-family:CaslonAntique\"><strong>Particularités</strong></span></h3><p><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Cette technique de combat offre une liberté de mouvement en combat permettant</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">De procéder à un <strong>déplacement limité au </strong></span><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">début</span></strong></span><strong>, à la </strong><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">fin</span></strong></span><strong> et même </strong><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">pendant</span></strong></span><strong> le round</strong> de combat</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">ainsi que de cumuler une force cinétique suffisante pour bénéficier des <strong>avantages/désavantages d’une charge</strong> tout en étant déjà engagé en combat.</span></p><p class=\"MsoNormal\" style=\"margin-left:.5in\"><span lang=\"FR\" style=\"font-size:10.0pt;line-height:115%;mso-fareast-font-family:Arial\"><em>Ceci est rendu possible par des combinaisons de sauts, de bonds, de roulades, de contorsions, d’extensions, de flic-flac, d’appuis sur les surfaces et objets disponibles, de saltos arrière ou avant ou de roues.</em></span></p><p class=\"MsoNormal\"><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">\_</span></p><div style=\"mso-element:para-border-div;border:none;border-bottom:solid windowtext 1.0pt;mso-border-bottom-alt:solid windowtext .5pt;padding:0in 0in 1.0pt 0in;margin-left:45.0pt;margin-right:50.95pt\"><p class=\"MsoNormal\" style=\"border:none;mso-border-bottom-alt:solid windowtext .5pt;padding:0in;mso-padding-alt:0in 0in 1.0pt 0in;text-align:center\"><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Combat Acrobatique </span><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">peut être combiné aux styles de combat suivants</span></strong></span> :</p></div><div><table class=\"MsoTableGrid\" border=\"0\" style=\"border-collapse:collapse;mso-table-layout-alt:fixed;border:none;mso-yfti-tbllook:1696;mso-padding-alt:0in 5.4pt 0in 5.4pt;mso-border-insideh:none\"><tbody><tr style=\"mso-yfti-irow:0;mso-yfti-firstrow:yes;mso-yfti-lastrow:yes;height:15.0pt\"><td style=\"width:135.75pt;border:none;border-right:solid windowtext 1.0pt;mso-border-right-alt:solid windowtext .5pt;padding:0in 5.4pt 0in 5.4pt;height:15.0pt\"><p class=\"MsoNormal\" style=\"line-height:normal;text-align:center\"><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">@UUID[.xb9AfYDUke8x4cBi]{[Style] Combat à 2 Armes}</span></p></td><td style=\"width:154.5pt;border:none;border-right:solid windowtext 1.0pt;mso-border-left-alt:solid windowtext .5pt;mso-border-left-alt:solid windowtext .5pt;mso-border-right-alt:solid windowtext .5pt;padding:0in 5.4pt 0in 5.4pt;height:15.0pt\"><p class=\"MsoNormal\" style=\"line-height:normal;text-align:center\">@UUID[.M1IIShE22MsZGr9v]{[Style] Combat à 1 main &amp; Bouclier}</p></td><td style=\"width:156.75pt;border:none;mso-border-left-alt:solid windowtext .5pt;padding:0in 5.4pt 0in 5.4pt;height:15.0pt\"><p class=\"MsoNormal\" style=\"line-height:normal;text-align:center\"><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">@UUID[.EXxyg0sbZxzRSlSX]{[Style] Dague seule}</span></p></td></tr></tbody></table></div><p class=\"MsoNormal\"></p><h3>Déplacement</h3><p><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Durant un round : <strong>permet de se </strong></span><strong>déplacer</strong> <strong>d’autant de mètres que son niveau en Combat Acrobatique</strong> (avec un minimum de 5m quel que soit le score en Combat Acrobatique),</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Un déplacement acrobatique peut commencer dès la phase de tir (pas celle de magie).</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Peut s'effectuer </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">avant</span></span> d’attaquer, <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">après</span></span> avoir attaqué et/ou <span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">entre plusieurs attaques</span></span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Cette distance peut être fractionnée en autant de sections que souhaité</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Tout déplacement acrobatique coûte <strong>1 point de fatigue par 2m </strong>parcourus. Ce coût est payé même si le bénéfice du déplacement acrobatique est annulé par une blessure infligée par l’adversaire.</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Tout déplacement </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">de plus de 3m</span></span> (distance max d’engagement) est renvoyé en fin de round.</p><p></p><h3>Feinte</h3><p><span style=\"background:aqua;mso-highlight:aqua\">Toute attaque suivant un mouvement acrobatique bénéficie des avantages de la </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Feinte doublés</span></span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\"><strong>Attaque+2, dom+2 </strong><em>(mais bénéfice </em></span><span style=\"text-decoration:underline\"><em><span style=\"text-decoration:underline\">annulé si blessé ou sonné</span></em></span><em> avant de porter son coup).</em></p><p class=\"MsoListParagraphCxSpLast\"></p><h3>Charge</h3><p class=\"MsoNormal\"><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">En </span><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">renonçant à son initiative</span></strong></span> et en ne faisant que ce déplacement acrobatique à ce round, le combattant peut bénéficier des avantages/désavantages d’une charge, même s’il ne s’est pas désengagé</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\"><strong>Attaque+4, dom+2</strong> mais </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">pas d’esquive et parade-4</span></span> (sans le bénéfice d’une feinte)</p><p class=\"MsoListParagraphCxSpLast\"></p><h3>Manoeuvre d'Évitement</h3><p class=\"MsoNormal\"><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Telle Manoeuvre exige de <strong>renoncer à toute attaque</strong> le round où il l’utilise.</span></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Il doit de plus exécuter le <strong>maximum de déplacement possible</strong> en Combat Acrobatique </span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">dès le début du round</span></span> de combat, quelle que soit sa trajectoire (ex. en ligne droite, zigzag, en cercle, …)</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">Selon le moment ou le il déclenche sa Manoeuvre d'Évitement, trois options s’offrent à lui :</span></p><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-left:58.5pt;mso-add-space:auto;text-indent:-13.5pt;mso-list:l3 level2 lfo4\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:Symbol\">· </span></span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Phase de </span><strong><span style=\"text-decoration:underline\">tir</span></strong></span><strong> </strong>: malus de <strong>-10 à tous les tirs le visant</strong> ce round, qu'il en soit conscient ou non, (remplaçant le modificateur d’activité max de -5 indiqué dans le manuel) auquel s’ajouteront les modificateurs habituels de taille et de distance. <em>-Bénéfice cumulé à la Feinte doublée</em></p><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-left:58.5pt;mso-add-space:auto;text-indent:-13.5pt;mso-list:l3 level2 lfo4\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:Symbol\">· </span></span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Phase de </span><strong><span style=\"text-decoration:underline\">lancer</span></strong></span><strong> </strong>: bonus de <strong>+5 à tout jet d’esquive </strong>contre un ou des projectiles qui lui sont lancés (seulement s’il est conscient d’en être la cible)</p><p class=\"MsoListParagraphCxSpLast\" style=\"margin-left:58.5pt;mso-add-space:auto;text-indent:-13.5pt;mso-list:l3 level2 lfo4\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:Symbol\">· </span></span><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Phase de </span><strong><span style=\"text-decoration:underline\">mêlée</span></strong></span><strong> </strong>: bonus de <strong>+5 à tout jet d’esquive </strong>contre les attaques de mêlée dont il se sait être la cible.</p><blockquote><p><em>Si ce combattant maîtrise par ailleurs le style </em><span style=\"color:#0070C0\"><em><strong>Combat à Deux Armes</strong></em></span><em> ou </em><span style=\"color:#0070C0\"><em><strong>Arme à 1 Main et Bouclier</strong></em></span><em>, il peut garder une seule attaque (plus possiblement une attaque additionnelle en cas de particulière en Rapidité) à la toute fin du round laquelle bénéficie toujours du bonus de Feinte doublé (voir ci-dessus).</em></p></blockquote><p></p><h3>Dérobade</h3><p><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\">S'il </span><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">a l’initiative</span></strong></span> il peut dans un même round <strong>attaquer </strong>puis <strong>désengager </strong><em>(mouvement de 3m+)</em></p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\"> </span>Déplacement supplémentaire à la distance d’engagement (ex. 4 m, soit 2 points de fatigue), privant ainsi son adversaire de toute attaque à ce round.</p><p class=\"BulletCxSpMiddle\" style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track);margin:0.5em 0px 0.5em 30pt;color:rgb(25, 24, 19);font-family:CaslonAntique;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:1px;orphans:2;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-indent:-0.25in;text-align:justify\"><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span><span lang=\"FR\" style=\"mso-fareast-font-family:Arial\"> </span>A noter toutefois que si l’adversaire a déjà une arme de tir ou de lancer en main il pourra tout de même attaquer avec cette arme au round en question</p>"
