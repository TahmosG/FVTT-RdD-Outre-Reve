      content: "<blockquote><p><span style=\"font-family:'Calibri',sans-serif\"><em>Ces rituels sont l’œuvre des recherches du bienveillant Haut-Rêvant Philibert\_l’accidenteur. Comme nombre de Thanatosiens, ses recherches partaient d’une bonne intention\_: lutter contre le cauchemar… mais il semblerait qu’il réussisse à l’alimenter\_!</em></span></p></blockquote><p></p><p class=\"MsoNormal\"><span style=\"font-family:'Calibri',sans-serif\">Les rituels ci-présents couvrent une spécialisation dans la voie de Thanatos et leur compréhension n’est possible qu’après assimilation de la «\_Manipulation des courants du Rêve » (INT/Thanatos -5\_; 15pts de Tâche, périodicité 1H)</span></p><p class=\"MsoNormal\"><span style=\"font-family:'Calibri',sans-serif\">Son apprentissage s’effectue strictement dans l’ordre suivant\_:</span></p><p class=\"MsoListParagraphCxSpFirst\" style=\"margin-top:0in;margin-right:0in;margin-bottom:6.0pt;margin-left:.25in;mso-add-space:auto;text-indent:-13.5pt;mso-list:l0 level4 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Calibri',sans-serif\">1.\_ </span></span><span style=\"font-family:'Calibri',sans-serif\"><strong>@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.mQQqDdki887Grt24]{Bannissement}</strong> </span><span style=\"font-family:'Calibri',sans-serif\">(R-8) : Contrôle des courants externes pour déstabiliser les Entités.</span></p><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-top:0in;margin-right:0in;margin-bottom:6.0pt;margin-left:.25in;mso-add-space:auto;text-indent:-13.5pt;mso-list:l0 level4 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Calibri',sans-serif\">2.\_ </span></span><span style=\"font-family:'Calibri',sans-serif\">@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.Xp6FjqG8DVwL5DT2]{Déphasage} </span><span style=\"mso-list:Ignore\"><span style=\"font-family:'Calibri',sans-serif\">(</span></span><span style=\"font-family:'Calibri',sans-serif\">R-10) : Contrôle des courants interne pour rendre une cible temporairement semi-incarnée.</span></p><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-top:0in;margin-right:0in;margin-bottom:6.0pt;margin-left:.25in;mso-add-space:auto;text-indent:-13.5pt;mso-list:l0 level4 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Calibri',sans-serif\">3.\_</span></span><span style=\"font-family:'Calibri',sans-serif\">(R-12) <strong>Projection</strong> : … en cours de recherche</span></p><p class=\"MsoListParagraphCxSpLast\" style=\"margin-top:0in;margin-right:0in;margin-bottom:6.0pt;margin-left:.25in;mso-add-space:auto;text-indent:-13.5pt;mso-list:l0 level4 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family:'Calibri',sans-serif\">4.\_</span></span><span style=\"font-family:'Calibri',sans-serif\">(R-15) <strong>Désincarnation </strong>: </span><span style=\"font-family:'Calibri',sans-serif\">… en cours de recherche</span></p>"
