    text:
      format: 1
      content: "<table class=\"MsoTableGrid\" border=\"1\" style=\"border-collapse:collapse;border:none;mso-border-alt:solid #0070C0 .5pt;mso-yfti-tbllook:1184;mso-padding-alt:0in 5.4pt 0in 5.4pt\"><tbody><tr style=\"mso-yfti-irow:0;mso-yfti-firstrow:yes;height:26.05pt\"><td style=\"width:444.55pt;border:solid #0070C0 1.0pt;border-bottom:solid windowtext 1.0pt;mso-border-alt:solid #0070C0 .5pt;mso-border-bottom-alt:solid windowtext .5pt;background:#4F81BD;mso-background-themecolor:accent1;padding:0in 5.4pt 0in 5.4pt;height:26.05pt\" data-colwidth=\"668\"><p class=\"MsoNormal\" style=\"line-height:normal;text-align:center\"><span style=\"font-family:'Calibri',sans-serif\"><strong>Description pour les voyageurs</strong></span></p></td></tr><tr style=\"mso-yfti-irow:1;mso-yfti-lastrow:yes\"><td style=\"width:444.55pt;border:solid #0070C0 1.0pt;border-top:none;mso-border-top-alt:solid windowtext .5pt;mso-border-alt:solid #0070C0 .5pt;mso-border-top-alt:solid windowtext .5pt;padding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"668\"><p class=\"MsoNormal\" style=\"margin-right:-9.6pt;line-height:normal;tab-stops:85.5pt\"><span style=\"font-family:'Calibri',sans-serif\">Une série d’inscriptions gravées dans les murs d’une cave voutée, perdue entre les âges, révèle une spécialisation perdue de Narcos\_: l’enchantement des Liquides</span></p><p class=\"MsoNormal\" style=\"margin-right:-9.6pt;line-height:normal;tab-stops:85.5pt\"><span style=\"font-family:'Calibri',sans-serif\">Cet ouvrage, longuement préservé sous forme de réminiscence permanente par célèbre Accidenteur et Haut-Rêvant Philibert, a enfin pu être retranscrit pour le bonheur de tous.</span></p><p class=\"MsoNormal\" style=\"margin-top:0in;margin-right:-9.6pt;margin-bottom:.0001pt;margin-left:7.65pt;line-height:normal;tab-stops:right 70.65pt left 268.65pt\"><span style=\"mso-bookmark:_Hlk195226709\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Lecture</span>\_:<strong> </strong></span></span><span style=\"mso-spacerun:yes\"><span style=\"font-family:'Calibri',sans-serif\"><strong>\_\_\_\_\_</strong></span></span><span style=\"font-family:'Calibri',sans-serif\"><strong>INT/Ecriture-7 </strong>ou INT/Hautes Etudes-4\_</span><span style=\"mso-tab-count:1\"><span style=\"font-family:'Calibri',sans-serif\">\_\_ </span></span><span style=\"font-family:'Calibri',sans-serif\">(<em>12pts de tache, périodicité 1h)</em></span></p><p class=\"MsoNormal\" style=\"margin-top:0in;margin-right:0in;margin-bottom:6.0pt;margin-left:7.9pt;line-height:normal;tab-stops:70.65pt 268.65pt\"><span style=\"font-family:'Calibri',sans-serif\"><span style=\"text-decoration:underline\">Bénéfices</span>\_:<strong> </strong></span><span style=\"mso-spacerun:yes\"><span style=\"font-family:'Calibri',sans-serif\"><strong>\_</strong></span></span><span style=\"font-family:'Calibri',sans-serif\"><strong>Synthèse +2</strong>\_et <strong>coût -15 pts</strong> </span><span style=\"mso-tab-count:1\"><span style=\"font-family:'Calibri',sans-serif\">\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_ </span></span><span style=\"font-family:'Calibri',sans-serif\">(<em>pour tous les sorts de ce Traité)</em></span></p></td></tr></tbody></table><p></p><h3>Preambule</h3><blockquote><p><span lang=\"FR\" style=\"color:black;mso-ansi-language:FR\"><em><s>Cet ouvrage a l’incongruité de ne pas en être un puisqu’il n’existe pas sous forme de livre mais seulement sous celle d’une réminiscence permanente ciselée et saisie à l’intérieur d’un sort mémoriel créé par le célèbre Accidenteur et Haut-Rêvant Philibert. Ces recherches, tant qu’elles n’ont pas été retranscrites, ne sont supposément accessibles qu’à l’accidenteur susnommé qui en est donc à ce jour l’unique dépositaire.</s></em></span></p><p class=\"MsoNormal\" style=\"line-height:normal\"><span lang=\"EN-GB\" style=\"color:black;mso-bidi-font-weight:bold\"><em>Ce traité fut intégralement retranscrit (sur base des inscriptions murales préservées</em></span><span lang=\"EN-GB\" style=\"mso-fareast-font-family:宋体;mso-fareast-theme-font:minor-fareast;color:black;mso-ansi-language:FR;mso-fareast-language:ZH-CN;mso-bidi-font-weight:bold\"><em> </em></span><span lang=\"EN-GB\" style=\"mso-fareast-font-family:宋体;mso-fareast-theme-font:minor-fareast;color:black;mso-fareast-language:ZH-CN;mso-bidi-font-weight:bold\"><em>par un sort mémoriel</em></span><span lang=\"EN-GB\" style=\"color:black;mso-bidi-font-weight:bold\"><em>) et étoffé (grâce à</em></span><span lang=\"EN-GB\" style=\"mso-fareast-font-family:宋体;mso-fareast-theme-font:minor-fareast;color:black;mso-ansi-language:FR;mso-fareast-language:ZH-CN;mso-bidi-font-weight:bold\"><em> </em></span><span lang=\"EN-GB\" style=\"mso-fareast-font-family:宋体;mso-fareast-theme-font:minor-fareast;color:black;mso-fareast-language:ZH-CN;mso-bidi-font-weight:bold\"><em>ses propres recherches et améliorations) </em></span><span lang=\"EN-GB\" style=\"color:black;mso-bidi-font-weight:bold\"><em>par Philibert l’Accidenteur, à une qualité supérieure, et remis aux bons soins d’un bouquiniste d’Asthar.</em></span></p></blockquote><p><span lang=\"FR\" style=\"font-size:12.0pt;color:black;mso-ansi-language:FR\">«\_La véritable nature de ces écrits est celle d’une invraisemblable suite d’inscriptions serrées et difficilement lisibles, gravées sur les murs d’une cave voûtée sous la tour du Lieutenant Garan, quelque part sur les hauteurs du plateau de Kassiar.</span></p><p class=\"MsoNormal\" style=\"text-justify:inter-ideograph;line-height:normal;text-align:justify\"><span lang=\"FR\" style=\"font-size:12.0pt;color:black;mso-ansi-language:FR\">Son auteure, l’on-ne-peut-plus anonyme Brandzefrod, vécut et mourut à une époque indéterminée entre la fin du second âge et les tout débuts du 3ème. On dit que son passage de vie à trépas fut des plus atroces car elle mourut de soif à l’intérieur de la cave où l’on retrouva ses écrits, accidentellement enfermée là par son propre amant, un certain Garan, lieutenant de la garnison de la colonie de Kassiar, qui, voulant la prémunir contre les visées meurtrières d’une certaine «\_Grande Azur\_» dirigeant la colonie à cette époque, précéda sa bien-aimée dans la mort sans avoir pu ni la délivrer ni révéler à quiconque sa présence dans les sous-sols de la tour.</span></p><p class=\"MsoNormal\" style=\"text-justify:inter-ideograph;line-height:normal;text-align:justify\"><span lang=\"FR\" style=\"font-size:12.0pt;color:black;mso-ansi-language:FR\">Certains documents aux origines aussi obscures que douteuses auraient semble-t-il contribué à éclairer les circonstances de cette mort tragique. Ainsi raconte-t-on que ces évènements auraient coïncidé avec le passage de la Colonie d’une ère d’ouverture et de développement intellectuel tournée vers la diffusion des savoirs et la promotion de la recherche vers une époque, qui est la seule qu’on lui connaisse aujourd’hui, de cloisonnement, de méfiance, de répression et d’ignorance.</span></p><p class=\"MsoNormal\" style=\"text-justify:inter-ideograph;line-height:normal;text-align:justify\"><span lang=\"FR\" style=\"font-size:12.0pt;color:black;mso-ansi-language:FR\">  A cette époque, dit-on encore, l’académie de la colonie fut fermée, les quelques bibliothèques et lieux d’études reconvertis, les livres probablement tous détruits et le parchemin interdit. On raconte enfin que les Haut-Rêvants disparurent bientôt tous de la surface du plateau.</span></p><p class=\"MsoNormal\" style=\"text-justify:inter-ideograph;line-height:normal;text-align:justify\"><span lang=\"FR\" style=\"font-size:12.0pt;color:black;mso-ansi-language:FR\">  Brandzefrod faisait, plusieurs années déjà avant sa mort, des<strong> recherches sur les fluides et l’eau en général qui étaient selon ses convictions les grands oubliés du Haut-Rêve </strong>et qui, pensait-elle, avaient encore bien des moyens de nous surprendre.</span></p><p class=\"MsoNormal\" style=\"text-justify:inter-ideograph;line-height:normal;text-align:justify\"><span lang=\"FR\" style=\"font-size:12.0pt;color:black;mso-ansi-language:FR\"><strong>  Elle était habitée par l’intuition qu’un pouvoir de cette nature étendait sur le Rêve, ou peut-être seulement sur la Smoldurée, une emprise souterraine et sans nom.</strong></span></p><p class=\"MsoNormal\" style=\"text-justify:inter-ideograph;line-height:normal;text-align:justify\"><span lang=\"FR\" style=\"font-size:12.0pt;color:black;mso-ansi-language:FR\">  Elle se concentra ainsi un temps sur le Fleuve lui-même parcourant la région du nord au sud et donnant son nom à la région, la Smouldre, mais sans vraiment parvenir à identifier si ses pressentiments étaient fondés. Brandzefrod pensait aussi avoir découvert les origines de la Grande Azur, </span><span lang=\"FR\" style=\"font-size:12.0pt;mso-ansi-language:FR\">maîtresse</span><span style=\"color:black\"> de Kassiar, qui lui inspirèrent une série de fresques depuis lors perdues et oubliées.</span></p><p class=\"MsoNormal\" style=\"text-justify:inter-ideograph;line-height:normal;text-align:justify\"><span lang=\"FR\" style=\"font-size:12.0pt;color:black;mso-ansi-language:FR\">  De ses réflexions, seuls demeurent aujourd’hui des écrits qui n’ont pas plus d’existence avérée que celle de ses conjectures, et qui, à en croire leur détenteur exclusif, Maître Phillibert qui pour être dit-on autant Haut-Rêvant que voyageur ne peut guère se flatter de mériter crédit, témoignent de ses recherches vaines et obsessives tout en ayant le mérite de recéler certains trésors ésotériques qu’elle négligea comme de simples étapes vers une vérité qu’elle voulait plus grande et plus absolue.</span></p><p class=\"MsoNormal\" style=\"text-justify:inter-ideograph;line-height:normal;text-align:justify\"><span lang=\"FR\" style=\"font-size:12.0pt;color:black;mso-ansi-language:FR\"><strong>  D’aucuns prétendent que ce traité reste à ce jour inachevé…\_</strong>»</span></p><p></p><h3>Considérations</h3><p class=\"MsoNormal\" style=\"margin-top:12.0pt;margin-right:49.5pt;margin-bottom:12.0pt;margin-left:.5in;text-indent:-.25in;mso-list:l0 level1 lfo1;tab-stops:40.5pt .75in;border:none;mso-padding-alt:31.0pt 31.0pt 31.0pt 31.0pt;mso-border-shadow:yes\"><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;mso-ansi-language:FR\"><strong>1.  Un liquide préalablement enchanté ne pourra être «\_sur-enchanté\_»</strong></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;mso-ansi-language:FR\"> par un sortilège du présent traité.</span></p><p class=\"MsoNormal\" style=\"margin-top:12.0pt;margin-right:49.5pt;margin-bottom:12.0pt;margin-left:.5in;text-indent:-.25in;mso-list:l0 level1 lfo1;tab-stops:40.5pt .75in;border:none;mso-padding-alt:31.0pt 31.0pt 31.0pt 31.0pt;mso-border-shadow:yes\"><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;mso-ansi-language:FR\"><strong>2.  L’enchantement des Liquides implique une série de règles associées\_: </strong></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;mso-ansi-language:FR\">liquide statique, maintenu dans un contenant, volume limite de Liquide Enchantable, …</span></p><p class=\"MsoNormal\" style=\"margin-top:12.0pt;margin-right:49.5pt;margin-bottom:12.0pt;margin-left:.5in;text-indent:-.25in;mso-list:l0 level1 lfo1;tab-stops:40.5pt .75in;border:none;mso-padding-alt:31.0pt 31.0pt 31.0pt 31.0pt;mso-border-shadow:yes\"><span style=\"mso-list:Ignore\"><strong style=\"mso-bidi-font-weight:normal\">3.\_\_</strong></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;color:black;mso-ansi-language:FR\"><strong>Le non-respect de toute règle associée</strong></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;color:black;mso-ansi-language:FR\"> aboutira à un <strong>cas de magie impossible</strong> </span><span style=\"mso-char-type:symbol;mso-symbol-font-family:Wingdings\"><span style=\"font-family:Wingdings\">à</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;color:black;mso-ansi-language:FR\"> ouverture d’une déchirure de Rêve centrée sur le liquide impliqué.</span></p><ol style=\"margin-top:0in\" type=\"1\"><li class=\"MsoNormal\" style=\"color:black;margin-top:12.0pt;margin-right:49.5pt;mso-list:l0 level1 lfo1;border:none;mso-padding-alt:31.0pt 31.0pt 31.0pt 31.0pt;mso-border-shadow:yes\"></li></ol><h3>Enchantements Exotiques des Liquides ==&gt; req. Principe d'Enchantabilité des Liquides</h3><p>==&gt; Nécéssitent d'avoir intégré le principe \"d'Enchantabilité des Liquides\"</p><table><tbody><tr><td style=\"width:153.0pt;border:solid windowtext 1.0pt;mso-border-alt:solid windowtext .5pt;background:#A6A6A6;mso-background-themecolor:background1;mso-background-themeshade:166;padding:0in 5.4pt 0in 5.4pt;height:3.85pt\" data-colwidth=\"187\"><p class=\"MsoNormal\" style=\"margin-top:0in;margin-right:-5.8pt;margin-bottom:.0001pt;margin-left:-1.15pt;line-height:normal;tab-stops:15.35pt\"><span style=\"font-family:'Calibri',sans-serif\"><strong>Sort</strong></span></p></td><td style=\"width:49.5pt;border:solid windowtext 1.0pt;border-left:none;mso-border-left-alt:solid windowtext .5pt;mso-border-alt:solid windowtext .5pt;background:#A6A6A6;mso-background-themecolor:background1;mso-background-themeshade:166;padding:0in 5.4pt 0in 5.4pt;height:3.85pt\" data-colwidth=\"112\"><p class=\"MsoNormal\" style=\"margin-top:0in;margin-right:-5.8pt;margin-bottom:.0001pt;margin-left:-1.15pt;line-height:normal;tab-stops:15.35pt\"><span style=\"font-family:'Calibri',sans-serif\"><strong>Diff\_; cout</strong></span></p></td><td style=\"width:256.5pt;border:solid windowtext 1.0pt;border-left:none;mso-border-left-alt:solid windowtext .5pt;mso-border-alt:solid windowtext .5pt;background:#A6A6A6;mso-background-themecolor:background1;mso-background-themeshade:166;padding:0in 5.4pt 0in 5.4pt;height:3.85pt\"><p class=\"MsoNormal\" style=\"margin-top:0in;margin-right:-5.8pt;margin-bottom:.0001pt;margin-left:-1.15pt;line-height:normal;tab-stops:15.35pt\"><span style=\"font-family:'Calibri',sans-serif\"><strong>Effet</strong></span></p></td><td style=\"width:81.0pt;border:solid windowtext 1.0pt;border-left:none;mso-border-left-alt:solid windowtext .5pt;mso-border-alt:solid windowtext .5pt;background:#A6A6A6;mso-background-themecolor:background1;mso-background-themeshade:166;padding:0in 5.4pt 0in 5.4pt;height:3.85pt\" data-colwidth=\"124\"><p class=\"MsoNormal\" style=\"margin-top:0in;margin-right:-5.8pt;margin-bottom:.0001pt;margin-left:-1.15pt;line-height:normal;tab-stops:15.35pt\"><span style=\"font-family:'Calibri',sans-serif\"><strong>Retranscription</strong></span></p></td></tr><tr><td style=\"width:153.0pt;border:solid windowtext 1.0pt;mso-border-alt:solid windowtext .5pt;padding:0in 5.4pt 0in 5.4pt;height:15.0pt\" data-colwidth=\"187\"><p><strong>@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.HR9i37QeKsdEmTC5]{[N] Lait de Narcos}</strong></p></td><td style=\"width:49.5pt;border:solid windowtext 1.0pt;border-left:none;mso-border-left-alt:solid windowtext .5pt;mso-border-alt:solid windowtext .5pt;padding:0in 5.4pt 0in 5.4pt;height:15.0pt\" data-colwidth=\"112\"><p class=\"MsoNormal\" style=\"margin-top:0in;margin-right:-7.1pt;margin-bottom:.0001pt;margin-left:-5.3pt;line-height:normal;text-align:center\"><span style=\"font-family:'Calibri',sans-serif\"><strong>R-3</strong>\_; r1+</span></p></td><td style=\"width:256.5pt;border:solid windowtext 1.0pt;border-left:none;mso-border-left-alt:solid windowtext .5pt;mso-border-alt:solid windowtext .5pt;padding:0in 5.4pt 0in 5.4pt;height:15.0pt\"><p class=\"MsoNormal\" style=\"line-height:normal\"><span style=\"font-family:'Calibri',sans-serif\">Transforme un liquide en fluide nourrissant (1r/mesure). 4/3/2 pts de sustentation selon type de liquide</span></p></td><td style=\"width:81.0pt;border:solid windowtext 1.0pt;border-left:none;mso-border-left-alt:solid windowtext .5pt;mso-border-alt:solid windowtext .5pt;padding:0in 5.4pt 0in 5.4pt;height:15.0pt\" dat