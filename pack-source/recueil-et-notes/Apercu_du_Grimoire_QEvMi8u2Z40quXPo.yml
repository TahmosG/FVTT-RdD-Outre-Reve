      content: "<blockquote><p>A noter que tous les sorts non-officiels (non-tirés du livre de regles de RdD), utilisent une icone plus sombre que les sorts officiels.</p></blockquote><p></p><h2>Sorts Originaux</h2><blockquote><p>Liste de sorts synthetisés par Philibert et/ou rencontrés lors de ses périples</p></blockquote><p></p><p>[<span style=\"font-family:'Calibri',sans-serif\">∞</span>] <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Rituels de Base</span></strong></span> : Disponibles dans toutes les Voies</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.Dr6B5pzKbtDQPPJv]{Ecriture Draconique} inscrit un message sur un support, via un signe draconique</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.bVIo5b6N6A55uhZe]{Identification de Signature Draconique} du Haut-Rêvant responsable de l'effet magique analysé</p><p></p><p>[N] <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Enchantements d'objets</span></strong></span> :</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.8HOXBLcQRMujS12N]{[N] Écaille de Résistance *} résistance augmentée + immunité aux sorts de zone</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.XG80j0jv4xL4Y5QU]{[N] Écaille de Rituel *} permet à un objet de lancer des Rituels</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.RMDk6KQooi0dXsJx]{[N] Grande Écaille - Heures Draconiques *} donne l'heure</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.12MFumZhouwtGXeq]{[N] Grande Écaille - 13eme Heure *} ???</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.G9fYol6Hfejg2v5u]{[N] Grande Écaille de Piege *} rend la lecture d'aura périleuse</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.lAVaxItteeUyQ0qI]{[N] Grande Écaille de Préservation *} permet de conserver la fraicheur de son conteny</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.H1XQ7yssgwCPaGnV]{[N] Grande Écaille de Première Nasse **} permet la mise en reserve de sort dans la gemme</p><p></p><p>[N] <span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Enchantement des Liquides</span></strong></span> (par Brandzefrod) : ces enchantements sous Narcos sont en fait des <strong>Sorts </strong>applicables sur un contenu stable de liquide.</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.HR9i37QeKsdEmTC5]{[Brandzefrod] Lait de Narcos} rend un liquide nutritif</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.TN86jGwHpH5wKU1p]{[Brandzefrod] Nectar de Narcos (Spiritueux)} transforme un liquide en spiritueux</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.U2HYjFCb3K5f8AtD]{[Brandzefrod] Degrés de Narcos} change la température du liquide</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.kvJXYkvWEkUT5xT3]{[Brandzefrod] Lumière/Ombre de Narcos} rend un liquide limineux (ou ténèbreux)</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.V9FZjnvn1kXC3qUY]{[Brandzefrod] Nasse de Narcos (Reserve)} permet la mise en reserve d'un sort dans un liquide</p><p></p><p><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Sorts de Philibert</span></strong></span> : divers Sorts et Rituels synthétisé au phil des voyages</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.7C97G08mZwFE56Yn]{[N] Réminiscence} mémorisation sensorielle parfaite durant r+ minutes</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.2BiVAVNvAyZayGM1]{[N] 2. Nasse d’Alliance} rituel d'Enchantement Alliant une gemme dans un liquide</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.J1qGYknym1XrQ9KY]{[N] Ecaille de Contenance Portative*} reduit la taille et poid de son contenant</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.KOo4nMjWxbDdayKJ]{[N] Grande Ecaille de Protections*} amplificateur pour les Ecailles de protections</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.mQQqDdki887Grt24]{[T] Zone de Bannissement} crée une zone hostile aux ECNI/ECI</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.qGSOn6VQmihkn4V1]{[T] Torpeur Thanataire} plonge la cible en stase temporaire (semblable a la mort)</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.MZJIDIS3y3wH20HP]{[T] Animer un Zombi} variation du sort, s'appliquant aussi aux animaux</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.Xp6FjqG8DVwL5DT2]{[T] Déphasage} application temporaire des particularités des ECNI</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_@UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.DBcz7hGHlxJQrvv5]{[T] Griffe de Douleur*} posé sur une arme, tout dégat s'accompagne d'une douleur accrue</p><p><span style=\"box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar) var(--color-scrollbar-track)\"><span style=\"font-family:'Courier New'\">o</span></span>\_… d'autres sorts sont encore en cours de confection</p><p></p><h2>Autres Sources</h2><blockquote><p>Liste de Sorts deja parus (Quart-Livre ou autre ouvrages)</p><p>N'hésitez pas à m'informer si certaines références sont à corriger…</p></blockquote><p></p><p><span 