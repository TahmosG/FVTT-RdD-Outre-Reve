  - folder: KAuV7niIlBPUft2k
    name: Torpeur Thanataire (Phil)
    type: sort
    img: systems/foundryvtt-reve-de-dragon/icons/sorts/sort_thanatos.webp
    _id: TwYW8oMYL1Q3lnbK
    system:
      description: "<div><p><strong><span style=\"text-decoration: underline;\">Effet</span></strong> : plonge le corps de la cible en stase profonde, stoppant toutes ses fonctions vitales (respiration, digestion, circulation sanguine, vieillissement, progression de maladie ou poison…) \_</p></div><div><ul><li><p>la victime reste inconsciente et tous ses processus vitaux sont temporairement stoppés ; pour reprendre leur cours naturel au réveil\_</p><p> — Les dégâts continuent à se comptabiliser normalement, mais aucun Jet de Vie n’en résulte\_</p><p> — Les hémorragies cessent immédiatement mais reprendront à la fin du sort (si non-traitées)\_</p><p> — Les blessures ne se referment pas et doivent être traitées pour éviter de potentielles infections\_</p></li></ul></div><div><ul><li><p>Dans cet état, la victime semble en tout point à un corps sans vie. Une lecture d’aura révèlera néanmoins l’effet en cours.\_</p></li></ul></div><div><p><strong><span style=\"text-decoration: underline;\">Durée</span></strong> : jusqu’à la prochaine HN du Haut-Rêvant, +1H par point de rêve supplémentaire\_</p></div><div><ul><li><p>Si la cible venait à mourir durant sa Torpeur, le processus de décomposition naturel du corps ne reprendra qu’a la fin de ce sort.\_</p></li></ul></div><div><p><strong><span style=\"text-decoration: underline;\">Limitation</span></strong> : Ne fonctionne que sur une cible vivante et inconsciente (Endurance à 0). Si pour une raison quelconque la cible venait à recouvrer des points d’Endurance, l’effet s’estompe immédiatement.\_</p></div><div><p><strong><span style=\"text-decoration: underline;\">Notes</span></strong> : Certains patients se plaignirent d’avoir été en prise avec d’étranges rêves morbides durant leur Torpeur, mais cela est totalement sans fondement tangible !\_</p></div><div><p><em><span style=\"text-decoration: underline;\">Source</span> : Philibert l’Accidenteur – Synthétisé pour préserver ses compagnons en cas d’empoisonnement (ou falsifier les morts)</em>\_</p></div>"
