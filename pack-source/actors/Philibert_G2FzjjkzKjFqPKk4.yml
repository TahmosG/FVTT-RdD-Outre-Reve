      description: "<div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : tout dégât causé par un objet portant cette griffe s’accompagne d’une vive pointe de douleur. La victime effectue un JR à -2 par Griffe (+ Thanatos si applicable). En cas de d’échec :\_</p><p>— La douleur occasionne la perte de 2 points d’Endurance par Griffe\_</p><p>— La victime est sonnée* jusqu’à la fin du round suivant (état de demi-surprise)\_</p></div><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet-secondaire</span></strong></span> : insidieusement, en plus du coût habituel (1r par Ecaille à Maitriser / 1r par Heure d’utilisation), l’effet de cette Griffe frappe le porteur lors de la Maitrise et à chaque Activation (selon JR).\_\_</p></div><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Limitation</span></strong></span> : la difficulte du JR ne peut exceder JR/-8\_</p><hr><p><span style=\"text-decoration: underline;\"><em><span style=\"text-decoration: underline;\">Source</span></em></span><em> : Philibert l’Accidenteur ; Inspiré du sort [T] Douleur (R-3;r2)</em>\_</p></div>"
