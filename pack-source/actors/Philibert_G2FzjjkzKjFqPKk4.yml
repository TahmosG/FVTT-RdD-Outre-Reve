  - folder: KAuV7niIlBPUft2k
    name: '[N] 2. Nasse d’Alliance'
    type: sort
    img: systems/foundryvtt-reve-de-dragon/icons/sorts/sort_narcos.webp
    _id: OPJ2qskvXFkTi5hW
    system:
      description: "<div><p><strong><span style=\"text-decoration: underline;\">Effet</span></strong> : Ce rituel d’enchantement permet d’Allier une gemme pulvérisée alchimiquement à un liquide, résultant ainsi en un embryon d’Objet Enchantable, une « Gemme liquide » !\_</p><p> — La gemme se répand dans le liquide en formant une Nasse onirique permettant ulterieur la pose d’Ecailles\_</p><p> — Le liquide allié garde ses propriétés (couleur,\_ texture, viscosité…) et devient une « Gemme Liquide »\_</p><p> — Une fois allié, cette « gemme liquide » possède une résistance de 18 aux zones de transmutations\_</p><p><strong><span style=\"text-decoration: underline;\">Procédé</span></strong> : Ce rituel remplace le Rituel d’Alliance. Les autres étapes restent inchangées.\_\_</p><p> — La gemme doit contenir 1pt de rêve actif avant pulvérisation.\_\_</p><p> — Ce rituel est à poser sur le liquide avant d’y ajouter la gemme pulvérisée. </p><p> — Le volume varie entre\_la Taille de la gemme (en pépin) et son Enchantabilité x 1/7 de Mesure\_(au max)</p><p> — Apres le rituel de Nasse d’Alliance, nul besoin de ré-enchanter le liquide (car inertie de l’eau =0)\_</p><p> — Une fois la pose d’Ecailles ou Griffes, le liquide peut être utilisé comme bon voulu (écriture, tatouage…)\_</p></div><div><p><strong><span style=\"text-decoration: underline;\">Cohésion</span></strong> : Cette Nasse fonctionne tant que l’application du liquide est complète (intégralité du liquide Allie) et garde un minimum d’intégrité (distance/continuité entre ses éléments). Ex.\_</p><p> — Des motifs appliqués sur un même sujet (objet ou sur le même membre d’une personne)\_</p><p> — Des écrits faisant partie d’un même ouvrage (recueil, feuillets, jeu de Tarot Draconique…)\_</p><p> — Une masse faisant partie d’un même contenant (fiole de transformation alchimique, citerne de …)\_</p></div><div><p>En cas de problème de cohesion, l’effet serait nul ou amoindri (cfr. GdR)\_\_</p></div><div><blockquote><p><strong><span style=\"text-decoration: underline;\">Source</span></strong> : Philibert l’Accidenteur – Confection d’encre enchantée pour dessin, tatouages ou écrits Oniriques.</p></blockquote></div>"
