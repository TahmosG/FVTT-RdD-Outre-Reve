  - _id: qXb1vJp15yD4AoPX
    name: '[N] Écaille de Protection contre les projectiles *'
    type: sort
    flags:
      core:
        sourceId: Compendium.foundryvtt-reve-de-dragon.sorts-narcos.SUrdOuvvelLtiZMy
    img: systems/foundryvtt-reve-de-dragon/icons/competence_narcos.webp
    effects: []
    system:
      description: >-
        <p>Chaque écaille de protection diminue de 1 point le jet d'encaissement
        de tout dommage dû à un projectile, flèche, carreau, pierre de fronde,
        dague, javelot, fouet. La protection de l'amulette est <em>en plus
        </em>de l'armure véritable du personnage. Soit un personnage vêtu de
        cuir épais (prot. 3), possédant une amulette de 3 écailles, et recevant
        une flèche (+dom +2). Face à une flèche, le cuir épais ne vaut plus que
        1, mais on y rajoute les 3 écailles de l'amulette, pour un jet
        d'encaissement final de -2 au lieu de +1.</p>

        <p>Une amulette peut avoir n'importe quelle forme, mais ne fonctionne
        que si elle est en contact avec la peau nue de son possesseur. Si c'est
        le cas, elle fonctionne spontanément en face du danger pour lequel elle
        est conçue, même si le possesseur n'a aucune idée de son pouvoir. Pour
        fonctionner, l'amulette a besoin de points de rêve actifs. Ces points
        doivent être des points de rêve conférés par le rituel d'Enchantement en
        plus des points inertes. Autrement dit, voulant fabriquer une amulette,
        le haut-rêvant ne s'arrête pas d'enchanter quand il atteint un nombre de
        points de rêve égal à l'inertie totale de l'objet, mais continue à en
        rajouter. Le nombre maximum de points actifs qu'une amulette puisse
        posséder est égal à 7 fois l'enchantabilité de sa gemme ; et, comme pour
        les écailles d'efficacité, le nombre d'écailles de protection qu'elle
        puisse posséder est égal à l'enchantabilité de celle-ci avec un maximum
        de 7. Des amulettes plus puissantes ne pourraient être obtenues que par
        de spécifiques Grandes Écailles de Narcos.</p>

        <p><em>Soit une gemme de taille 6 et de pureté 5, ayant donc une inertie
        de 2 et une enchantabilité de 4. Elle peut posséder jusqu'à 4 écailles
        de protection (=enchantabilité) et un maximum de 28 points de rêve
        actifs (7&nbsp; &nbsp;x 4 = 28).</em></p>

        <p>Chaque fois qu'une amulette de protection fonctionne, elle dépense un
        de ses points de rêve actifs quel que soit le nombre d'écailles. Le
        possesseur, lui, n'en dépense qu'un par heure, quel que soit le nombre
        de fonctionnements de l'amulette au cours de cette heure. Quand une
        amulette n'a plus de points actifs, elle cesse de fonctionner. On ne
        peut lui en redonner que par le rituel de Restauration. Les écailles de
        protection peuvent être posées progressivement, comme celles
        d'efficacité, même si l'amulette fonctionne entre temps. Mêmes règles
        d'application. Une gemme donnée ne peut recevoir que des écailles de
        protection d'un même type, mais grâce à Individualité, plusieurs gemmes
        d'une même amulette peuvent offrir des protections différentes. La pose
        de chaque écaille de protection coûte un point de seuil.</p>

        <p>&nbsp;</p>
