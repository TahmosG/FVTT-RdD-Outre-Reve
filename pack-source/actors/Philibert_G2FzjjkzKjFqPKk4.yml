  - _id: Hj3FnpyAV3KRYvss
    name: (Zone) Bouclier
    type: sort
    flags:
      core:
        sourceId: Compendium.foundryvtt-reve-de-dragon.sorts-oniros.7kd1Ik8ulSWZuIIQ
    img: systems/foundryvtt-reve-de-dragon/icons/compcreature-contre.webp
    effects: []
    system:
      description: >-
        <p>L&rsquo;int&eacute;rieur de la zone de Bouclier ne poss&egrave;de
        aucune vertu particuli&egrave;re, son int&eacute;r&ecirc;t r&eacute;side
        dans sa fronti&egrave;re. Cette derni&egrave;re ne peut &ecirc;tre
        franchie, dans un sens comme dans l&rsquo;autre, que par des objets ou
        des cr&eacute;atures anim&eacute;s d&rsquo;une vitesse inf&eacute;rieure
        &agrave; 7 m&egrave;tres par round. Si la vitesse est sup&eacute;rieure,
        objets ou cr&eacute;atures rebondissent contre l&rsquo;invisible surface
        de la zone. Les projectiles, fl&egrave;ches, javelots, pierres, etc,
        sont donc automatiquement arr&ecirc;t&eacute;s par ce bouclier, dans un
        sens comme dans l&rsquo;autre. Sa surface appara&icirc;t comme
        l&eacute;g&egrave;rement &eacute;lastique et ne peut causer en soi aucun
        dommage aux cr&eacute;atures trop rapides qui fonceraient dedans.</p>

        <p>&nbsp;</p>

        <p>La zone laisse passer la lumi&egrave;re et le son. De
        l&rsquo;int&eacute;rieur, on peut pratiquer toute sorte de magie dont
        l&rsquo;effet a lieu &agrave; l&rsquo;ext&eacute;rieur, ou &agrave;
        l&rsquo;int&eacute;rieur (sauf autre sort de zone). De
        l&rsquo;ext&eacute;rieur, on peut pratiquer toute magie dont
        l&rsquo;effet a lieu &agrave; l&rsquo;int&eacute;rieur, sauf toujours un
        autre sort de zone. La zone arr&ecirc;te la gr&ecirc;le. En revanche,
        elle laisse passer la pluie, la neige ainsi que le vent et la
        foudre.</p>
