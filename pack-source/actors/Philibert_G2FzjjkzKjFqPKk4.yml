  - _id: 7C08JDGRCHJLPB1c
    name: Présent des cités
    type: tete
    flags: {}
    img: systems/foundryvtt-reve-de-dragon/icons/tete_dragon.webp
    effects: []
    system:
      description: >-
        <p>Par cette tête, chaque cité offre automatiquement soit une Fleur des
        rêves, soit un Passeur, soit un Messager, dès qu’elle est visitée par le
        demi-rêve du haut-rêvant. Il n’y a pas de d7 à tirer, le haut-rêvant
        choisit librement ce qu’il préfère, et la rencontre est considérée
        automatiquement maîtrisée, Fleurs, Messagers et Passeurs ayant une force
        de @roll[2d6] points. Dès qu’elle a offert son présent, la cité
        redevient normale en ce qui concerne le tirage des rencontres; il n’y a
        qu’un seul présent par cité. La tête de Dragon prend fin dès que toutes
        les cités (22) ont été visitées; entretemps, la tête ne peut être
        ré-obtenue.</p>
