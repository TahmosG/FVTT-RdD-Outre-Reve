  - folder: BkEk78gtn42WhFIz
    name: Identification de Signature Draconique
    type: sort
    img: systems/foundryvtt-reve-de-dragon/icons/tmr/signe_draconique.webp
    _id: zLVdVEeyNdsm06ZF
    system:
      description: "<div><p><strong><span style=\"text-decoration: underline;\">Effet</span></strong> : Permet d’identifier la Signature Draconique d’un Haut-Rêvant via la lecture d’un de ses signes Draconique, Enchantement ou rituel/sort visible lors de l’exécution de ce sort.\_\_</p></div><div><ul><li><p>Une fois discernée, la Signature est connue pour toujours par celui qui l’a découverte, lequel pourra dès lors la reconnaître avec une simple réussite obtenue\_\_</p><p> — à une Lecture d’Aura sur un sort lancé par le même individu, ou\_\_</p><p> — à la lecture d’un Signe Draconique créé par celui-ci.\_</p></li></ul></div><div><ul><li><p>Une Signature Draconique n’est pas un nom mais correspond au “style” du Haut-Rêvant, à la manière dont celui-ci tisse de son Rêve les Harmoniques Oniriques qui, d’une manière synesthésique, sont autant des sons que des couleurs ou des sensations diverses que le magicien noue, dénoue et réarrange.\_</p><p> — Les couleurs sont spécifiques puisqu’il s’agit du [violet], du [jaune], du [vert] et du [noir]\_</p><p> — Pour le reste (sensations, sons, évocations, …) ce peut être très variable mais n’est jamais le fruit d’un choix volontaire du Haut-Rêvant et n’est jamais plus élaboré qu’une image, un son ou un sens fugitif paraissant en filigrane.\_</p></li></ul></div><div><ul><li><p>La Signature est liée à l’Archétype du Haut-Rêvant et perdure d’une incarnation à l’autre\_</p></li></ul><p><strong><span style=\"text-decoration: underline;\">Prérequis</span></strong> : La prise de connaissance de la Signature Draconique d’un Haut-Rêvant peut commencer lorsque l’on effectue une réussite particulière\_\_</p><p> — au jet de Lecture d’un Signe Draconique écrit par ce Haut-Rêvant ou\_\_</p><p> — à n’importe quelle étape de Lecture d’Aura effectuée sur un sort lancé par ce Haut-Rêvant.\_</p></div><div><p><strong><span style=\"text-decoration: underline;\">Processus</span></strong> : Similairement à la Lecture d’Aura, ces étapes peuvent être effectuées en plusieurs fois, tant que le « support » en question est visible :\_</p><p> — Réussite particulière : révèle immédiatement le type de case des Terres Médianes auquel correspond la Signature Draconique du Haut-Rêvant.\_</p><p> — Case Générique : sur une case de ce type, la case spécifique correspondant à cette Signature est révélée en réussissant une Lecture d’Aura à R6 r-6.\_</p><p> — Case Spécifique : Une fois sur la case spécifique, la Signature est définitivement analysée en réussissant une Lecture d’Aura à R9 r-9.\_</p></div><div><p>Ce processus est indépendant de toute autre opération sur le Signe/sort.\_</p></div><div><p><em><span style=\"text-decoration: underline;\">Source</span> : Alain Gurniki</em>\_\_</p></div>"
      descriptionmj: ''
      draconic: O/H/N/T
