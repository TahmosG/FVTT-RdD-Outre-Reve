    system:
      description: "<div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Ce sort permet de créer un souvenir parfait de l’ensemble des perceptions de la cible dans les instants à venir. Ces sensations son ‘cristallisées’ dans la case TMR du rituel.\_</p><p>— L’état « d’absorption» dure une minute par point de rêve dépensé.\_</p><p>— L’expérience préservée englobe l’intégralité des sens et bénéficie d’une restitution parfaites (même inconscient)\_</p><p>— Ce souvenir, imprégné dans la trame de sa case TMR, reste vivide dans la conscience du HR jusqu’à HN\_</p></div><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Mise en Reserve</span></strong></span> : ce sort, visant la préservation de l’expérience, est prévu pour être mis en réserve\_</p><p>— Selon les règles usuelles, +1 point de rêve pour mise en réserve ; maximum 1 sort par case\_</p><p>— Entrer sur la case active la réminiscence, (re-)active le sort dont le souvenir restera vivide jusque à HN\_</p><p>— Tant que la Réminiscence est vivide, elle peut être remise en réserve\_</p></div><div><p>En se rendant sur la case TMR d’ancrage, le Haut-Rêvant peut ainsi réactiver chaque Réminiscence, et l’étudier dans les moindres détails jusque son HN (…et la remettre en réserve si besoin)\_</p></div><table class=\"Table Ltr TableWordWrap SCXW86602629 BCX0\" border=\"1\" data-tablestyle=\"MsoTableGrid\" data-tablelook=\"1184\" aria-rowcount=\"6\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 22px; padding: 0px; user-select: text; table-layout: fixed; width: 0px; border-collapse: collapse; empty-cells: show; position: relative; overflow: visible; color: rgb(0, 0, 0); font-family: 'Segoe UI', 'Segoe UI Web', Arial, Verdana, sans-serif; font-size: 12px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 