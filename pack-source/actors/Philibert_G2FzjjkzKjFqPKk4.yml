  - _id: Nyzt9Ur7Yv11RJyn
    name: '[N] 1. Purification'
    type: sort
    flags:
      core:
        sourceId: Compendium.foundryvtt-reve-de-dragon.sorts-narcos.TjhnUMh6UL04k0k8
    img: systems/foundryvtt-reve-de-dragon/icons/competence_narcos.webp
    effects: []
    system:
      description: >-
        <p>Purification est un rituel secondaire, mais néanmoins obligatoire. A
        moins de disposer d'une énorme quantité de points de rêve, il est vain
        d'espérer enchanter l'objet en une seule fois. Purifcation doit toujours
        s'intercaler entre deux rituels identiques : entre deux Enchantements,
