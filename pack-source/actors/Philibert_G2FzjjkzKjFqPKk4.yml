bkit-tap-highlight-color: transparent; margin: 0px 0px 0px 48px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">\_</span></p></div><div class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr;\"><p class=\"Paragraph SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><strong><span style=\"text-decoration: underline;\">Manoeuvre d'Évitement</span></strong></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"> : Telle Manoeuvre exige de renoncer à toute attaque le round où il l’utilise. \_</span></p></div><div class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr;\"><p class=\"Paragraph SCXW203711978 BCX0\" lang=\"FR-FR\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span class=\"NormalTextRun SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><em>Si ce combattant maîtrise par ailleurs le style <strong>Combat à Deux Armes</strong> ou <strong>Arme à 1 Main et Bouclier</strong>, il peut garder une seule attaque (plus possiblement une attaque additionnelle en cas de particulière en Rapidité) à la toute fin du round laquelle bénéficie toujours du bonus de Feinte doublé (voir ci-dessus). </em></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">\_</span></p></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle1 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; list-style-type: disc; cursor: text; font-family: verdana; overflow: visible;\"><li data-leveltext=\"\" data-font=\"Symbol\" data-listid=\"9\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"6\" data-aria-level=\"1\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 24px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 11pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" lang=\"FR-FR\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span class=\"NormalTextRun SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">Il doit de plus exécuter le <strong>maximum de déplacement possible</strong> en Combat Acrobatique </span></span><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><span style=\"text-decoration: underline;\">dès le début du round</span></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"> de combat, quelle que soit sa trajectoire (ex. en ligne droite, zigzag, en cercle, …)\_</span></p></li></ul></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle1 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; list-style-type: disc; cursor: text; font-family: verdana; overflow: visible;\"><li data-leveltext=\"\" data-font=\"Symbol\" data-listid=\"9\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"7\" data-aria-level=\"1\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 24px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 11pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" lang=\"FR-FR\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span class=\"NormalTextRun SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">Selon le moment ou le il déclenche sa Manoeuvre d'Évitement, trois options s’offrent à lui :\_</span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">\_</span></p></li></ul></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle2 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; cursor: text; font-family: verdana; overflow: visible; list-style-type: circle;\"><li data-leveltext=\"o\" data-font=\"Courier New\" data-listid=\"9\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"1\" data-aria-level=\"2\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 72px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 11pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><span style=\"text-decoration: underline;\">Phase de </span><strong><span style=\"text-decoration: underline;\">tir</span></strong></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><strong> </strong>: malus de <strong>-10 à tous les tirs le visant</strong> ce round, qu'il en soit conscient ou non, (remplaçant le modificateur d’activité max de -5 indiqué dans le manuel) auquel s’ajouteront les modificateurs habituels de taille et de distance. <em>-Bénéfice cumulé à la Feinte doublée</em>\_</span></p></li></ul></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle2 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; cursor: text; font-family: verdana; overflow: visible; list-style-type: circle;\"><li data-leveltext=\"o\" data-font=\"Courier New\" data-listid=\"9\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"2\" data-aria-level=\"2\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 72px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 11pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><span style=\"text-decoration: underline;\">Phase de </span><strong><span style=\"text-decoration: underline;\">lancer</span></strong></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><strong> </strong>: bonus de <strong>+5 à tout jet d’esquive </strong>contre un ou des projectiles qui lui sont lancés (seulement s’il est conscient d’en être la cible)\_</span></p></li></ul></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle2 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; cursor: text; font-family: verdana; overflow: visible; list-style-type: circle;\"><li data-leveltext=\"o\" data-font=\"Courier New\" data-listid=\"9\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"3\" data-aria-level=\"2\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 72px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 11pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><span style=\"text-decoration: underline;\">Phase de </span><strong><span style=\"text-decoration: underline;\">mêlée</span></strong></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><strong> </strong>: bonus de <strong>+5 à tout jet d’esquive </strong>contre les attaques de mêlée dont il se sait être la cible.\_\_</span></p></li></ul></div><div class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr;\"><p class=\"Paragraph SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><strong><span style=\"text-decoration: underline;\">Dérobade</span></strong></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"> :S'il </span><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><strong><span style=\"text-decoration: underline;\">a l’initiative</span></strong></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"> il peut dans un même round <strong>attaquer </strong>puis <strong>désengager </strong><em>(mouvement de 3m+)</em> \_</span></p></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle1 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; list-style-type: disc; cursor: text; font-family: verdana; overflow: visible;\"><li data-leveltext=\"\" data-font=\"Symbol\" data-listid=\"13\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"1\" data-aria-level=\"1\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 24px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 9pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" lang=\"FR-FR\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span class=\"NormalTextRun SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><em>Déplacement supplémentaire à la distance d’engagement (ex. 4 m, soit 2 points de fatigue), privant ainsi son adversaire de toute attaque à ce round. A noter toutefois que si l’adversaire a déjà une arme de tir ou de lancer en main il pourra tout de même attaquer avec cette arme au round en question</em></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">\_</span></p></li></ul></div></div>"
