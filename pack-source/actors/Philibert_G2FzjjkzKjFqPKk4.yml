  - folder: KAuV7niIlBPUft2k
    name: Déphasage Thanataire (Phil)
    type: sort
    img: systems/foundryvtt-reve-de-dragon/icons/entites/darquoine-token.webp
    system:
      description: "<div><p><strong><span style=\"text-decoration: underline;\">Effet</span></strong> : Sous l’effet de ce rituel, la cible devient un conduit instable pour les courants du Rêve et s’approprie, temporairement, certaines particularités des Entités Semi-Incarnée.\_</p><p> — Une légère aura lugubre enveloppe la cible, comme si possédé par une ECNI (distinguable à vue -8)\_</p><p> — Les actions physiques contre la cible nécessitent un jet d’alignement avant de toucher (~ECNI)\_</p></div><div><p><strong>JR / – coût du sort</strong>, tant pour les attaques, soins ou autre effets (produit/potion)\_</p><p> — Les Entités (tant de Cauchemar que de Rêve) n’ont pas besoin de s’aligner pour interagir.\_… mais, sauf cas particuliers, elles ne percevront pas la cible comme un ennemi.\_</p></div><div><p><strong><span style=\"text-decoration: underline;\">Durée</span></strong> : 1 minute (+1min par 1r supplémentaire), étendu en cas de concentration (-1 fatigue / round)\_</p><p> — une fois la concentration rompue, la durée paramétrée commence son décompte\_</p></div><div><blockquote><p><span style=\"text-decoration: underline;\">Source</span> : Philibert l’Accidenteur – cherchant à répliquer la\_ défense onirique des Entités de Cauchemar/Rêve\_</p></blockquote></div>"
