      HDSHRizOiLAt3KIz: 3
    system:
      description: "<div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Transforme un cadavre en simulacre de vie tel l’ECI « Zombie » :\_\_</p><p>— Caractéristiques selon la Taille (du cadavre) et le Rêve (r investis, Max. Taille) mais son Endurance ne peut dépasser celle de la Créature ; ainsi son Rêve Max = Endurance – Taille\_</p><p>— Distinguable des vivants par sa pâleur et regard fixe, ou pire selon son état lors du rituel. <em>Tant qu’inachevé : Reste sujet à la putréfaction et aux prédateurs\_; une fois son Rêve au Max : interrompt tout processus de putréfaction</em>\_\_</p><p>— Ne conserve pas les facultés spéciales de la créature (ex. poison)\_</p><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Coût</span></strong></span> : <strong>1r par point de R</strong> (<span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">jusqu’à 12R</span></span>), <span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">puis 3r</span></span> par point supplémentaires. Cette dépense est possible en plusieurs fois, mais toujours sur la même case TMR.\_</p></div><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Contrôle</span></strong></span> : n’agit qu’aux ordres de son Invocateur (E1) et devient sauvage à la mort de ce dernier\_</p><p>Un Zanimal est moins facilement contrôlable qu’un Zhumanoïde et requiert un jet de RÊVE pour déterminer si l’ordre a été correctement compris. Selon la difficulté de l’ordre :\_</p><p>— JR/–0 = Ordre simple : Attaque [cible], Viens, Assis\_</p><p>— JR/–2 = Ordre complexe ou long : Va chercher [cible], Protège [cible]\_</p><p>— JR/–5 = Ordre conditionnel : Grogne quand quelqu’un passe, …\_</p><p>— Le dressage d’un Zanimal permet d’augmenter ses chances de succès (jusqu’à un bonus de +3)\_</p><p>En cas d’échec, l’ordre est « mal interprété » (à la discrétion du Gardien des Rêves)\_</p><p>— L’invocateur ne perd pas le contrôle du Zombie mais le résultat n’est pas celui attendu\_</p><p>— Violent ou non, le zombie n’attaquera ni son Invocateur ni ses compagnons\_</p></div><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Annulation</span></strong></span> : le Rituel d’Annulation de la Magie peut être utilisé à 2 niveaux sur un Zombie\_</p><p>— <span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Annulation partielle</span></span> (5r) : brise le lien entre le Zombie et son créateur —&gt; Zombar*\_</p><p>— <span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Annulation complète</span></span> (r=R) : brise le rituel —&gt; redevient cadavre et subit une putréfaction soudaine, équivalente à la durée de son non-rêve.\_</p><p>— <span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Reprise de contrôle</span></span> : Il est possible de prendre le contrôle d’un Zombar en y insufflant son propre rêve : 3r si l’on est son invocateur // l’intégralité du Rêve de la Créature autrement.\_</p><p><span style=\"text-decoration: underline;\"><em><strong><span style=\"text-decoration: underline;\">Source</span></strong></em></span><em> : modification apportée par Philibert l’Accidenteur afin de frimer avec un Grizzal pour monture\_</em></p></div><hr><p><strong><span style=\"text-decoration: underline;\">Caractéristiques</span></strong> : Selon la <strong>Taille</strong> (du cadavre) et le <strong>Rêve</strong> (r investis, Max. Taille)\_</p><img class=\"WACImage SCXW210546938 BCX0\" alt=\"Table\n\nDescription automatically generated\" src=\"worlds/rdd-test/assets/items/pasted-image-fZszvw2qmmbADIbM.png\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 1px; user-select: text; border: