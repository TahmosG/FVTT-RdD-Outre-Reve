  - _id: aLPNSndPLu1BoyJq
    name: '[N] 2. Individualité'
    type: sort
    flags:
      core:
        sourceId: Compendium.foundryvtt-reve-de-dragon.sorts-narcos.asVUMvyZ0OocReY6
    img: systems/foundryvtt-reve-de-dragon/icons/competence_narcos.webp
    effects: []
    system:
      description: >-
        <p>Rituel secondaire, Individualit&eacute; est n&eacute;anmoins
        obligatoire pour les objets poss&eacute;dant plusieurs pouvoirs
        distincts. Il doit &ecirc;tre accompli sur toute nouvelle gemme,
        enchant&eacute;e d&rsquo;au moins un point de r&ecirc;ve actif, avant le
        rituel d&rsquo;Alliance. Lors, c&rsquo;est uniquement &agrave; cette
        nouvelle gemme que s&rsquo;adresseront les points de r&ecirc;ve et les
        &eacute;cailles. Vis &agrave; vis d&rsquo;une nouvelle gemme, le
        mat&eacute;riau re-poss&egrave;de toute son inertie et doit &agrave;
        nouveau &ecirc;tre satur&eacute;. Quand un objet a plusieurs gemmes,
        toutes ont d&ucirc; recevoir Individualit&eacute; sauf la
        premi&egrave;re. Les pouvoirs d&rsquo;un objet doivent &ecirc;tre
        &eacute;labor&eacute;s l&rsquo;un apr&egrave;s l&rsquo;autre. D&egrave;s
        que l&rsquo;on a commenc&eacute; une nouvelle gemme, on ne peut plus
        revenir sur les pr&eacute;c&eacute;dentes.</p>
