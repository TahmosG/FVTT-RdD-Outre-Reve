    system:
      description: "<p><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Compétence Particuliere</span></span> : <strong>Combat a la Dague</strong> seule (2nd main libre)</p><p><span class=\"NormalTextRun SCXW121160077 BCX0\" data-ccp-parastyle=\"Normal (Web)\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text;\"><span style=\"font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif\"><em>Cette technique suggère de<strong> laisser l’ennemi frapper en premier </strong>et de<strong> mettre à profit </strong></em></span></span><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif\"><em><strong><span style=\"text-decoration: underline;\">parade</span></strong></em></span></span><span style=\"font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif\"><em><strong> ou la </strong></em></span><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif\"><em><strong><span style=\"text-decoration: underline;\">feinte</span></strong></em></span></span><span style=\"font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif\"><em><strong>.</strong></em></span></p><p></p><table><tbody><tr><td><div><p>Permet <strong>2x Attaques</strong> (1dague + 1CaC) ; <strong>+1x Parade*</strong></p><p>- Part. <strong>Rapidité</strong> = +2x attaques dague</p><p>- Part. <strong>Esquive</strong> = +1 Esquive ou +1 Attaque</p></div></td><td><p><strong>Feinte</strong> = Toucher+2 ; dom+3\_</p><p><strong>Parade</strong>\_=\_Empoignade+2, Coup+2 ou Desarme-3</p><p>- Esquive-4 pour l'adversaire (durant l’empoignade)\_</p></td></tr></tbody></table><p><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, sans-serif\"><strong><span style=\"text-decoration: underline;\">Parade</span></strong><span style=\"text-decoration: underline;\">:</span></span></span></p><ul><li><span style=\"white-space: pre-wrap;\"><span style=\"font-family: Calibri, sans-serif\">Possibilité de<strong> parer toutes les armes tant que la force de l’adversaire n’est pas supérieure à la sienne</strong> (sinon on en revient à la limitation de parade habituelle de la dague)</span></span></li><li><span style=\"white-space: pre-wrap;\"><span style=\"font-family: Calibri, sans-serif\">Possibilité d’une<strong> parade bonus </strong>face aux </span><span style=\"font-family: 'Calibri',sans-serif\"><strong>*</strong></span><span style=\"font-family: Calibri, sans-serif\">armes ordinairement parées par la dague</span><span style=\"font-family: 'Calibri',sans-serif\"><strong>*</strong></span></span></li></ul><p style=\"margin: 0in; margin-bottom: .0001pt; vertical-align: baseline\">\_</p><p style=\"margin: 0in; margin-bottom: .0001pt; vertical-align: baseline\"><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, sans-serif\"><strong><span style=\"text-decoration: underline;\">Sur une </span></strong></span><span style=\"font-family: 'Calibri',sans-serif\"><strong><span style=\"text-decoration: underline;\">parade réussie</span></strong></span></span><span style=\"font-family: 'Calibri',sans-serif\"><strong>\_</strong></span><span style=\"font-family: Calibri, sans-serif\"><strong>:</strong> <strong>passage en corps-à-corps </strong>(empoignade)<strong> </strong>avec au choix</span></p><ul><li><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, sans-serif\"><span style=\"text-decoration: underline;\">jet supplémentaire</span></span></span><span style=\"font-family: Calibri, sans-serif\"><strong> d’empoignade </strong>avec un bonus de +2 au toucher</span></li><li><p><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, sans-serif\"><span style=\"text-decoration: underline;\">jet supplémentaire</span></span></span><span style=\"font-family: Calibri, sans-serif\"><strong> de coup de poing </strong>avec un bonus de +2 au toucher</span></p><ul><li><span style=\"font-family: Calibri, sans-serif\">L’adversaire armé peut contrer l’empoignade/désarmement s’il n’a pas encore paré/attaquer</span></li><li><span style=\"font-family: Calibri, sans-serif\">L’adversaire peut esquiver le coup de poing/pied/désarmement s’il n’a pas encore effectué d’esquive</span></li></ul></li><li><p><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, sans-serif\"><span style=\"text-decoration: underline;\">jet supplémentaire</span></span></span><span style=\"font-family: Calibri, sans-serif\"><strong> de désarmement a -3 </strong></span><span style=\"white-space: pre-wrap;\"><span style=\"font-family: Calibri, sans-serif\">pour désarmer l’adversaire.</span></span></p><ul><li><span style=\"font-family: Calibri, sans-serif\">Le désarmement n’est possible que contre une </span><span style=\"font-family: var(--font-primary)\"><strong style=\"white-space: pre-wrap; text-indent: -13.5pt; font-family: var(--font-primary); font-size: var(--font-size-14);\">*</strong></span><span style=\"font-family: Calibri, sans-serif\">arme ordinairement parée par la dague</span><span style=\"font-family: var(--font-primary)\"><strong style=\"white-space: pre-wrap; text-indent: -13.5pt; font-family: var(--font-primary); font-size: var(--font-size-14);\">*</strong></span></li><li><span style=\"font-family: Calibri, sans-serif\">L’arme perdue tombe au sol dans un rayon de 1 à 5m et prend 1 round entier à être récupérée.</span></li></ul></li></ul><p><span style=\"text-decoration: underline;\"><span style=\"font-family: var(--font-primary)\"><strong><span style=\"text-decoration: underline;\">Particularité</span></strong></span></span></p><ul><li><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, sans-serif\"><strong><span style=\"text-decoration: underline;\">Double Attaque</span></strong></span></span><span style=\"font-family: Calibri, sans-serif\"><strong>\_: </strong>Possibilité d’attaquer avec la dague et de donner un coup en corps-à-corps avec l’autre main sans malus.</span></li><li><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, sans-serif\"><strong><span style=\"text-decoration: underline;\">Feinte</span></strong><span style=\"text-decoration: underline;\"> à la dague</span></span></span><span style=\"font-family: Calibri, sans-serif\">\_: bonus de +2 au toucher et +3 aux dommages </span><span style=\"font-family: 'Calibri',sans-serif\">(au lieu du +1/+1 habituel)</span></li><li><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, sans-serif\"><span style=\"text-decoration: underline;\">Attaque en </span><strong><span style=\"text-decoration: underline;\">rapidité</span></strong></span></span><span style=\"font-family: Calibri, sans-serif\">\_:<strong> +2 coups (sans le bonus de force</strong>, seulement celui de l’arme).</span></li><li><span style=\"text-decoration: underline;\"><span style=\"font-family: Calibri, sans-serif\"><strong><span style=\"text-decoration: underline;\">Particulière</span></strong><span style=\"text-decoration: underline;\"> en esquive</span></span></span><span style=\"font-family: Calibri, sans-serif\"><strong>\_: </strong>peut offrir une<strong> attaque supplémentaire </strong>à la dague au lieu d’une 2</span><sup><span style=\"white-space: pre-wrap;\"><span style=\"font-family: Calibri, sans-serif\">nd</span></span></sup><span style=\"white-space: pre-wrap;\"><span style=\"font-family: Calibri, sans-serif\"> esquive.</span></span></li></ul><p>\_</p><p><span style=\"text-decoration: underline;\"><span style=\"font-family: var(--font-primary)\"><strong style=\"text-indent: 0.25in; font-family: var(--font-primary); font-size: var(--font-size-14);\"><span style=\"text-decoration: underline;\">Rappel</span></strong></span></span><span style=\"font-family: var(--font-primary)\"><strong style=\"text-indent: 0.25in; font-family: var(--font-primary); font-size: var(--font-size-14);\">\_:</strong></span></p><p class=\"BulletCxSpLast\" style=\"margin-left: .25in; mso-add-space: auto; text-indent: 0in; mso-list: none\"><span lang=\"FR\" style=\"font-size: 11.0pt; mso-ascii-font-family: Calibri; mso-ascii-theme-font: minor-latin; mso-hansi-font-family: Calibri; mso-hansi-theme-font: minor-latin; mso-bidi-font-family: Calibri; mso-bidi-theme-font: minor-latin; color: red; background: yellow; mso-highlight: yellow;\"><strong>*</strong></span><span lang=\"FR\" style=\"font-size: 11pt;\"><strong>Armes ordinairement parées par la dague</strong></span><span lang=\"FR\" style=\"font-size: 11.0pt; mso-ascii-font-family: Calibri; mso-ascii-theme-font: minor-latin; mso-hansi-font-family: Calibri; mso-hansi-theme-font: minor-latin; mso-bidi-font-family: Calibri; mso-bidi-theme-font: minor-latin; color: red; background: yellow; mso-highlight: yellow;\"><strong>*</strong></span><span lang=\"FR\" style=\"font-size: 11pt;\"><strong>\_: </strong>épée gnome, esparlongue, dragonne ou dague</span></p><p style=\"vertical-align: baseline; margin: 0in 0in 6.0pt .25in\"><span style=\"font-family: Calibri, sans-serif\">La dague s’utilise sans gêne en corps-à-corps</span></p>"
