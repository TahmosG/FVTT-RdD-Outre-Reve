  - name: Haubert d'Oniros
    type: sort
    img: systems/foundryvtt-reve-de-dragon/icons/competence_oniros.webp
    system:
      description: >-
        <p><span class="fontstyle0">Le rituel de Haubert d’Oniros confère à la
        cible une protection de 5 points comme un haubert de mailles. Il ne
        s’ajoute pas toutefois à la protection préexistante, et si cette
        dernière est déjà de 5 ou plus, il n’a aucun effet. En cas de combat, la
        présence du Haubert d’Oniros n’empêche pas que l’amure véritable soit
        endommagée par les coups. Le Haubert d’Oniros n’a ni encombrement ni
        malus armure. Sa protection de 5 n’est pas diminuée face aux flèches ou
        aux carreaux. </span></p><p><span class="fontstyle0">Le Haubert d’Oniros
        est la seule zone mobile personnelle qui est un rituel, et ne peut donc
        être mis en réserve ni attribué à une écaille d’activité. Il obéit par
        ailleurs à toutes les règles des ZMP (sauf la durée)</span> <br style="
        font-style: normal; font-variant: normal; font-weight: normal;
        letter-spacing: normal; line-height: normal; orphans: 2; text-align:
        -webkit-auto; text-indent: 0px; text-transform: none; white-space:
        normal; widows: 2; word-spacing: 0px; -webkit-text-size-adjust: auto;
        -webkit-text-stroke-width: 0px; "></p>
