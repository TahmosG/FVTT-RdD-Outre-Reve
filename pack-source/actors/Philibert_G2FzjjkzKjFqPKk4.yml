  - folder: KAuV7niIlBPUft2k
    name: (Zone) Bannissement (Phil)
    type: sort
    img: systems/foundryvtt-reve-de-dragon/icons/entites/darquoine-token.webp
    _id: jRanhs78Nbvrljxc
    system:
      description: "<div><p><strong><span style=\"text-decoration: underline;\">Effet</span></strong> : Ce rituel manipule les courants Oniriques et crée une zone hostile aux Entités de cauchemar. Toute Entité nécessite de s’accorder à ces courants afin de pouvoir y agir sans entrave.\_</p><p> — Pour y pénétrer : JR/-5 (ECI) ou JR/-8 (ECNI & ECSI) ; ou reste bloquée sur le seuil de la zone\_</p><p> — Pour y demeurer : JR/-5 (chaque round présent dans la zone) pour ne pas être submergé par ces courants.\_\_</p><p> — En cas d’échec, l’Entité devient instable (état similaire à Sonné) pour ce round.\_</p><p> — Ces JR sont renouvelable chaque round (tant pour y rentrer que pour éviter d’être sonné)\_</p></div><div><p><strong><span style=\"text-decoration: underline;\">ECNI Incarnée</span></strong> : pareils courants ont tendance à ébranler le lien entre une ECNI et son Hôte, résultant généralement par des Empoignade Oniriques (similaire aux combats de possession)\_</p><p> — Un être possédé cherchera, sous l’influence de son ECNI, à fuir cette zone de tourment ; mais pourra tenter de se libérer de son ECNI quand celle-ci est instable\_</p><p> — Une ECNI sous contrôle peut tenter de se libérer mais, en cas d’échec, n’aura d’autre recours que de se réfugier, en état de torpeur, dans le Rêve de son hôte\_</p><p> — Les courants étant en la défaveur de l’ECNI, tout échec lui fait perdre 1 pt d’Empoignade\_</p></div><div><p>Renforcement : au-delà du cout de base, il est possible de renforcer cette zone :\_</p><p> — <strong>Difficulté</strong> : +1r pour augmenter la difficulté de -1 (max JR/-8)\_</p><p> — <strong>Taille</strong> : +1r pour augmenter le diamètre de 3m (base = 3m)\_</p><p> — <strong>Durée</strong> : +1r pour rallonger la durée de 5 rounds (base = 1min = 10round)\_</p></div><div><p><strong><span style=\"text-decoration: underline;\">Concentration</span></strong> : le HR peut étendre la durée de cette zone en restant concentrer (-1 fatigue / round).\_Une fois la concentration rompue, la durée paramétrée commence son décompte\_</p></div><div><p><strong><span style=\"text-decoration: underline;\">Oniros :</span></strong> ce rituel existe aussi pour Oniros et s’applique à tous type d’Entités (Rêve + Cauchemar)\_</p></div><div><blockquote><p><strong><span style=\"text-decoration: underline;\">Source</span></strong> : Philibert l’Accidenteur (retranscription sur parchemin, accordant un Bonus de synthèse +2)\_</p></blockquote></div>"
