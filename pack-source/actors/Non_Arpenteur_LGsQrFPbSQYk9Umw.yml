    system:
      description: >-
        <p>Ce don permet d’accéder aux Terres Médianes en demi-rêve et est
        indispensable pour déchiffrer les signes draconics et développer les 4
        compétences de magie. Tous les haut-rêvants sont par définition déjà
        censés posséder ce don.</p>

        <p>Noter qu’un non haut-rêvant qui l’acquiert ne devient pas pour autant
        « magicien » à l’instant même. Ses voies de Draconic sont toujours à
        -11, et il devra commencer par en développer au moins une avant de
