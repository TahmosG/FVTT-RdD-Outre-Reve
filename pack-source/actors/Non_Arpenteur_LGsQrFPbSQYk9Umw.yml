  - _id: klkBMNrY7WBZWCm6
    name: Bois transparent
    type: sort
    img: systems/foundryvtt-reve-de-dragon/icons/competence_oniros.webp
    effects: []
    system:
      description: >-
        <p>Les zones de Transparence &Eacute;l&eacute;mentale ob&eacute;issent
        &agrave; toutes les r&egrave;gles des sorts de zone. Elles ont pour
        effet de rendre transparent l&rsquo;&eacute;l&eacute;ment
        impliqu&eacute;. Comme pour les Transmutations
        &Eacute;l&eacute;mentales, aucune discrimination n&rsquo;est possible" :
        est affect&eacute;e toute substance concern&eacute;e se trouvant dans la
        zone. La transparence permet de laisser passer la lumi&egrave;re et donc
        de voir au travers. Les autres qualit&eacute;s des
        &eacute;l&eacute;ments ne sont pas alt&eacute;r&eacute;es" : le
        m&eacute;tal reste aussi dur et tranchant, le bois aussi combustible,
        etc. Noter que, quoique voisin, transparent ne veut pas dire invisible.
        Contrairement &agrave; la transmutation, l&rsquo;effet n&rsquo;est pas
        d&eacute;finitif. L&rsquo;&eacute;l&eacute;ment retrouve son
        opacit&eacute; d&egrave;s qu&rsquo;il sort de la zone ou &agrave; la fin
        de la dur&eacute;e de cette derni&egrave;re.</p>
      descriptionmj: ''
      draconic: Oniros
