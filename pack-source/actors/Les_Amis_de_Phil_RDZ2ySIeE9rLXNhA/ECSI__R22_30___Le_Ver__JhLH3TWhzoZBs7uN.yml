  description: "<p>Possede jusque 4x Hantises (+2 en Reve tant qu'en sa possession)</p><p>Peuvent etre envoyer sur une cible pour leur drainer leur Reve (mort a R=0…)</p><p></p><h1 style=\"box-sizing: border-box; user-select: text; scrollbar-width: thin; scrollbar-color: var(--color-scrollbar) var(--color-scrollbar-track); margin: 0px 0px 0.5rem; padding: 0px; font-weight: bold; font-size: 2em; border-bottom: 2px solid var(--color-underline-header); color: rgb(25, 24, 19); font-family: CaslonAntique; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; letter-spacing: 1px; orphans: 2; text-align: justify; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: normal; background-color: rgb(245, 245, 240); text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial;\"><span style=\"font-family: CaslonAntique\"><strong>Possession</strong></span></h1><p style=\"box-sizing: border-box; user-select: text; scrollbar-width: thin; scrollbar-color: var(--color-scrollbar) var(--color-scrollbar-track); margin: 0.5em 0px; color: rgb(25, 24, 19); font-family: CaslonAntique; font-size: 16px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 400; letter-spacing: 1px; orphans: 2; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: normal; background-color: rgb(245, 245, 240); text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial; text-align: justify\"><span style=\"font-family: CaslonAntique\">Un possédé par la haine se met à haïr tout le monde sans exception, son moral se stabilisant à zéro. Dès qu’il se sent lésé, offensé, victime d’un tort même insignifiant, il\_faut qu’il se venge et que sa vengeance soit\_mortelle. Il peut jouer un jet de VOLONTÉ/ moral à zéro. Si le jet réussit, il peut encore laisser couver sa haine ; s’il échoue, il doit agir immédiatement. Il est conseillé que le gardien des rêves prenne alors le contrôle du personnage s’il s’agit d’un personnage de joueur.</span></p>"
