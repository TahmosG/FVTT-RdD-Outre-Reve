  description: >-
    <h1>Description</h1>

    <p>L&rsquo;aligate est une sorte de dinosaure de petite taille, &agrave; la
    peau &eacute;cailleuse de couleur gris bleu. Ses pattes post&eacute;rieures
    sont larges et munies de griffes recourb&eacute;es qui lui servent de
    crampons quand il court. Ses pattes ant&eacute;rieures sont minuscules. Il
    se tient dans une position semi-verticale, aid&eacute; par sa longue queue
    qui lui sert de balancier. Il p&egrave;se environ 250 kg.</p>

    <h1>Moeurs</h1>

    <p>Paisible, l&rsquo;aligate est herbivore. Il vit en plaine, souvent aux
    abords des marais, en larges troupeaux. Souvent domestiqu&eacute;,
    principalement par les Cyans et les Saures, il sert de monture ou
    d&rsquo;animal de b&acirc;t. Il ne se bat que rendu furieux, cherchant
    &agrave; pi&eacute;tiner. Ses r&eacute;ussites particuli&egrave;res sont
    toujours en force.</p>

    <p>&nbsp;</p>

    <p>&nbsp;</p>
