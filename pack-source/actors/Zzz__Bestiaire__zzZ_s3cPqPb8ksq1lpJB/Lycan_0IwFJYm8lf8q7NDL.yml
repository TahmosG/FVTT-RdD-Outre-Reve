  description: >-
    <h1>Manque</h1>

    <p>Saut</p>

    <h1>Description</h1>

    <p>Le lycan est un canid&eacute; de grande taille, au museau pointu, aux
    oreilles toujours droites, &agrave; la queue touffue et pendante, au pelage
    gris fauve, avec des yeux aux reflets jaunes. Un adulte p&egrave;se en
    moyenne 55 kg.</p>

    <h1>M&oelig;urs</h1>

    <p>Comme les loups, les lycans vivent en hordes hi&eacute;rarchis&eacute;es,
    reconnaissant pour chef le m&acirc;le le plus fort. Carnassiers et
    pr&eacute;dateurs redout&eacute;s, ils hantent toutes les sortes de
    for&ecirc;ts. Rassur&eacute;s par la force que conf&egrave;re leur nombre,
    les bandes de lycans n&rsquo;h&eacute;sitent pas &agrave; s&rsquo;attaquer
    &agrave; l&rsquo;homme. Les hivers de famine, des meutes enti&egrave;res
    vont m&ecirc;me jusqu&rsquo;&agrave; effectuer des razzias sur les
    villages.</p>
