  description: >-
    <h1>Manque</h1>

    <p>Saut</p>

    <h1>Description</h1>

    <p>La brolute rieuse est un grand rat d&rsquo;allure anthropomorphe,
    bip&egrave;de, vertical, faisant en moyenne 1m70 pour 45 kg. Dot&eacute;e du
    pelage du rat, de sa longue queue nue et annel&eacute;e, elle se singularise
    n&eacute;anmoins par un museau de castor et des yeux brid&eacute;s.</p>

    <h1>M&oelig;urs</h1>

    <p>La brolute rieuse vit de pr&eacute;f&eacute;rence &agrave;
    l&rsquo;&eacute;cart des hommes et de la civilisation, mais sans habitat
    sp&eacute;cifique. Elle se nourrit de fruits, de champignons et
    d&rsquo;&oelig;ufs qu&rsquo;elle d&eacute;robe habilement aux oiseaux. Ce
    qui la caract&eacute;rise essentiellement, c&rsquo;est que quand elle se
    sent agress&eacute;e, elle a le pouvoir de cr&eacute;er une d&eacute;chirure
    du r&ecirc;ve violette (d&eacute;chirure de d&eacute;part), dont elle est le
    centre. Le r&ecirc;ve d&rsquo;arriv&eacute;e lui est toujours profitable,
    lui permettant de se tirer d&rsquo;affaire. Elle doit son nom &agrave; ce
    qu&rsquo;elle adore rire aux grimaces et autres clowneries qu&rsquo;on peut
    lui faire. Pendant ce temps, on peut se concentrer pour tenter de lui
    communiquer empatiquement l&rsquo;image d&rsquo;un lieu o&ugrave; l&rsquo;on
    voudrait aller, non un lieu sp&eacute;cifique, mais un type de paysage":
    rivage marin, for&ecirc;t, agglom&eacute;ration urbaine, etc. Au moment
    o&ugrave; elle est le plus en train de rire, il suffit alors de stresser la
    brolute, et l&rsquo;on a une chance que la d&eacute;chirure
    cr&eacute;&eacute;e m&egrave;ne au type d&rsquo;endroit souhait&eacute;.
    Pour parvenir &agrave; la communication empathique, r&eacute;ussir EMPATHIE
    &agrave; -5. La brolute rieuse se distingue de la brolute ordinaire, dite
    brolute pointue, qui ne rit jamais et ne peut cr&eacute;er de
    d&eacute;chirure. Celle-l&agrave; se contente de chercher &agrave; fuir en
    cas d&rsquo;agression, ou attaque toutes griffes dehors si elle se sent
    accul&eacute;e. Pour la distinguer (visuellement) de la rieuse,
    r&eacute;ussir VUE/Zoologie &agrave; -5. Les caract&eacute;ristiques de
    combat indiqu&eacute;es ne s&rsquo;appliquent qu&rsquo;&agrave; la
    pointue.</p>
