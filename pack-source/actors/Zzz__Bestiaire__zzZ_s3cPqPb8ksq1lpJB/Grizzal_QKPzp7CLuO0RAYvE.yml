  description: >-
    <h1>Description</h1>

    <p>Le grizzal est un carnassier plantigrade de grande taille, au pelage
    &eacute;pais, au museau allong&eacute; et aux membres arm&eacute;s de
    puissantes griffes non r&eacute;tractiles. Pouvant d&eacute;passer les 2 m
    quand il se redresse en position verticale, son poids avoisine les 300
    kg.</p>

    <h1>M&oelig;urs</h1>

    <p>Carnassier, mais &eacute;galement omnivore, et pouvant se d&eacute;lecter
    comme l&rsquo;ours de fruits ou de miel, le grizzal vit essentiellement en
    for&ecirc;t, et de pr&eacute;f&eacute;rence en relief rocheux pouvant lui
    fournir une caverne pour tani&egrave;re. Solitaires, m&acirc;les et femelles
    ne se rencontrent que bri&egrave;vement. L&rsquo;hiver, ils hibernent. Ne
    recherchant pas syst&eacute;matiquement l&rsquo;affrontement avec
    l&rsquo;homme, le grizzal peut n&eacute;anmoins &ecirc;tre un adversaire
    fatal. Sa fourrure &eacute;paisse est si recherch&eacute;e que
    d&rsquo;aucuns n&rsquo;h&eacute;sitent pas &agrave; la vendre
    pr&eacute;matur&eacute;ment. En combat, ses r&eacute;ussites
    particuli&egrave;res sont usuellement pass&eacute;es en <em>force</em>.</p>
