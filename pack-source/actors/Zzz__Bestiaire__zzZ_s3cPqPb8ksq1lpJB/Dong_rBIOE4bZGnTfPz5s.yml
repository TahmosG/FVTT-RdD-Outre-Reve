  description: >-
    <h1>Manque</h1>

    <p>Saut</p>

    <h1>Description</h1>

    <p>Le dong est une cr&eacute;ature saurienne de l&rsquo;apparence d&rsquo;un
    gros crapaud, dot&eacute;e d&rsquo;une peau &eacute;cailleuse, de griffes et
    de crocs. Quand il gonfle son jabot puis le contracte, il &eacute;met un son
    qui ressemble &agrave; s&rsquo;y m&eacute;prendre &agrave; celui d&rsquo;une
    cloche, d&rsquo;o&ugrave; son nom. Plus le dong est gros, plus le son est
    grave, et inversement plus il est aigu. Une colonie de dongs produit un
    v&eacute;ritable carillon. Dot&eacute; de membres post&eacute;rieurs
    puissants, le dong est un sauteur impressionnant capable de faire des bonds
    de 6-8 m. Un dong moyen fait 80 kg.</p>

    <h1>M&oelig;urs</h1>

    <p>Le dong vit en plaine &agrave; proximit&eacute; de l&rsquo;eau
    (rivi&egrave;re, lac, marais). Carnivore, c&rsquo;est un chasseur habile qui
    n&rsquo;h&eacute;site pas &agrave; s&rsquo;attaquer &agrave; l&rsquo;homme.
    Quand il bondit, son attaque est consid&eacute;r&eacute;e comme une
    <em>charge</em>.</p>
