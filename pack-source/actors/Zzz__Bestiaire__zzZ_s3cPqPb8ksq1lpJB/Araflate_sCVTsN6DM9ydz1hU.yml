  description: >-
    <h1>Description</h1>

    <p>L&rsquo;araflate est une araign&eacute;e g&eacute;ante au corps
    extr&ecirc;mement plat, de couleur gris terne. Elle fait en moyenne 3 m de
    diam&egrave;tre, pattes comprises, pour un poids de 6 kg, et seulement 25 cm
    d&rsquo;&eacute;paisseur.</p>

    <h1>M&oelig;urs</h1>

    <p>H&ocirc;te des lieux secs et sombres, des ruines, des cavernes,
    l&rsquo;araflate ne tisse pas de toile. Elle reste &agrave;
    l&rsquo;aff&ucirc;t et bondit sur sa proie avec une vitesse foudroyante, sa
    morphologie lui permettant de se glisser dans des failles tr&egrave;s
    &eacute;troites. Pr&eacute;dateur toujours affam&eacute;, elle
    n&rsquo;h&eacute;site pas &agrave; s&rsquo;attaquer &agrave; des proies
    aussi grandes que les Humains. Sa morsure inflige un venin
    anesth&eacute;siant, inocul&eacute; sur toute blessure sauf contusion\
    &eacute;raflure. Quand sa victime cesse de bouger, l&rsquo;araflate la
    d&eacute;vore.</p>

    <h1>Venin</h1>

    <table style="width: 65.039%; height: 65px;" border="1">

    <tbody>

    <tr style="height: 16px;">

    <td style="width: 30.8567%; height: 16px;">Malignit&eacute;</td>

    <td style="width: 68.3263%; height: 16px;">6</td>

    </tr>

    <tr style="height: 16px;">

    <td style="width: 30.8567%; height: 16px;">P&eacute;riodicit&eacute;</td>

    <td style="width: 68.3263%; height: 16px;">1 round</td>

    </tr>

    <tr style="height: 16px;">

    <td style="width: 30.8567%; height: 16px;">Dommages</td>

    <td style="width: 68.3263%; height: 16px;">-1d6 points d'endurance</td>

    </tr>

    <tr style="height: 17px;">

    <td style="width: 30.8567%; height: 17px;">Antidotes</td>

    <td style="width: 68.3263%; height: 17px;">-3 \ Liqueur de Bagdol +12, Lait
    de lune +6</td>

    </tr>

    </tbody>

    </table>
