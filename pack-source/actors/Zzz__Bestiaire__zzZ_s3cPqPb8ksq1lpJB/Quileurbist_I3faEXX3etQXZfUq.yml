  description: >-
    <h1>Description</h1>

    <p>Le quileurbist est une cr&eacute;ature simiesque recouverte d&rsquo;une
    carapace d&rsquo;&eacute;cailles h&eacute;riss&eacute;es de piquants. Sa
    t&ecirc;te plate et triangulaire est dot&eacute;e d&rsquo;une large
    m&acirc;choire plant&eacute;e de crocs, et ses bras plut&ocirc;t longs se
    terminent par des pattes plant&eacute;es de griffes ac&eacute;r&eacute;es.
    Comme les grands singes, il se tient en position semi-verticale. Son cri,
    rauque et guttural, ressemble &agrave; la syllabe kill, d&rsquo;o&ugrave;,
    d&rsquo;apr&egrave;s Paranos le Moindre, l&rsquo;origine de son nom. Il fait
    en moyenne 1m85 pour 100 kg.</p>

    <h1>M&oelig;urs</h1>

    <p>Le quileurbist n&rsquo;a pas d&rsquo;habitat sp&eacute;cifique, encore
    qu&rsquo;on le rencontre surtout dans les collines rocheuses et peu
    bois&eacute;es, mais vagabond itin&eacute;rant, il change souvent de lieu.
    Il faut dire que partout o&ugrave; se trouve un quileurbist, la
    r&eacute;gion se d&eacute;peuple de toute autre vie animale. La
    cr&eacute;ature semble en effet n&rsquo;avoir qu&rsquo;une vocation" : tuer,
    d&eacute;chirer, &eacute;ventrer, massacrer toutes les autres formes de vie.
    Le quileurbist r&eacute;siste automatiquement au sort de
    Non-Agressivit&eacute; d&rsquo;Hypnos. En combat, ses r&eacute;ussites
    particuli&egrave;res sont toujours pass&eacute;es en
    <em>rapidit&eacute;</em>.</p>
