  description: >-
    <h1>Description</h1>

    <p>Le sanguinox est un gros chat sauvage au pelage enti&egrave;rement noir,
    pouvant faire jusqu&rsquo;&agrave; 45 kg.</p>

    <h1>M&oelig;urs</h1>

    <p>Le sanguinox vit dans les for&ecirc;ts, de pr&eacute;f&eacute;rence
    rocailleuses, telles que les contreforts de montagne, o&ugrave; il peut
    trouver une caverne pour lui servir de tani&egrave;re pendant le jour. De
    moeurs essentiellement nocturnes, c&rsquo;est un pr&eacute;dateur
    redout&eacute;. Il aime le go&ucirc;t du sang pour lui-m&ecirc;me, et,
    gav&eacute; de nourriture, ne se contente parfois que de saigner ses proies.
    Audacieux jusqu&rsquo;&agrave; la t&eacute;m&eacute;rit&eacute;, le
    sanguinox n&rsquo;h&eacute;site pas &agrave; s&rsquo;attaquer &agrave; des
    cr&eacute;atures nettement plus grosses que lui, et en particulier &agrave;
    l&rsquo;homme. Sa technique favorite est l&rsquo;embuscade. La nuit,
    dissimul&eacute; sur une branche d&rsquo;arbre, il est virtuellement
    invisible. Quand il attaque en se laissant tomber d&rsquo;une branche,
    consid&eacute;rer en termes de r&egrave;gles que c&rsquo;est une attaque de
    <em>charge</em>. Au sol, ses r&eacute;ussites particuli&egrave;res sont
    usuellement pass&eacute;es en <em>rapidit&eacute;</em>.</p>
