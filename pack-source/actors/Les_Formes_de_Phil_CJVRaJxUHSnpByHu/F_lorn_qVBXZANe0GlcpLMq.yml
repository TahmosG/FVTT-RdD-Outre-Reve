  description: >-
    <h1>Description</h1>

    <p>Le f&eacute;lorn est un petit chat de l&rsquo;apparence d&rsquo;un
    siamois, au pelage gris mauve, dot&eacute; d&rsquo;une grande paire
    d&rsquo;ailes duveteuses. Ces ailes sont sur le m&ecirc;me principe que
    celles des chauves-souris, sauf qu&rsquo;au lieu d&rsquo;&ecirc;tre nues,
    elles sont couvertes de duvet. Elles ne remplacent pas les membres
    sup&eacute;rieurs, mais sont en plus des deux paires de pattes. Le
    f&eacute;lorn est capable de voler gr&acirc;ce &agrave; elles sur
    d&rsquo;assez longues distances. Mais chose encore plus &eacute;tonnante, le
    f&eacute;lorn parle, et s&rsquo;exprime assez bien dans la langue du
    voyage.</p>

    <h1>M&oelig;urs</h1>

    <p>Tr&egrave;s sociable, le f&eacute;lorn adore la compagnie des Humains et
    ne demande g&eacute;n&eacute;ralement qu&rsquo;&agrave; se faire adopter.
    Son grand dilemme est d&rsquo;adorer le poisson et de d&eacute;tester
    l&rsquo;eau, et les Humains p&ecirc;cheurs le fascinent. S&rsquo;il parle,
    son discours est en revanche plut&ocirc;t insignifiant, et il n&rsquo;a
    pratiquement pas de m&eacute;moire. Au demeurant adorable, un f&eacute;lorn
    de compagnie peut vite devenir assez crispant.</p>
