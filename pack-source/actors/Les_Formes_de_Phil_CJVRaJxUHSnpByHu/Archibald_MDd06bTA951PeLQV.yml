ecoration: underline;\">a l’initiative</span></strong></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"> il peut dans un même round <strong>attaquer </strong>puis <strong>désengager </strong><em>(mouvement de 3m+)</em> \_</span></p></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle1 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; list-style-type: disc; cursor: text; font-family: verdana; overflow: visible;\"><li data-leveltext=\"\" data-font=\"Symbol\" data-listid=\"13\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"1\" data-aria-level=\"1\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 24px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 9pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" lang=\"FR-FR\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span class=\"NormalTextRun SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><em>Déplacement supplémentaire à la distance d’engagement (ex. 4 m, soit 2 points de fatigue), privant ainsi son adversaire de toute attaque à ce round. A noter toutefois que si l’adversaire a déjà une arme de tir ou de lancer en main il pourra tout de même attaquer avec cette arme au round en question</em></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">\_</span></p></li></ul></div></div>"
