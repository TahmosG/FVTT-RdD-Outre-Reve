      description: >-
        <p>Permet de changer son corp et son visage en tout autre humain. La
        modification et reelle et naturelle (il ne s'agit ni d'une illusion ni
        d'un effet magique.)</p><p><span style="text-decoration:
        underline;"><span style="text-decoration:
        underline;">Processus</span></span>: JR/0 puis depense de 5r (si
        success) ; Necessite une surface reflechissante. La metamorphose prend 1
        round pour prendre effet.</p><p><span style="text-decoration:
        underline;"><span style="text-decoration:
        underline;">Limitation</span></span>: la TAI desiree ne peut exceder
        +/-4 de sa TAI originelle. Il n'est pas possible de creer/supprimer des
        membres</p><p>Ces changement "remodelent" le corps en question. Tout
        changement de TAI (taille/masse) provoque ainsi un phenomene
        d'elongation/deformation ou de tassement/atrophie.</p><p><span
        style="text-decoration: underline;"><span style="text-decoration:
        underline;">Detection</span></span>: l'apparence et la voie ont change…
        mais pas l'attitude ni l'elocution. Chaque point de difference en TAI
        octroie un +1 pour detecter la
        supercherie.</p><p></p><p><strong>Notes</strong>: Permet la
        Creation/suppression de <strong>Tatouages</strong>, grains de
        beaute…</p><p>Changement de <strong>voix</strong>,
        <strong>pillosite</strong>, <strong>teint</strong>, couleur de
        <strong>peau</strong>… et meme du <strong>sexe</strong> !</p><p></p>
