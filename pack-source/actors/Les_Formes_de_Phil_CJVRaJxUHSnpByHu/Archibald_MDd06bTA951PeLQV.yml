mily: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">\_</span></p></div><div class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr;\"><p class=\"Paragraph SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><strong><span style=\"text-decoration: underline;\">Charge</span></strong></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><strong> :</strong> En </span><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><strong><span style=\"text-decoration: underline;\">renonçant à son initiative</span></strong></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">\_et en ne faisant que ce déplacement acrobatique à ce round, le combattant peut bénéficier des avantages/désavantages d’une charge, même s’il ne s’est pas désengagé\_</span></p></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle1 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; list-style-type: disc; cursor: text; font-family: verdana; overflow: visible;\"><li data-leveltext=\"\" data-font=\"Symbol\" data-listid=\"12\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"1\" data-aria-level=\"1\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 24px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 11pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" lang=\"FR-FR\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span class=\"NormalTextRun SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><strong>Attaque+4, dom+2</strong> mais </span></span><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><span style=\"text-decoration: underline;\">pas d’esquive et parade-4</span></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"> (sans le bénéfice d’une feinte)\_</span></p></li></ul></div><div class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr;\"><p class=\"Paragraph SCXW203711978 BCX0\" lang=\"FR-FR\" style=\"-webkit-user-drag: none; -we