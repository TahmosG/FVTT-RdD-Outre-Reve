: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span class=\"NormalTextRun SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><em>Si ce combattant maîtrise par ailleurs le style <strong>Combat à Deux Armes</strong> ou <strong>Arme à 1 Main et Bouclier</strong>, il peut garder une seule attaque (plus possiblement une attaque additionnelle en cas de particulière en Rapidité) à la toute fin du round laquelle bénéficie toujours du bonus de Feinte doublé (voir ci-dessus). </em></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">\_</span></p></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle1 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; list-style-type: disc; cursor: text; font-family: verdana; overflow: visible;\"><li data-leveltext=\"\" data-font=\"Symbol\" data-listid=\"9\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"6\" data-aria-level=\"1\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 24px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 11pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" lang=\"FR-FR\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span class=\"NormalTextRun SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">Il doit de plus exécuter le <strong>maximum de déplacement possible</strong> en Combat Acrobatique </span></span><span style=\"text-decoration: underline;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"><span style=\"text-decoration: underline;\">dès le début du round</span></span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\"> de combat, quelle que soit sa trajectoire (ex. en ligne droite, zigzag, en cercle, …)\_</span></p></li></ul></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle1 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; list-style-type: disc; cursor: text; font-family: verdana; overflow: visible;\"><li data-leveltext=\"\" data-font=\"Symbol\" data-listid=\"9\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"7\" data-aria-level=\"1\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 24px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 11pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" lang=\"FR-FR\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow-wrap: break-word; white-space: pre-wrap; font-weight: normal; font-style: normal; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext; text-indent: 0px\"><span class=\"NormalTextRun SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text;\"><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">Selon le moment ou le il déclenche sa Manoeuvre d'Évitement, trois options s’offrent à lui :\_</span></span><span style=\"font-family: Arial, Arial_EmbeddedFont, Arial_MSFontService, sans-serif\">\_</span></p></li></ul></div><div class=\"ListContainerWrapper SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: relative;\"><ul class=\"BulletListStyle2 SCXW203711978 BCX0\" role=\"list\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; cursor: text; font-family: verdana; overflow: visible; list-style-type: circle;\"><li data-leveltext=\"o\" data-font=\"Courier New\" data-listid=\"9\" data-list-defn-props=\"{\" aria-setsize=\"-1\" data-aria-posinset=\"1\" data-aria-level=\"2\" role=\"listitem\" class=\"OutlineElement Ltr SCXW203711978 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 72px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; display: block; font-size: 11pt; font-family: Arial, Arial_MSFontService, sans-serif; vertical-align: baseline;\"><p class=\"Paragraph SCXW203711978 BCX0\" style=\"-webkit-user