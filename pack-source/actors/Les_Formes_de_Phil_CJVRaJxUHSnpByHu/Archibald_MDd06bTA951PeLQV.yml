      description: >-
        <p><span style="text-decoration: underline;"><strong><span
        style="text-decoration: underline;">Dague
        Acerini</span></strong></span>: Arme d'excellente facture, faites avec
        un alliage leger et resistant.</p><p><span style="text-decoration:
        underline;"><span style="text-decoration:
        underline;">Bonus</span></span>: Dague+4 / Parade+4 / dom+4 (Activation
        = -1r)</p><p><span style="text-decoration: underline;"><span
        style="text-decoration: underline;">Invisibilité</span></span>:
        Porteur/Touché/Porté (-1r/ecaille) + Permanence (-5r, 1
        round)</p><p></p><p>Les armes Acerini (dom+1/Toucher+1) sont extremement
        bien equilibree et d'un style raffine. Cette dague, malgres ses puissant
        enchantements arbore cependant une sobriete etonnante. Toutes ses gemmes
        etant pulverisee, elle semble de prime abord a une dague
        banale.</p><p></p><p><span style="text-decoration: underline;"><span
        style="text-decoration:
        underline;">Enchantements</span></span>:</p><p>3x
        @UUID[Compendium.foundryvtt-reve-de-dragon.sorts-narcos.Item.AIBLH8EduhfUQscn]{Écaille
        d'Efficacité *}</p><p>&gt;&gt; Toucher+3 / dom+3 / Initiative
        +3</p><p>4x @UUID[Item.I75WJGtFqkE8fXPn]{Écailles++ Invisibilité
        *}</p><p>&gt;&gt; 1r pour Invisibilite du
        Porter/Toucher/Porter</p><p>&gt;&gt; 5r pour permanence</p><p>Le nombre
        d'ecailles activees est a la discretion du porteur lors de l'activation.
        <strong>Permanence</strong> permet de retablir l'invisibilite apres
        conflit des Sens (risque de voir les brumes limbaires durant 1 round ou
        plus, selon la situation)</p>
