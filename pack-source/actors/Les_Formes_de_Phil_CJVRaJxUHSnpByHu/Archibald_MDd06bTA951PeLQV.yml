    ownership:
      default: 0
      HDSHRizOiLAt3KIz: 3
    system:
      description: >-
        <p>Le principe d'animation du zombi est semblable à celui du squelette.
        Comme ce dernier, sa TAILLE est celle du cadavre utilisé, son RÊVE est
        égal aux points de rêve dépensés, avec un maximum égal à la TAILLE (voir
        le Livre III, page 225). Comme le squelette, le zombi n'obéit qu'aux
        ordres reçus, mêmes règles d'application.</p>

        <p>La différence esssentielle est que le rituel d'Animation de Zombi
        interrompt totalement le processus de putréfaction au lieu de
        l'accélérer. Une fois animé, un zombi reste dans l'état physique qui
        était le seien lors de l'accomplissement du rituel, sans plus jamais
        subir la moindre trace de décomposition. La conséquence est qu'un
        cadavre frais, dont la mort ne remonte qu'à quelques minutes ou quelques
        heures, une fois animé, ne se distingue des vivants que par une pâleur
        inhabituelle, un regard un peu fixe, et des lèvres un peu exsangues,
        mais pour peu qu'il ne fasse pas très clair ou que son maître l'ait bien
        emmitouflé, capable de passer pour un vivant. Pour cette raison, les
        zombis sont souvent préférés aux squelettes par les haut-rêvants de
        Thanatos plus circonspects et moins enclins au tape-à-l'oeil.</p>
      descriptionmj: ''
      draconic: Thanatos
      duree: Permanente
      JR: Aucun
      cible: Un cadavre
      difficulte: '-7'
      portée: ''
      caseTMR: necropole
