  - _id: 8wcGCeYEWfgNkFGL
    name: Écaille d'Efficacité *
    type: sort
    img: systems/foundryvtt-reve-de-dragon/icons/competence_narcos.webp
    effects: []
    folder: null
    sort: 0
    flags:
      core:
        sourceId: Compendium.foundryvtt-reve-de-dragon.sorts-narcos.AIBLH8EduhfUQscn
