    system:
      description: >-
        <p>Le rituel de Haubert d&rsquo;Oniros conf&egrave;re &agrave; la cible
        une protection de 5 points comme un haubert de mailles. Il ne
        s&rsquo;ajoute pas toutefois &agrave; la protection pr&eacute;existante,
        et si cette derni&egrave;re est d&eacute;j&agrave; de 5 ou plus, il
        n&rsquo;a aucun effet. En cas de combat, la pr&eacute;sence du Haubert
        d&rsquo;Oniros n&rsquo;emp&ecirc;che pas que l&rsquo;amure
        v&eacute;ritable soit endommag&eacute;e par les coups. Le Haubert
        d&rsquo;Oniros n&rsquo;a ni encombrement ni malus armure. Sa protection
        de 5 n&rsquo;est pas diminu&eacute;e face aux fl&egrave;ches ou aux
        carreaux.</p>

        <p>Le Haubert d&rsquo;Oniros est la seule zone mobile personnelle qui
        est un rituel, et ne peut donc &ecirc;tre mis en r&eacute;serve ni
        attribu&eacute; &agrave; une &eacute;caille d&rsquo;activit&eacute;. Il
        ob&eacute;it par ailleurs &agrave; toutes les r&egrave;gles des ZMP
        (sauf la dur&eacute;e).</p>
