  description: >-
    <h1>Description</h1>

    <p>Le pantodar est un f&eacute;lin &agrave; fourrure rase de couleur jaune
    sable, de la taille d&rsquo;une panth&egrave;re. Sa caract&eacute;ristique
    la plus singuli&egrave;re est une longue queue pr&eacute;hensile de plus de
    3 m de long, capable de manier une arme l&eacute;g&egrave;re telle
    qu&rsquo;une dague.</p>

    <h1>M&oelig;urs</h1>

    <p>H&ocirc;te des plaines et des savanes, rarement des for&ecirc;ts, le
    pantodar est un carnassier solitaire. Tr&egrave;s curieux, mais tout aussi
    intelligent et prudent, il s&rsquo;attaque rarement &agrave; l&rsquo;homme
    de sa propre initiative. Il l&rsquo;observe pourtant, de loin, et s&rsquo;il
    peut d&eacute;rober une dague sur un cadavre, il ne s&rsquo;en prive pas.
    Par quelle singularit&eacute; arrive-t-il &agrave; s&rsquo;en servir
    adroitement ? C&rsquo;est une source d&rsquo;&eacute;tonnement. On
    conna&icirc;t la c&eacute;l&egrave;bre r&eacute;ponse de Paranos le Moindre
    interrog&eacute; &agrave; ce sujet : &laquo;Vous n&rsquo;avez
    qu&rsquo;&agrave; le lui demander vous-m&ecirc;me !&raquo; Les jeunes
    pantodars peuvent assez facilement s&rsquo;apprivoiser"; devenus adultes,
    ils sont &eacute;tonnamment fid&egrave;les.</p>
