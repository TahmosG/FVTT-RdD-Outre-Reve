  - name: Don d'Arpenter le Fleuve
    type: tete
    img: systems/foundryvtt-reve-de-dragon/icons/entites/possession.webp
    effects: []
    folder: wUi7SLKQznIAfjzP
    flags:
      core:
        sourceId: >-
          Compendium.foundryvtt-reve-de-dragon.tetes-de-dragon-pour-haut-revants.YDo0a0ApM8iW9g82
    _stats:
      compendiumSource: >-
        Compendium.foundryvtt-reve-de-dragon.tetes-de-dragon-pour-haut-revants.YDo0a0ApM8iW9g82
      duplicateSource: null
      coreVersion: '12.343'
      systemId: foundryvtt-reve-de-dragon
      systemVersion: 12.0.50
      createdTime: null
      modifiedTime: null
      lastModifiedBy: null
    ownership:
      default: 0
      HDSHRizOiLAt3KIz: 3
    system:
      description: "<h2>Faculté d'<strong>ouvrir des déchirures bleues</strong>.</h2><p>&gt;&gt; donne access a la Competence Specialisee (-11) @UUID[Compendium.a-perte-de-reve.competences-et-techniques.Item.HBgyw6z7twXRJ4jw]{Arpenter le Fleuve}</p><p>Ce type de déchirures a pour qualité d’<strong>ouvrir sur le même rêve et d'être à double-sens</strong>. Il est aussi possible qu’une déchirure bleue ouvre directement sur ce «\_lieu\_» que l’on nomme «\_<strong>le Fleuve</strong>\_».</p><h2>Progression</h2><p><span lang=\"EN-GB\">Le principe du Fleuve entretient une relation assez distendue de ceux du Rêve et de l’Archétype. Ainsi, cette compétence évolue indépendamment de tout score d’Archétype</span></p><p class=\"BulletCxSpFirst\" style=\"mso-list: l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: Symbol\">· </span></span><span lang=\"FR\">Cette compétence se développe comme une <strong>Connaissance</strong> (-11 au départ)</span></p><p class=\"BulletCxSpMiddle\" style=\"mso-list: l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: Symbol\">· </span></span><span lang=\"FR\">La progression provient <strong>uniquement avec l’expérience</strong> (la pratique et l’entrainement),</span></p><p class=\"BulletCxSpMiddle\" style=\"mso-list: l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: Symbol\">·\_</span></span><span lang=\"FR\">Tous les points d’expérience gagnés en cas de particulière vont intégralement à la compétence et aucun à la caractéristique Rêve. (Pareillement, Exaltation et Dissolution n’impactent pas cette Comp.)</span></p><p class=\"BulletCxSpMiddle\" style=\"mso-list: l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: Symbol\">· </span></span><span lang=\"FR\"><strong>Apprentissage</strong>\_: avec un maitre à temps plein </span><span style=\"color:gray;\nmso-themecolor:background1;mso-themeshade:128\">(cfr. p77 du manuel.)\_</span>Permet également l’acquisition d’aptitudes spéciales pour cette compétence, pour un coût en XP distinct pour chaque aptitude.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 70.5pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o </span></span><span lang=\"FR\">Un Arpenteur peut acquérir ses niveaux dans la compétence par le biais de l’Apprentissage mais, la progression est beaucoup plus lente que par l'entraînement solitaire (car en Gris-Rêve)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 70.5pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o </span></span><span lang=\"FR\">Tout niveau en compétence d’Arpentage acquis avec un maître permet d’acquérir gratuitement une aptitude accessible à l’élève (selon son niveau au début de l’Apprentissage)</span></p><p class=\"BulletCxSpLast\" style=\"margin-bottom: 0in; mso-add-space: auto; mso-list: l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: Symbol\">· </span></span><span lang=\"FR\"><strong>Entrainement\_Solitaire</strong> : consiste à exercer son aptitude en disciplinant son Rêve et sa concentration et en canalisant sur le tissu onirique sa capacité à en déformer et à en altérer la trame. L’Arpenteur doit procéder sans aller systématiquement jusqu’à l’ouverture effective de déchirures, ceci pour éviter une dépense trop importante de pts actuels de rêve durant l’entrainement.</span><span style=\"mso-spacerun:yes\">\_ </span><em>(pas de niv. Max)</em></p><p class=\"MsoListParagraphCxSpFirst\" style=\"margin-top: 0in; margin-right: 7.9pt; margin-bottom: 6.0pt; margin-left: 57.0pt; mso-add-space: auto; text-indent: -13.5pt; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o </span></span><span lang=\"EN-GB\"><strong>Coût</strong>\_: l’Arpenteur décide du nombre de points de rêve à dépenser (max 5r/H, garantissant +1XP)</span></p><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-top: 0in; margin-right: 7.9pt; margin-bottom: 6.0pt; margin-left: 57.0pt; mso-add-space: auto; text-indent: -13.5pt; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o </span></span><span lang=\"EN-GB\"><strong>Difficulté</strong>\_: jet sous le % de </span><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">rêve initial</span></span> (=<strong>r/-8</strong>) au début de l’heure d’entrainement</p><p class=\"MsoListParagraphCxSpLast\" style=\"margin-top: 0in; margin-right: 7.9pt; margin-bottom: .0001pt; margin-left: 57.0pt; mso-add-space: auto; text-indent: -13.5pt; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o </span></span><span lang=\"EN-GB\"><strong>Gain\_</strong>: chaque point dépensé octroie un jet --&gt; +1XP par succès\_; minimum +1XP si 5r depensé</span></p><p class=\"Bullet\" style=\"mso-list: l0 level1 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: Symbol\">· </span></span><span lang=\"FR\"><strong>Limitation\_: </strong>L’Arpenteur ne peut gagner plus de niveaux que </span><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">1 par jour</span></span>, <span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">5 par semaine</span></span>, <span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">10 par mois</span></span>.</p>"
      descriptionmj: ''
      frequence: 0
      hautrevant: false
      refoulement: null
