  - _id: QOhJNE1mM9bTMVWb
    name: Bois en feu
    type: sort
    img: systems/foundryvtt-reve-de-dragon/icons/competence_oniros.webp
    effects: []
    system:
      description: >-
        <p>Le principe de la Transmutation &Eacute;l&eacute;mentale est de
        transformer un &eacute;l&eacute;ment en un autre, par exemple le
        m&eacute;tal en bois, l&rsquo;air en feu. Il n&rsquo;existe de
        transmutation que pour les six premiers &eacute;l&eacute;ments. La
        mati&egrave;re dont sont compos&eacute;es les cr&eacute;atures, mortes
        ou vivantes, n&rsquo;est jamais transmu&eacute;e, y compris l&rsquo;air
        contenu dans les poumons. Il existe 26 transmutations
        &eacute;l&eacute;mentales ; chacune est un sort &agrave; part
        enti&egrave;re, ob&eacute;issant en tout point aux r&egrave;gles des
        sorts de zone.</p>

        <p>La transmutation a lieu dans la zone param&eacute;tr&eacute;e et
        cibl&eacute;e par le haut-r&ecirc;vant. Tout ce qui appartient &agrave;
        l&rsquo;&eacute;l&eacute;ment impliqu&eacute; est transmu&eacute;
        instantan&eacute;ment sans discrimination. On ne peut pas faire de
        choix. Tant que dure la zone, tout nouvel objet appartenant &agrave;
        l&rsquo;&eacute;l&eacute;ment impliqu&eacute; qui p&eacute;n&egrave;tre
        dans la zone, est imm&eacute;diatement transmu&eacute; &agrave; son
        tour. La zone peut fort bien &ecirc;tre lanc&eacute;e sur un lieu
        o&ugrave; l&rsquo;&eacute;l&eacute;ment impliqu&eacute; n&rsquo;existe
        pas, par exemple Terre en Eau &agrave; 5 m du sol. Rien ne se produira
        au premier abord, mais toute pierre lanc&eacute;e dans la zone sera
        instantan&eacute;ment liqu&eacute;fi&eacute;e pour retomber sous forme
        de pluie.</p>

        <p>Tout objet transmu&eacute;, situ&eacute; ou entrant dans la zone,
        adopte aussit&ocirc;t la forme que lui permet le nouvel
        &eacute;l&eacute;ment. On peut obtenir de gracieuses torsades avec du
        feu transmu&eacute; en bois ou en m&eacute;tal. La transmutation est
        d&eacute;finitive, m&ecirc;me si l&rsquo;objet sort de la zone. &Agrave;
        la fin de la zone (HN), l&rsquo;effet cesse d&rsquo;op&eacute;rer, mais
        la mati&egrave;re transmu&eacute;e le demeure d&eacute;finitivement sans
        recouvrer non plus son &eacute;l&eacute;ment d&rsquo;origine.</p>

        <p>Quand une cr&eacute;ature vivante se retrouve dans une zone de
        Transmutation &Eacute;l&eacute;mentale, bien que la mati&egrave;re dont
        elle est compos&eacute;e ne soit pas affect&eacute;e en elle-m&ecirc;me,
        elle subit l&rsquo;effet naturel et normal du nouvel
        &eacute;l&eacute;ment qui l&rsquo;entoure, sans jet de
        r&eacute;sistance. Une cr&eacute;ature prise dans une zone d&rsquo;Air
        en Feu se retrouve dans un brasier qui la br&ucirc;le, une
        cr&eacute;ature nageant prise dans une zone d&rsquo;Eau en Bois se
        retrouve enkyst&eacute;e dans un bloc de bois, etc.</p>

        <p>L&rsquo;&eacute;l&eacute;ment Eau correspondant &agrave; tous les
        liquides d&rsquo;origine non animale, r&eacute;ellement aqueux ou non,
        c&rsquo;est tout le liquide qui est transmu&eacute; et non pas
        uniquement ses mol&eacute;cules de H2O, y compris tout ce qui peut y
        &ecirc;tre dissout (sels, cristaux). L&rsquo;eau d&rsquo;un
        v&eacute;g&eacute;tal (s&egrave;ve, jus d&rsquo;un fruit) appartient
        &agrave; l&rsquo;&eacute;l&eacute;ment Bois, qui est celui du
        v&eacute;g&eacute;tal, tant qu&rsquo;il est contenu dans ce dernier.
        L&rsquo;humus appartient int&eacute;gralement &agrave;
        l&rsquo;&eacute;l&eacute;ment Terre, m&ecirc;me s&rsquo;il est
        compos&eacute; en grande partie de mati&egrave;re v&eacute;g&eacute;tale
        (Bois) non encore d&eacute;compos&eacute;e.</p>

        <h2>&Eacute;l&eacute;ments d'arriv&eacute;e</h2>

        <p><strong>X &eacute;l&eacute;ment en Air</strong> : Pratiquement,
        l&rsquo;ancien &eacute;l&eacute;ment dispara&icirc;t dans un courant
        d&rsquo;air. L&rsquo;air d&rsquo;arriv&eacute;e est toujours frais et
        pur.</p>

        <p><strong>X &eacute;l&eacute;ment en Terre</strong> :
        L&rsquo;&eacute;l&eacute;ment d&rsquo;arriv&eacute;e est une roche
        friable et fragile comme de la craie.</p>

        <p><strong>X &eacute;l&eacute;ment en Eau</strong> : L&rsquo;eau
        nouvellement cr&eacute;&eacute;e se comporte naturellement,
        attir&eacute;e par la pesanteur : elle pleut, coule, cherche &agrave;
        s&rsquo;infiltrer. Elle a la puret&eacute; de l&rsquo;eau
        distill&eacute;e.</p>

        <p><strong>X &eacute;l&eacute;ment en Feu</strong> : L&rsquo;ancien
        &eacute;l&eacute;ment devenu Feu n&rsquo;est plus que flammes.
        Toutefois, pour que ces nouvelles flammes continuent &agrave;
        br&ucirc;ler, il leur faut un combustible, faute de quoi elles
        s&rsquo;&eacute;teignent. Quand c&rsquo;est l&rsquo;Air qui est
        transmu&eacute; en Feu, celui-ci demeure m&ecirc;me sans combustible,
        car l&rsquo;Air entourant la zone la comble imm&eacute;diatement,
        devenant Feu &agrave; son tour. Le r&eacute;sultat est une sph&egrave;re
        en permanente ignition. Il en va de m&ecirc;me pour l&rsquo;eau au
        centre d&rsquo;une rivi&egrave;re par exemple.</p>

        <p><strong>X &eacute;l&eacute;ment en Bois</strong> : Le bois
        d&rsquo;arriv&eacute;e est un bois de qualit&eacute; m&eacute;diocre, du
        genre sapin, mais sec, sans aucune s&egrave;ve ni r&eacute;sine,
        combustible ou fa&ccedil;onnable.</p>

        <p><strong>X &eacute;l&eacute;ment en M&eacute;tal</strong> : Il ne
        s&rsquo;agit toujours que des deux m&eacute;taux les plus inertes : fer
        ou plomb (tirer &agrave; pile ou face). Le fer de transmutation
        n&rsquo;est ni de l&rsquo;acier ni du fer forg&eacute;, c&rsquo;est du
        fer natif, mou et sans duret&eacute;. Un forgeron peut n&eacute;anmoins
        le travailler.</p>

        <h2>Objets magiques</h2>

        <p>&Agrave; mi-chemin entre les cr&eacute;atures et la mati&egrave;re
        inerte, les objets magiques ont droit &agrave; un jet de
        r&eacute;sistance pour ne pas &ecirc;tre impliqu&eacute;s dans une
        transmutation. C&rsquo;est un JR sp&eacute;cial, r0, o&ugrave; la
        protection magique du mat&eacute;riau est prise en guise de points de
        r&ecirc;ve (voir <em>R&eacute;sistance</em>).</p>
