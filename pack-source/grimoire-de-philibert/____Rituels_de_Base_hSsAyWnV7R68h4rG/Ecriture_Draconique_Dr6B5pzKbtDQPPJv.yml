system:
  description: "<p><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">– </span><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span>\_: Cree un signe visible et lisible seulement par les Haut-Rêvants, sur 1 type de case TMR (choisi\_par le H-R lors de l'Ecriture). Ce signe dissimule un message et non des points de sorts.</p><p><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">– </span><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Support</span></strong></span> : Le\_signe peut\_être\_inscrit sur tout support stable/contenu perceptible par la vue<span style=\"mso-tab-count:1\"> (</span><em>Ex. pierre, bois, sable, eau contenue, le H-R\_lui-même, un individu, vêtements, corps nu…)</em></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">Un support flexible fera disparaitre temporairement le signe s'il est\_plié.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">Le\_signe n'est\_plus visible/lisible si le support est\_caché\_à\_la vue.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">Le signe est\_dissipé\_définitivement si son support est\_dispersé (s’évapore\_; se renouvèle)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">Possibilité d’écrire différentes parties de phrase/mots sur des supports séparés qui, une fois réunit, permettront de recomposer une phrase complète.</span></p><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-top: 0in; margin-right: 7.6pt; margin-bottom: 8.0pt; margin-left: 70.5pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: Symbol\">· </span></span><span lang=\"FR\">Les signes étant considérés distincts les uns des autres</span></p><p class=\"MsoListParagraphCxSpLast\" style=\"margin-top: 0in; margin-right: 7.6pt; margin-bottom: 8.0pt; margin-left: 70.5pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: Symbol\">· </span></span><span lang=\"FR\">Le «\_lecteur\_» doit déchiffrer séparément chaque signe Draconique</span></p><p><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">– </span><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Cout</span></strong></span> : 1 pt de\_rêve\_tous les 5 mots\_; trait d'union et apostrophe non comptabilises.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">+1r par <strong>jour</strong>\_supplémentaire\_; </span><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">+10r</span></strong><span style=\"text-decoration: underline;\"> pour rendre le signe </span><strong><span style=\"text-decoration: underline;\">permanent</span></strong></span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">+1r par <strong>type de case</strong>\_de lecture supplémentaire</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">+2r par <strong>case spécifique</strong> de lecture (1 ou plusieurs, parmi les types de case permis)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">+r+ pour volontairement augmenter la<strong> Difficulté</strong> de lecture\_(+1r pour diff+1)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">+2r</span><span style=\"color:#0070C0\"><strong>*</strong></span> pour rendre le signe visible/lisible qu’à certaines <strong>Heures Draconique</strong> de la journée.\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">+2r</span><span style=\"color:#0070C0\"><strong>*</strong></span> pour rendre le signe visible/lisible qu’au H-R nés à certaines <strong>HN spécifiques</strong>.\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">+5r</span><span style=\"color:#0070C0\"><strong>*</strong></span> pour rendre le signe visible/lisible par certaines <strong>Voie Draconique </strong>spécifiques</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1; text-align: center\"><span lang=\"FR\" style=\"color:#0070C0\"><strong>*</strong></span><span lang=\"FR\">Cout fixe peu importe le nombre d’H / HN / Voies choisies</span></p><p></p><p><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">– </span><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Lecture</span></strong></span> : lisible par un Haut-Rêvant avec <strong>INT/Draconique à 0 – difficulté</strong> du signe (r+)</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">Ce jet ne peut être tenté qu’une seule fois </span><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">par Voie Draconique</span></span>.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">S’il échoue le Haut-Rêvant continue de sentir le signe mais ne peut plus le lire tant qu’il n’a pas\_augmenté\_son niveau d’au moins 1 dans cette voie.\_</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">En cas de <strong>case\_spécifique </strong>: tâtonner jusqu’au type de case permis pour révéler intuitivement (sans jet\_supplémentaire)\_la case\_spécifique de lecture.</span></p><p></p><p><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">– </span><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Signature Draconique</span></strong></span> : L’auteur d’un tel Signe Draconique laisse toujours inconsciemment une marque de lui-même\_à\_l’intérieur du ou des signes qu’il «\_écrit\_».\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">Le lanceur de ce sort n’est jamais conscient de la nature de la marque qu’il laisse et ne peut la déceler, de même qu’aucun Haut-Rêvant «\_lecteur\_» ne peut la lui décrire.\_</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">Cette marque peut\_être\_perçue par un Haut-Rêvant\_lisant le signe sur une réussite\_<strong>particulière</strong>\_au jet de lecture.\_Une fois cette signature identifiée, le lecteur pourra la reconnaitre dans tout autre signe écrit par le même auteur. ==&gt; @UUID[Compendium.a-perte-de-reve.grimoire-de-philibert.Item.bVIo5b6N6A55uhZe]{Identification de Signature Draconique}</span></p><p></p><blockquote><p><span style=\"text-decoration: underline;\"><span style=\"font-family: 'Calibri',sans-serif\"><em><span style=\"text-decoration: underline;\">Source</span></em></span></span><span style=\"font-family: 'Calibri',sans-serif\"><em> : Alain G.</em></span></p><p><span style=\"text-decoration: underline;\"><span style=\"font-family: 'Calibri',sans-serif\"><em><span style=\"text-decoration: underline;\">Trivia</span></em></span></span><span style=\"font-family: 'Calibri',sans-serif\"><em>\_: </em></span><span lang=\"FR\"><em>Le HR et Enchanteur Brandzefrod utilisa ce sort pour laisser à la postérité des notes sur ses recherches concernant l’Enchantabilité des fluides (Retranscrit par Philibert l’Accidenteur)</em></span></p></blockquote>"
