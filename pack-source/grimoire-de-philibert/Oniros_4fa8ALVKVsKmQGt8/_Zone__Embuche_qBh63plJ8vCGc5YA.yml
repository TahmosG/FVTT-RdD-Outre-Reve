system:
  description: >-
    <p>L’effet de Fauchage ne s’applique qu’aux humanoïdes. Il provoque chez la
    cible l’illusion qu’on vient de lui faucher les jambes, illusion si
    saisissante que le personnage chute, sans pouvoir se rattraper. L’effet de
    Fauchage n’a pas d’autre conséquence, mais la chute peut, elle, en avoir. En
    fonction du type d’activité, marche, course, escalade, et du sol de
    réception, c’est au gardien des rêves d’en déterminer le jet d’encaissement.
    La victime peut normalement se relever le round suivant. Noter qu’un
    Fauchage sur un humanoïde couché ou assis n’a virtuellement aucun effet.</p>
