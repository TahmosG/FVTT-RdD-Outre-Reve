system:
  description: "<div><p><span style=\"font-family: CaslonAntique\">– </span><span style=\"text-decoration: underline;\"><span style=\"font-family: CaslonAntique\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span></span><span style=\"font-family: CaslonAntique\"> : </span>permet à un récipient d'entreposer, aisément, plus que sa contenance normale\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Tout objet entrant dans le sac est réduit au quart de son Volume et Encombrement originel\_</p><div><p class=\"MsoListParagraphCxSpLast\" style=\"margin-top: 0in; margin-right: -5.75pt; margin-bottom: 6.0pt; margin-left: 70.5pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\">— Il est possible de maintenir sa prise sur l’objet, lors du changement de taille\_</p></div><p class=\"MsoListParagraphCxSpLast\" style=\"margin-top: 0in; margin-right: -5.75pt; margin-bottom: 6.0pt; margin-left: 70.5pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\">— Attention toutefois aux risques de maladresse du a la reprise de taille et de poids...\_\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>La réduction s’effectue aussitôt qu’une partie de l’objet commence à rentrer dans le sac.\_\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>L’objet reprend sa taille initiale dès qu’il est entièrement hors du sac\_</p></div></div></div><div><div><p><span style=\"font-family: CaslonAntique\">– </span><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Le contenu</span></strong></span> : tout objet entrant même partiellement dans le sac est affecté, si bien qu’on peut y faire entrer des objets dont la taille ne le permettrait normalement pas eu égard à la taille de son ouverture.\_</p></div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>La résistance des objets dans le sac est magiquement retenue, tant résistance magique que physique</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Les créatures revantes ne sont pas affectés par cette Grande Ecaille\_</p></div></div><div><div><p><span style=\"font-family: CaslonAntique\">– </span><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Le contenant</span></strong></span> : la cible de cette Grande Ecaille se doit d’être un contenant fermable (tel un sac ou un coffre)\_</p></div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Volume maximal : 200 litres (2 litres = 1 pt d’Encombrement) &gt;&gt; cout = 5r +1r par 10 litres\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Le contenant ne peut soutenir plus que son litrage ou que son encombrement maximum\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>L’ouverture doit être de taille limitée et fermable (couvercle, lacet...), ne peut se déplier intégralement\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>L’encombrement du Contenant n’est pas affecté par l’enchantement, seul son contenu l’est</p></div><div><table class=\"Table Ltr TableWordWrap SCXW235972475 BCX0\" border=\"1\" data-tablestyle=\"MsoTableGrid\" data-tablelook=\"1696\" aria-rowcount=\"5\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 48px; padding: 0px; user-select: text; table-layout: fixed; width: 0px; border-collapse: collapse; empty-cells: show; position: relative; overflow: visible; color: rgb(0, 0, 0); font-family: 'Segoe UI', 'Segoe UI Web', Arial, Verdana, sans-serif; font-size: 12px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 400; letter-spacing: normal; orphans: 2; text-align: start; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: normal; background: transparent; text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial; border-spacing: 0px;\"><tbody><tr class=\"TableRow SCXW235972475 BCX0\" role=\"row\" aria-rowindex=\"1\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow: visible; height: 20px;\"><td class=\"FirstRow FirstCol SCXW235972475 BCX0\" role=\"rowheader\" data-celllook=\"4097\" colspan=\"3\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow: visible; vertical-align: top; position: relative; 