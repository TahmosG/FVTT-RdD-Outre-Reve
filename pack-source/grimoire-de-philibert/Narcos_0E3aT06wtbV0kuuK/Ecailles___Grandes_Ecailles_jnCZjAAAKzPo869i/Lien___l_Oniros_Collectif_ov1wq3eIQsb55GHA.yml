  description: "<div><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Permet de lier un objet à l’Oniros Collectif Draconique.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Tout effet pouvant agir à distance sans ligne de vue pourra marcher avec un paramétrage incluant un autre rêve.\_<em>(Ex. Un miroir pourra utiliser « Invoquer sa présence » pour interagir avec un autre rêve.</em>)</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>L’Oniros collectif est fluctuant : le cout du sort est déterminé par un Ddr+7\_</p></div></div><div><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">JR</span></strong></span> : L’inconscient résiste au lancé du sort dans les TMR avec une force de Ddr /-8 : en cas de réussite, le Haut-Rêvant subit un Rêve de Dragon au lieu du contre-sort habituel.\_</p><p></p></div><div><blockquote><p><span style=\"text-decoration: underline;\"><em><span style=\"text-decoration: underline;\">Source</span></em></span><em> : Le Quart-Livre</em>\_</p></blockquote></div>"
