name: Réminiscence (Phil)
type: sort
img: systems/foundryvtt-reve-de-dragon/icons/sorts/sort_narcos.webp
_id: 7C97G08mZwFE56Yn
system:
  description: "<div><div><p>— <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Ce sort permet de créer un souvenir parfait de l’ensemble des perceptions de la cible dans les instants à venir. Ces sensations son ‘cristallisées’ dans la case TMR du rituel.\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>L’état « d’absorption» dure une minute par point de rêve dépensé.\_</p><div><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>L’expérience préservée englobe l’intégralité des sens et bénéficie d’une restitution parfaites (même inconscient)\_</p><div><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Ce souvenir, imprégné dans la trame de sa case TMR, reste vivide dans la conscience du HR jusqu’à HN\_</p></div></div></div></div></div></div><div><div><p>— <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Mise en Reserve</span></strong></span> : ce sort, visant la préservation de l’expérience, est prévu pour être mis en réserve\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Selon les règles usuelles, +1 point de rêve pour mise en réserve ; maximum 1 sort par case\_</p><div><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Entrer sur la case active la réminiscence, (re-)active le sort dont le souvenir restera vivide jusque à HN\_</p><div><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Tant que la Réminiscence est vivide, elle peut être remise en réserve\_</p></div></div></div></div></div></div><div><p>En se rendant sur la case TMR d’ancrage, le Haut-Rêvant peut ainsi réactiver chaque Réminiscence, et l’étudier dans les moindres détails jusque son HN (…et la remettre en réserve si besoin)\_</p></div><table class=\"Table Ltr TableWordWrap SCXW86602629 BCX0\" border=\"1\" data-tablestyle=\"MsoTableGrid\" data-tablelook=\"1184\" aria-rowcount=\"6\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 22px; padding: 0px; user-select: text; table-layout: fixed; width: 0px; border-collapse: collapse; empty-cells: show; position: relative; overflow: visible; color: rgb(0, 0, 0); font-family: 'Segoe UI', 'Segoe UI Web', Arial, Verdana, sans-serif; font-size: 12px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 400; letter-spacing: normal; orphans: 2; text-align: start; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: normal; background: transparent; text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial; border-spacing: 0px;\"><tbody><tr class=\"TableRow SCXW86602629 BCX0\" role=\"row\" aria-rowindex=\"1\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow: visible; height: 20px;\"><td class=\"FirstRow FirstCol SCXW86602629 BCX0\" role=\"rowhe