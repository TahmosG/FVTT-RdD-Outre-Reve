system:
  description: >-
    <p>Restauration est un rituel secondaire nullement obligatoire. Son seul
    usage est de redonner des points de rêve actifs à une amulette de
    protection. Il est en effet impossible d'utiliser le simple Enchantement une
    fois le rituel de Permanence accompli. Restauration fonctionne de façon
    semblable à un Enchantement, sauf que son accomplissement coûte chaque fois
    un point de seuil. On peut&nbsp; restaurer les points de rêve d'une amulette
    en plusieurs fois en intercalant un rituel de Purifcation entre chaque
    rituel de Restauration (qui coûte chaque fois un point de seuil). Il est
    possible de redonner plus de points de rêve actifs à l'objet qu'il n'en
    avait au départ, jusqu'à concurrence du maximum possible. Le nombre maximum
    de points de rêve actifs qu'un objet puisse posséder est égal à 7 fois
    l'enchantabilité de sa gemme.</p>
