system:
  description: "<p>Les enchantements de Brandzefrod sont en fait des <strong>Sorts</strong> (et non rituels) permettant d'enchanter une quantité de liquide statique dans un contenant (generalement, pour 1r par mesure de 20cl)</p><hr><p></p><p><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">– </span><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span>\_: transforme une quantité de liquide statique et pris dans un contenant en un spiritueux héritant de la saveur et de l’aspect du liquide enchanté en plus du goût habituel de l’alcool.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">Le Haut-Rêvant contrôle la concentration d’alcool\_: Jusqu’à 50°, où le liquide pourra être enflammé (à température ambiante)\_; Et même au-delà de 50° où il pourra devenir un poison.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">Le volume affecté est égal à 1 mesure (20cl) par point de rêve </span><span lang=\"FR\" style=\"font-size:10.0pt;\nline-height:115%\">(soit 3 mesures pour le cout le base)</span></p><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Avertissement</span></strong></span> : Si le Haut-Rêvant lance ce sort sur un volume de liquide trop important il en résulte un cas de magie impossible et une déchirure apparaît centrée sur le liquide.</p><p></p><hr><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Considérations</span></strong></span> :\_\_</p><div><p>-- Un liquide préalablement enchanté ne pourra être « sur-enchanté » par un sortilège du présent traité. Lancer l’un de ces enchantements sur un liquide déjà enchanté aboutira à un cas de magie impossible qui provoquera l’ouverture d’une déchirure de Rêve centrée sur le liquide en question.\_\_</p><p>-- Le non-respect de toute règle associée à l’un des enchantements qui suit (liquide statique, liquide maintenu dans un contenant, volume limite de liquide enchantable, …) aboutira aussi à un cas de magie impossible et à l’ouverture d’une déchirure de Rêve centrée sur le liquide impliqué.\_</p><p></p></div><blockquote><p><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Source</span></span> : Alain G.- sur l’Enchantabilité des Liquide, par la HR Brandzefrod\_; inscriptions murales dans une tour abandonnée</p></blockquote></div>"
