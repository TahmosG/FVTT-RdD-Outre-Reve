name: '[Brandzefrod] Lumière/Ombre de Narcos'
type: sort
img: systems/foundryvtt-reve-de-dragon/icons/objets/elixir_des_gnomes.webp
system:
  description: "<p>Les enchantements de Brandzefrod sont en fait des <strong>Sorts</strong> (et non rituels) permettant d'enchanter une quantité de liquide statique dans un contenant (generalement, pour 1r par mesure de 20cl)</p><hr><p></p><p><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">– <strong><span style=\"text-decoration: underline;\">Effet</span></strong>\_: rend un liquide lumineux comme une bonne lanterne, émettant une lumière blanc-bleuté caractéristique. N’affecte pas ses autres propriétés naturelles y compris sa potabilité.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">Chaque point de rêve dépensé affecte 1 mesure de liquide (20cl) - Soit 3 mesures pour le coût standard</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">Une fois enchanté, le liquide peut être divisé tout en conservant la propriété lumineuse sur chaque partie du liquide. Si le liquide est répandu, sa lumière n’éclairera davantage qu’un simple halo de 1m</span></p><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-top: 0in; margin-right: 7.6pt; margin-bottom: 8.0pt; margin-left: 70.5pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: Symbol\">· </span></span><span lang=\"FR\">On ne peut espérer obtenir plus que ce simple halo avec moins d’1/2 mesure.</span></p><p class=\"MsoListParagraphCxSpMiddle\" style=\"margin-top: 0in; margin-right: 7.6pt; margin-bottom: 8.0pt; margin-left: 70.5pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: Symbol\">· </span></span><span lang=\"FR\">Enfin on ne peut cumuler une distance d’éclairage supérieure à 30m.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\"><strong>Chaque mesure enchantée éclaire à 5m</strong> (½ mesure éclaire à 2m50, 2 mesures à 10m, etc…)</span></p><p></p><p><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">– <strong><span style=\"text-decoration: underline;\">Inversion</span></strong>\_: Le sort peut être inversé auquel cas il absorbera la lumière, même à travers une fiole en verre, sur une distance égale à celle qu’aurait dû être la portée de sa lumière.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">Toute créature entrant dans la zone affectée sera totalement aveugle et ne percevra rien de l’intérieur comme de l’extérieur de la zone.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">Le liquide sera tenu bien au-dessus de la tête idéalement dans une fiole en verre. Ce qui devrait correspondre à l’inverse des ombres portées ne sera pas pris en compte.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">Si un obstacle majeur vient obstruer la « lumière noire » du liquide, une partie entière de la zone ne sera pas affectée et toute créature à l’intérieure de cette partie préservée pourra voir.</span></p><p class=\"MsoListParagraphCxSpLast\" style=\"margin-top: 0in; margin-right: 7.6pt; margin-bottom: 8.0pt; margin-left: 44.05pt; mso-add-space: auto\"><span lang=\"FR\" style=\"color:gray;mso-themecolor:background1;mso-themeshade:128\"><em>(ex. plancher, rideau, mur, l’action volontaire du joueur dirigeant le « faisceau » de son liquide…)</em></span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Les créatures à l’extérieur du « faisceau de lumière noire » garderont leur vision mais ne pourront voir à l’intérieur de la zone qui ressemblera pour eux à des ténèbres naturelles mais qui pourraient sembler étranges si l’environnement immédiat ne les justifie pas.</p><p></p><hr><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Considérations</span></strong></span> :\_\_</p><div><p>-- Un liquide préalablement enchanté ne pourra être « sur-enchanté » par un sortilège du présent traité. Lancer l’un de ces enchantements sur un liquide déjà enchanté aboutira à un cas de magie impossible qui provoquera l’ouverture d’une déchirure de Rêve centrée sur le liquide en question.\_\_</p><p>-- Le non-respect de toute règle associée à l’un des enchantements qui suit (liquide statique, liquide maintenu dans un contenant, volume limite de liquide enchantable, …) aboutira aussi à un cas de magie impossible et à l’ouverture d’une déchirure de Rêve centrée sur le liquide impliqué.\_</p></div></div><p></p><blockquote><p><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Source</span></span> : Alain G.- sur l’Enchantabilité des Liquide, par la HR Brandzefrod\_; inscriptions murales dans une tour abandonnée</p></blockquote>"
