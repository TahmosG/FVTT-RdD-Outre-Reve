system:
  description: "<p>Les enchantements de Brandzefrod sont en fait des <strong>Sorts</strong> (et non rituels) permettant d'enchanter une quantité de liquide statique dans un contenant (generalement, pour 1r par mesure de 20cl)</p><hr><p></p><p><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">– <strong><span style=\"text-decoration: underline;\">Effet</span></strong>\_: refroidit jusqu’au gel ou chauffe jusqu’à ébullition tout liquide non magique en 1 round. </span><span style=\"mso-spacerun:yes\">\_\_\_\_</span><span style=\"color:gray;\nmso-themecolor:background1;mso-themeshade:128\">Ex. <span style=\"text-decoration: underline;\">ébullition</span></span><span style=\"mso-char-type:symbol;mso-symbol-font-family:Wingdings\"><span style=\"font-family: Wingdings\"><span style=\"text-decoration: underline;\">à</span></span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;color:gray;mso-themecolor:\nbackground1;mso-themeshade:128\"><span style=\"text-decoration: underline;\">Gel</span></span><span lang=\"FR\" style=\"font-size:\n12.0pt;line-height:115%;color:gray;mso-themecolor:background1;mso-themeshade:\n128\">\_: alcool (78°c </span><span style=\"mso-char-type:symbol;\nmso-symbol-font-family:Wingdings\"><span style=\"font-family: Wingdings\">à</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;color:gray;mso-themecolor:background1;\nmso-themeshade:128\"> -100°c) ; eau (100°c </span><span style=\"mso-char-type:symbol;mso-symbol-font-family:Wingdings\"><span style=\"font-family: Wingdings\">à</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;color:gray;mso-themecolor:\nbackground1;mso-themeshade:128\"> 0°c) ; mercure (357°c </span><span style=\"mso-char-type:symbol;mso-symbol-font-family:Wingdings\"><span style=\"font-family: Wingdings\">à</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%;color:gray;mso-themecolor:\nbackground1;mso-themeshade:128\"> -39°c).</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">La température du liquide ne peut être portée au-delà de son seuil d’ébullition/solidification</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\">Toute matière touchant le liquide sera affectée de manière logique selon la température impliquée et la matière concernée </span><span style=\"color:gray;mso-themecolor:background1;mso-themeshade:\n128\">(ex. du métal se brisera au moindre choc s’il est plongé dans de l’alcool gelé). </span><span lang=\"FR\" style=\"font-size:10.0pt;line-height:115%\">Dans un volume semblable à une casserole, de l’eau en ébullition prendra 20mn à s’évaporer totalement.</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">10 mesures (2 litres) enchantée par point de rêve dépensé </span><span lang=\"FR\">(6 litres pour le coût standard de 3r)</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">Le liquide, répandu ou séparé en plusieurs volumes, continuera à en subir les effets</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Lorsque le sort prend fin, le liquide retourne à sa température normale (selon température ambiante) <span style=\"text-decoration: underline;\">en 1 round</span>.</p><p><span lang=\"FR\" style=\"font-size:12.0pt;\nline-height:115%\">– <strong><span style=\"text-decoration: underline;\">Avertissement</span></strong> : Le liquide à enchanter devra être statique et maintenu dans un contenant.</span></p><p></p><hr><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Considérations</span></strong></span> :\_\_</p><div><p>-- Un liquide préalablement enchanté ne pourra être « sur-enchanté » par un sortilège du présent traité. Lancer l’un de ces enchantements sur un liquide déjà enchanté aboutira à un cas de magie impossible qui provoquera l’ouverture d’une déchirure de Rêve centrée sur le liquide en question.\_\_</p><p>-- Le non-respect de toute règle associée à l’un des enchantements qui suit (liquide statique, liquide maintenu dans un contenant, volume limite de liquide enchantable, …) aboutira aussi à un cas de magie impossible et à l’ouverture d’une déchirure de Rêve centrée sur le liquide impliqué.</p><p></p><blockquote><p><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Source</span></span> : Alain G.- sur l’Enchantabilité des Liquide, par la HR Brandzefrod\_; inscriptions murales dans une tour abandonnée\_</p></blockquote></div></div>"
