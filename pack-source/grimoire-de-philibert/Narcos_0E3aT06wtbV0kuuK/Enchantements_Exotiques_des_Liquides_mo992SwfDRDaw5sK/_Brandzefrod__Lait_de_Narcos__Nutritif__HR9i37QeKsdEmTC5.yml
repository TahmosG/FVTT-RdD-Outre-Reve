ding:0in 5.4pt 0in 5.4pt\" data-colwidth=\"275\"><p class=\"MsoNormal\" style=\"line-height: normal\"><span style=\"font-family: 'Calibri',sans-serif\"><strong>1 point de Sustentation</strong></span></p><p class=\"MsoNormal\" style=\"line-height: normal\"><span style=\"font-family: 'Calibri',sans-serif\"><em>+Neutralise effets nocifs</em></span></p></td></tr></tbody></table><p class=\"MsoNormal\" style=\"margin-right: 7.9pt; tab-stops: 48.8pt\">– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Avertissement</span></strong></span> : Le liquide à enchanter devra être statique et maintenu dans un contenant.</p><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Permanence</span></strong></span> : permet de maintenir plusieurs mesures. Sans quoi, perte d’une mesure par jour.</p><p></p><hr><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Considérations</span></strong></span> :\_\_</p><div><p>-- Un liquide préalablement enchanté ne pourra être « sur-enchanté » par un sortilège du présent traité. Lancer l’un de ces enchantements sur un liquide déjà enchanté aboutira à un cas de magie impossible qui provoquera l’ouverture d’une déchirure de Rêve centrée sur le liquide en question.\_\_</p><p>-- Le non-respect de toute règle associée à l’un des enchantements qui suit (liquide statique, liquide maintenu dans un contenant, volume limite de liquide enchantable, …) aboutira aussi à un cas de magie impossible et à l’ouverture d’une déchirure de Rêve centrée sur le liquide impliqué.\_</p></div></div><p></p><blockquote><p><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Source</span></span> : Alain G.- sur l’Enchantabilité des Liquide, par la HR Brandzefrod\_; inscriptions murales dans une tour abandonnée</p></blockquote>"
