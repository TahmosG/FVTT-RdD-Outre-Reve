  description: "<p>Les enchantements de Brandzefrod sont en fait des <strong>Sorts</strong> (et non rituels) permettant d'enchanter une quantité de liquide statique dans un contenant (generalement, pour 1r par mesure de 20cl)</p><hr><p></p><p><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">– </span><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span>\_: transforme en fluide nourrissant le liquide enchanté, <strong>un point de rêve par mesure</strong> (20cl)</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">Chaque mesure fera profiter pleinement de l’effet complet du sort à quiconque la boira</span></p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span lang=\"FR\" style=\"font-size:12.0pt;line-height:115%\">Effet non-cumulatif et ne pouvant s’ajouter à un autre enchantement actif sur ce liquide</span></p><table class=\"MsoTableGrid\" border=\"1\" style=\"margin-left:11.75pt;border-collapse:collapse;border:none;mso-border-alt:\n dotted #A6A6A6 .5pt;mso-border-themecolor:background1;mso-border-themeshade:\n 166;mso-yfti-tbllook:1184;mso-padding-alt:0in 5.4pt 0in 5.4pt;mso-border-insideh:\n .5pt dotted #A6A6A6;mso-border-insideh-themecolor:background1;mso-border-insideh-themeshade:\n 166;mso-border-insidev:.5pt dotted #A6A6A6;mso-border-insidev-themecolor:background1;\n mso-border-insidev-themeshade:166\"><tbody><tr style=\"mso-yfti-irow:0;mso-yfti-firstrow:yes\"><td style=\"width:251.85pt;border:dotted #A6A6A6 1.0pt;\n  mso-border-themecolor:background1;mso-border-themeshade:166;mso-bor