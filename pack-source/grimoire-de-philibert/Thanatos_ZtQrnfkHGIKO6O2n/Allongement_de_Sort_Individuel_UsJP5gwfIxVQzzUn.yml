  description: "<div><p><strong><span style=\"text-decoration: underline;\">Effet</span></strong> : Ce rituel permet d’allonger la durée d’un sort individuel dont la durée initiale est HN.\_</p><p> — Rallonge la durée d’une Heure Draconique par point de rêve\_</p><p> — Le rituel doit être préalablement accompli dans la case où sera ensuite lancé le sort, sans temps limite entre les deux.\_\_</p><p> — L'effet est comme en réserve et le demi-rêve ne redescend pas automatiquement après ce rituel\_</p></div><div><ul><li><p>Le prochain sort ou rituel sur cette case doit obligatoirement être un sort individuel pouvant être allongé. Si tel n’est pas le cas, il en résulte en cas de Magie impossible\_</p></li></ul></div><div><p><strong><span style=\"text-decoration: underline;\">Avantages</span></strong> : outre le rallongement, c’est une <strong>manière élégante pour un HR de masquer son HN.</strong></p></div>"
