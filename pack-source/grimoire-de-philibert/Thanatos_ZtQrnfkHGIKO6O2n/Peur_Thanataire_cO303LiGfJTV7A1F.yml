system:
  description: >-
    <p>Le sort de Peur Thanataire doit être ciblé sur un objet, lequel, et
    jusqu'à la fin de l'heure de naissance du haut-rêvant, distillera ensuite
    une peur intense. Toute personne apercevant l'objet en question et manquant
    un jet de résistance standard r-8, sera contrainte de s'en détourner, ne
    pouvant supporter de le regarder ni de s'en approcher ou le regarder le(s)
    round(s) suivant(s), il faudra réussir unjet de VOLONTÉ ajusté négativement
    aux points de rêve dépensés. Même chose pour le toucher, le prendre, le
    frapper. Ce jet de VOLONTÉ doit être renouvelé de round en round jusqu'à ce
    qui réussisse.</p>

    <p>Le haut-rêvant de Thanatos est lui-même immunisé contre les effets de sa
    peur thanataire. Par ailleurs, comme c'est la seule vue de l'objet qui
    déclenche la peur, il n'y a aucun effet tant que l'objet est dissimulé, dans
    une poche par exemple.</p>
