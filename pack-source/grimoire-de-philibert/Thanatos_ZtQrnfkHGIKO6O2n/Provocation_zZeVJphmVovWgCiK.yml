  description: "<div><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Ce sortilège permet de forcer une entité de cauchemar à attaquer le Haut-Rêvant,\_\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Qu’elle soit actuellement libre, en train de combattre quelqu'un d'autre, possédant quelqu'un d'autre, contrôlée par un Haut-Rêvant ou emprisonnée dans un os.\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Le JR est effectué par le Haut-Rêvant contrôlant l'entité de cauchemar si celle-ci est dominée, et par l'entité elle-même dans le cas contraire.\_</p></div></div><div><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">En cas de réussite au JR</span></strong></span> : le Haut-Rêvant doit réussir un JR-0 pour chacune des entités de cauchemar qu'il porte sur lui, sous peine de la voir se libérer et se retourner contre lui...\_</p><p></p><blockquote><p><span style=\"text-decoration: underline;\"><em><span style=\"text-decoration: underline;\">Source</span></em></span><em> : https://oniropaedia.lm7.fr/index.php/Provocation</em> \_</p></blockquote></div>"
