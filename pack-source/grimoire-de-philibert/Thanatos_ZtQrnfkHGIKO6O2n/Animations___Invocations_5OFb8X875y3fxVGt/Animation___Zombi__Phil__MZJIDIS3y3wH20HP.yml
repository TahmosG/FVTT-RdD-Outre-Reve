system:
  description: "<div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Transforme un cadavre en simulacre de vie tel l’ECI « Zombie » :\_\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Caractéristiques selon la Taille (du cadavre) et le Rêve (r investis, Max. Taille) mais son Endurance ne peut dépasser celle de la Créature ; ainsi son Rêve Max = Endurance – Taille\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Distinguable des vivants par sa pâleur et regard fixe, ou pire selon son état lors du rituel. <em>Tant qu’inachevé : Reste sujet à la putréfaction et aux prédateurs\_; une fois son Rêve au Max : interrompt tout processus de putréfaction</em>\_\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Ne conserve pas les facultés spéciales de la créature (ex. poison)\_</p></div></div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Coût</span></strong></span> : <strong>1r par point de R</strong> (<span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">jusqu’à 12R</span></span>), <span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">puis 3r</span></span> par point supplémentaires. Cette dépense est possible en plusieurs fois, mais toujours sur la même case TMR.\_</p></div><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Contrôle</span></strong></span> : n’agit qu’aux ordres de son Invocateur (E1) et devient sauvage à la mort de ce dernier. A noter qu'un Zanimal est moins facilement contrôlable qu’un Zhumanoïde et requiert un jet de RÊVE pour déterminer si l’ordre a été correctement compris. Selon la difficulté de l’ordre :\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><strong>JR/–0</strong> = Ordre simple : Attaque [cible], Viens, Assis\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><strong>JR/–2</strong> = Ordre complexe ou long : Va chercher [cible], Protège [cible]\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><strong>JR/–5</strong> = Ordre conditionnel : Grogne quand quelqu’un passe, …\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><strong>Le</strong> <strong>dressage</strong> d’un Zanimal permet d’augmenter ses chances de succès (jusqu’à un bonus de +3)\_</p></div></div></div><p>En cas d’échec, l’ordre est « mal interprété » par la Zanimal, qui reste neanmoins sous le controle de son maître \_</p></div><div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Annulation</span></strong></span> : le Rituel d’Annulation de la Magie peut être utilisé à 2 niveaux sur un Zombie\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Annulation partielle</span></span> (5r) : brise le lien entre le Zombie et son créateur —&gt; Zombar*</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Annulation complète</span></span> (r=R) : brise le rituel —&gt; redevient cadavre et subit une putréfaction soudaine, équivalente à la durée de son non-rêve.\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">Reprise de contrôle</span></span> : Il est possible de prendre le contrôle d’un Zombar en y insufflant son propre rêve : 3r si l’on est son invocateur // l’intégralité du Rêve de la Créature autrement.\_</p></div></div><blockquote><p><span style=\"text-decoration: underline;\"><em><span style=\"text-decoration: underline;\">Source</span></em></span><em> : modification apportée par Philibert l’Accidenteur afin de frimer avec un Grizzal pour monture\_</em></p></blockquote></div><hr><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Caractéristiques</span></strong></span> : Selon la <strong>Taille</strong> (du cadavre) et le <strong>Rêve</strong> (r investis, Max. Taille)\_</p><img class=\"WACImage SCXW210546938 BCX0\" alt=\"Table\n\nDescription automatically generated\" src