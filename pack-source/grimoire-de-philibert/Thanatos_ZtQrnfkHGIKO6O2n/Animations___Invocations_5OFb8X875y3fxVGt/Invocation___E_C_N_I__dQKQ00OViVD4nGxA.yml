  description: "<div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Force l’ECNI la plus proche à venir se présenter face au HR, qu’elle tentera de posséder !\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Déplacement 6m/round ou 1d7 heure avant d’arriver, n’attaque personne sur son chemin\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Le HR peut la contrôler si vaincu par Thanatos (les ECNI ont 4d6 points de Rêve)</p></div><p></p><p>Ce Rituel propose les Invocations suivantes, <span style=\"text-decoration: underline;\"><span style=\"text-decoration: underline;\">à synthetiser individuellement</span></span></p></div><table class=\"Table Ltr TableWordWrap SCXW194478425 BCX0\" border=\"1\" data-tablestyle=\"MsoTableGrid\" data-tablelook=\"1184\" aria-rowcount=\"5\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px 0px 0px 40px; padding: 0px; user-select: text; table-layout: fixed; width: 0px; border-collapse: collapse; empty-cells: show; position: relative; overflow: visible; color: rgb(0, 0, 0); font-family: 'Segoe UI', 'Segoe UI Web', Arial, Verdana, sans-serif; font-size: 12px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 400; letter-spacing: normal; orphans: 2; text-align: start; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: normal; background: transparent; text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial; border-spacing: 0px;\"><tbody><tr class=\"Ta