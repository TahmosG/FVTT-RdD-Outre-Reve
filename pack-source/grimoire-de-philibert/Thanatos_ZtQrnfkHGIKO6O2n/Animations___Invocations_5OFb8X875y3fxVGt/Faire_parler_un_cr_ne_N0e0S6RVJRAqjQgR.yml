system:
  description: >-
    <p>Ce rituel permet de faire parler un crâne d'humanoïde. Le haut-rêvant de
    Thanatos doit le toucher et lui poser des questions, le crâne ne répondant
    qu'aux questions posées. Il peut parler de tout ce dont il a été témoin,
    aussi bien durant sa vie que depuis qu'il est mort, c'est-à-dire de ce dont,
    en tant qu'objet abandonné quelque part, il a pu être témoin. La durée de
    communication est de 1 round par point de rêve dépensé.</p>
