  description: "<div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Ce rituel permet de faire chanter un crâne d’humanoïde.\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Peut chanter une chanson connue de sa vie ou entendu après sa mort\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>C’est la voix et compétence de chant du défunt que l’on perçoit\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>La chanson est au choix du Crane, qui s’adapte aux circonstances (Chanson d’ivrogne dans une auberge, chanson enfantine dans une cours de récré…)\_</p></div></div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Durée</span></strong></span> : 1 Minute par point de rêve dépensé, plus en cas d’applaudissements conséquents\_\_</p></div>"
