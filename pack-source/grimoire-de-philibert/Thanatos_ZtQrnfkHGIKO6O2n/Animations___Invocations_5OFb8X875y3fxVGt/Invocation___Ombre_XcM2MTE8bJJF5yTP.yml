system:
  description: "<p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Lorsque le Haut-Rêvant accomplit ce rituel, une partie de son ombre se détache et s’incarne en une entité de cauchemar indépendante.\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Tant qu’on ne lui demande rien, l’Ombre reste attachée au H-R, dont l’ombre paraît presque normale. Un jet de VUE / Vigilance à -8 permet de voir que ses mouvements ne sont pas tout à fait naturels.\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Le H-R peut chuchoter à l’Ombre d’aller <strong>espionner</strong> ou <strong>dérober</strong> un petit objet. D'une voix feutrée, l'Ombre répète tout ce qu'elle a vu et entendu et peut ramener en douce, dans un petit sac d'ombre, ce qu'elle a volé. Suite à quoi elle se fond pour de bon dans le noir.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>L'Ombre se camoufle à merveille et est pratiquement insaisissable : <strong>VUE / Vigilance à -8,</strong> si on la cherche ou lorsqu’elle se déplace dans une zone éclairée.\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Ne se défend que si acculée et préférera l’esquive et la fuite.\_\_</p><div><img class=\"WACImage SCXW247273697 BCX0\" alt=\"Text\n\nDescription automatically generated\" src=\"worlds/rdd-test/assets/items/pasted-image-WQJIMwXr6ZAu0qrk.png\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; border: none; vertical-align: baseline; color: rgb(0, 0, 0); font-family: 'Segoe UI', Tahoma, Verdana, Sans-Serif; font-size: 14.6667px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 400; letter-spacing: normal; orphans: 2; text-align: left; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: pre-wrap; text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial; width: 238px; height: 129px\"><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Particularité</span></strong></span> : Quand l’Ombre est en vadrouille, l’ombre de son maître est incomplète, il lui manque, selon le choix fait quand le rituel est accompli, la tête, une jambe, un bras… ce qui peut effrayer les bonnes gens et créer toutes sortes de problèmes.\_</p><p></p></div><div><blockquote><p><span style=\"text-decoration: underline;\"><em><span style=\"text-decoration: underline;\">Source</span></em></span><em> : \"Vous reprendrez bien une Olive\" par Udhessi</em>\_</p></blockquote></div>"
