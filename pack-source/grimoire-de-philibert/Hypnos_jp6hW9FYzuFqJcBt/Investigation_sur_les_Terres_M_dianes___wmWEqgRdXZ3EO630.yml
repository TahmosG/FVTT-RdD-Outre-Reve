  description: "<div><div><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Ce rituel sert à découvrir sur les terres médianes une créature susceptible d’être invoquée\_</p></div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Le H-R doit avoir une idée de la créature qu’il cherche et de son utilité.\_\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Le GdR définira une créature correspondant (et ses limitation) ainsi que sa case spécifique.\_</p><p>Une fois ce rituel accompli, le H-R pourra synthétiser l’invocation (tel n’importe quel autre sort)\_</p><table><tbody><tr><td class=\"FirstRow FirstCol SCXW154924458 BCX0\" role=\"rowheader\" data-celllook=\"4369\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow: visible; vertical-align: middle; position: relative; background-color: transparent; background-clip: padding-box; border: 1px solid rgb(128, 128, 128); width: 270px;\" data-colwidth=\"211\"><div><div><div><p>[H] Rituel – Invocation de …\_</p></div></div></div></td><td class=\"FirstRow SCXW154924458 BCX0\" role=\"columnheader\" data-celllook=\"4369\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow: visible; vertical-align: middle; position: relative; background-color: transparent; background-clip: padding-box; border: 1px solid rgb(128, 128, 128); width: 90px;\" data-colwidth=\"85\"><div><div><div><p style=\"text-align: center\">Case investiguée</p></div></div></div></td><td class=\"FirstRow SCXW154924458 BCX0\" role=\"columnheader\" data-celllook=\"4369\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow: visible; vertical-align: middle; position: relative; background-color: transparent; background-clip: padding-box; border: 1px solid rgb(128, 128, 128); width: 90px;\" data-colwidth=\"70\"><div><div><div><p>R- ? ; r ?\_</p><p>JR : N/A\_</p></div></div></div></td><td class=\"FirstRow LastCol SCXW154924458 BCX0\" role=\"columnheader\" data-celllook=\"4369\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow: visible; vertical-align: middle; position: relative; background-color: transparent; background-clip: padding-box; border: 1px solid rgb(128, 128, 128); width: 96px;\" data-colwidth=\"92\"><div><div><div><p>Portée : E1\_</p><p>Durée : ?\_</p></div></div></div></td></tr><tr><td class=\"FirstCol LastCol LastRow SCXW154924458 BCX0\" role=\"rowheader\" data-celllook=\"4369\" colspan=\"4\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; overflow: visible; vertical-align: top; position: relative; background-color: transparent; background-clip: padding-box; border: 1px solid rgb(128, 128, 128); width: 546px;\" data-colwidth=\"211,85,70,92\"><div><div><div><p>– Effet : invoque un [nom de la créature en question] qui…\_</p><p>Caractéristiques, particularité\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_</p></div><div><p>– Source : un H-R compètent et ambitieux\_</p></div></div></div></td></tr></tbody></table></div><div class=\"OutlineElement Ltr SCXW154924458 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; clear: both; cursor: text; overflow: visible; position: relative; direction: ltr; color: rgb(0, 0, 0); font-family: 'Segoe UI', 'Segoe UI Web', Arial, Verdana, sans-serif; font-size: 12px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-weight: 400; letter-spacing: normal; orphans: 2; text-align: start; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: normal; background-color: rgb(255, 255, 255); text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial;\"><div class=\"TableContainer Ltr SCXW154924458 BCX0\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 2px 0px; padding: 0px; user-select: text; overflow: visible; position: relative; display: flex; justify-content: flex-start;\"><div id=\"{2e300449-19dc-4468-b8dd-063524659422}{23}\" class=\"WACAltTextDescribedBy SCXW154924458 BCX0\" aria-hidden=\"true\" style=\"-webkit-user-drag: none; -webkit-tap-highlight-color: transparent; margin: 0px; padding: 0px; user-select: text; position: absolute; visibility: hidden; z-index: -100;\"><p></p></div></div></div><div><p></p><div><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Investigations</span></strong></span> : en lançant ce rituel sur une case en TMR, le H-R apprendra\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>La direction vers la case cherchée (N, S-E, W…)\_</p><div><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Si la case est de même nature que celle cherchée\_</p><div><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Si la terre médiane touche celle recherchée et laquelle\_</p><div><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span><strong>Sur la case spécifique</strong> : obtient toutes les informations nécessaires à la synthèse de l’Invocation, en dépensant un point de Seuil (dépense uniquement à ce dernier rituel)\_</p></div></div></div></div></div></div></div></div><div><div><div><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Echec Total sur le dernier rituel</span></strong></span> : la créature ressemblera à celle désirée mais sans être liée par l’Invocation (pouvant donc être agressive, ou plus subtilement, traitresse ou incompétente)\_</p></div></div><p>En cas d’ET lors de l’investigation, les informations sont fausses\_</p></div><div><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Notes</span></strong></span> : s’il obtient ces informations par un autre moyen (tel un grimoire ou une analyse de sort),\_ le H-R peut se passer de ce rituel pour directement synthétiser l’Invocation.\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_\_</p><p></p><blockquote><p><span style=\"text-decoration: underline;\"><em><span style=\"text-decoration: underline;\">Source</span></em></span><em> : Le Quart-Livre</em>\_</p></blockquote></div>"
