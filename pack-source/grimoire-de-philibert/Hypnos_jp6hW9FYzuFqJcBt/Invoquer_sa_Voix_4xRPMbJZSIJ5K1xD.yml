  description: "<div><p><span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Ce rituel permet de projeter sa voix à distance (parler et non entendre)\_</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Les conditions de ciblage et de paramétrage sont exactement les mêmes que Harpe d’Hypnos\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Lorsque le murmure émane de l’instrument sonore, provoquant l’état hypnotique, le Haut-Rêvant peut commencer à parler mentalement, dans sa tête. Dans l’instant même, sa voix et ses paroles\_ se\_ font\_ entendre\_ près\_ de\_ la\_ personne ou au centre du lieu choisi.\_\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Pour le destinataire, la voix, claire et reconnaissable, semble émaner de nulle part.\_</p><div><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>La communication est de <strong>1 round</strong> <span style=\"text-decoration: underline;\">par point de rêve dépensé</span>.</p></div></div></div></div>"
