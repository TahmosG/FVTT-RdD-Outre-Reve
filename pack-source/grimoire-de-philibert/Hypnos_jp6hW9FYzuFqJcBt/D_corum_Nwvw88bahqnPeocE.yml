  description: "<div><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Effet</span></strong></span> : Cette illusion permet d’agrémenter le lancer du sort ou rituel qui lui sert de support d’effets visuels, sonore, olfactifs.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Les effets peuvent être centrés sur le H-R, la cible du sort support ou aller de l’un vers l’autre.</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\"><span style=\"mso-list:Ignore\"><span style=\"font-family: 'Courier New'\">o\_</span></span>Cette illusion doit être préalablement accompli dans la case TMR (~en reserve) d’où sera lance un sort ou rituel.</p></div><div><p>– <span style=\"text-decoration: underline;\"><strong><span style=\"text-decoration: underline;\">Notes</span></strong></span> : Ces manifestations ne durent qu’un round et n’ont aucune conséquence concrète mais peuvent impressionner les innocents ou les aiguiller sur une mauvaise interprétation des événements.\_</p></div><div><p></p><blockquote><p><span style=\"text-decoration: underline;\"><em><span style=\"text-decoration: underline;\">Source</span></em></span><em> : Glatissante par Udhessi</em>\_</p></blockquote></div>"
