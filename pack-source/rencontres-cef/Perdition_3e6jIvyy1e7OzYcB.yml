    poesie: >-
      <p>La l&eacute;gende affirme que ce sont les Gnomes qui furent les
      premiers haut-r&ecirc;vants. En observant les pierres pr&eacute;cieuses,
      les gemmes qui sont les larmes de joie des Dragons, ils parvinrent
      &agrave; en comprendre la langue. Et l'ayant comprise, ils purent s'en
      servir pour influencer le cours du r&ecirc;ve.</p>
