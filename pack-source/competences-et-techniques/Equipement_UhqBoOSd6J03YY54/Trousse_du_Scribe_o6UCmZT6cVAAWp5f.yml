system:
  description: >-
    <h3>Kit pour Scribe</h3><p>Petite trousse en cuir d'excellente facture
    contentant tout le materiel nécessaire a l'écriture et permettant une
    aisance d'utilisation même au coins du
    feu.</p><h3>Contenu</h3><p>2x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.ckKnviu9SHvWgya0]{Bougie
    de cire (2 heures)} pour les séances nocturnes
    ;</p><p>4x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.hEPimS3H8jihDuUS]{Crayon
    à mine de plomb} et
    2x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.VsjRwh9Z9PMpFKdI]{Craie
    1 bâton} pour les ébauches rapides
    ;</p><p>1x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.XwuLVGasPJXzvC09]{Encre
    20 cl},
    2x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.sSgPT3aKDOZ25svO]{Porte
    plume en bois} et
    3x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.FaNRC7YQzibSdqZU]{Plume
    de fer} pour le vrai travail de caligraphie
    ;</p><p>1x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.ueJnUMLK1vpL8xOB]{Stylet
    de bronze} pour complementer le travail sur
    @UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.KlydiUbayqBgJB6J]{Tablette
    de cire}.</p><h3>En
    Bonus</h3><p>1x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.skTWp8PUgIG2U2ne]{Cire
    à cacheter} pour sceler une lettre ou contrefaire un
    document</p><p>1x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.39iYJ6mJuy3Kno1C]{Poinçon},
    2x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.TY6Ft8a6WfxD6pD9]{Bobineau
    de fil} et
    2x@UUID[Compendium.foundryvtt-reve-de-dragon.equipement.Item.zQWlnUsd8bPySujd]{Aiguille
    à coudre} pour aider au travail de reliure.</p><h3>Notes</h3><p>Son prix de
    base est de 5 Sous, mais pour la maigre somme de <strong>3 Sols</strong>,
    vous y trouverez tout le materiel nécéssaire à un scribe (dont la valeur du
    contenu s'éleve à 2.7 sols, et dont l'Encombrement a été optimisé à 0.5)</p>
