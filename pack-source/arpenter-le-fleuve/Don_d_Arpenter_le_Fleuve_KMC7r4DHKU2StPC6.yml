  description: "<p><span lang=\"FR\" style=\"mso-ansi-language:FR\">Le </span>@UUID[Compendium.a-perte-de-reve.outre-reve-journal.JournalEntry.UWiZQyq5p4Rtg9BX.JournalEntryPage.IHLn7NsKBvLWc0jN]{Don d'Arpenter le Fleuve}<span lang=\"FR\" style=\"mso-ansi-language:FR\"> a la particularité de débloquer deux facultés à son possesseur\_:</span></p><p></p><p>==&gt; 1. @UUID[Compendium.a-perte-de-reve.outre-reve-journal.JournalEntry.Xa0hLpn21oWzdlvX]{Compétence d'Arpenter le Fleuve},</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\">.   Création et manipulation de Déchirures Bleues, permettant de se déplacer au sein du même rêve, en passant par ce lieu hâtivement nommé «\_le Fleuve\_».</p><p></p><p>==&gt; 2. @UUID[Compendium.a-perte-de-reve.outre-reve-journal.JournalEntry.ElkVyIa7SKdLKlSo]{Acces à la Carte des Eaux du Fleuve [CEF]}</p><p class=\"BulletCxSpMiddle\" style=\"margin-left: 30pt; mso-add-space: auto; text-indent: -.25in; mso-list: l0 level2 lfo1\">.   Tandis que les TMR permettent au Haut-Rêvants de s’élever vers la conscience des Dragons, la CEF les plonge dans la profondeur du Fleuve, plus proche de leur inconscient et de la source générative du Rêve.</p>"
