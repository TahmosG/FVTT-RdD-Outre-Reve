name: Monter lire un Signe
type: script
command: |-
  let selected = game.system.rdd.RdDUtility.getSelectedActor();
  if (!selected) {
    ui.notifications.info('Pas de personnage sélectionné');
    return;
  }
  if (!selected.isHautRevant()) {
    ui.notifications.info(`Le personnage ${selected.name} n'a pas le don de haut-rêve`);
    return;
  }
  let signe_dispo = selected.itemTypes['signedraconique']
  if (signe_dispo == 0 || signe_dispo == undefined){
     ui.notifications.error("pas de signe disponible");   return;
  }else{
    for (let i = 0; i < signe_dispo.length; i++){
      ui.notifications.info(`Signe Draconique dispobible en: ${signe_dispo[i].system.typesTMR}`);}
  }

  //selected.displayTMR("rapide");
  selected.rollLireSigneDraconique(selected.system.reve.tmrpos.coord);
