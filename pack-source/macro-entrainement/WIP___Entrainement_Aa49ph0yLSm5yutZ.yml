command: |-
  let selected = game.system.rdd.RdDUtility.getSelectedActor();


  // WIP: --> hook dans la fenetre de jet de competence???

  const dialogEntrainement = await new Dialog({
    title: `Entrainement`,
    content: `${selected.name} entamme un entrainement en...`,
    buttons: [{ 
       label: `Commencer l'Entrainement`, 
       icon: `<img src="icons/skills/movement/arrows-up-trio-red.webp" alt="..."/>`,
       callback: () => monEntrainement()//selected.rollMeditation(med_dispo[0].id)
    }]
  }).render(true)

  let duree = 10; // 1d6 jet par heure d'Entrainement
  let reussitePart = 9; //en %
  let echecTot = 95 ; //en %

  async function monEntrainement(){
    let r = new Roll(`(${duree}d6)d100cf>=${echecTot}cs<=${reussitePart}`, {});
    await r.evaluate();
    let details = await r.render();

    ChatMessage.create ({
      content : `- Duree d'entrainement : ${duree} heures
             <br>- Chances de réussite : ${reussitePart}%
             <br>${details}
             <br>--> ${duree * 2}pts de Fatigue et risque de Maladresse ^^
             <br>--> Gain de ${r.result}xp en COMPETENCE.`,
      flavor : "C'est dans la sueur que le voyageur fraie son chemin.", 
      //roll: `${r.result}`
    });
  }
