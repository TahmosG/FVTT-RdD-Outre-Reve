name: Release Creation

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Extracts the version number from the Git tag (e.g. v13.0.0 -> 13.0.0)
      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Compiles compendium packs from pack-source/ (YAML, source of truth) into
      # packs/ (binary, build output - gitignored, never committed). Only packs
      # declared in module.json's "packs" array are built, so WIP pack-source/
      # folders not yet listed there (e.g. work-in-progress content) are never
      # shipped - no separate exclude-list to maintain.
      - name: Install Foundry CLI
        run: npm install -g @foundryvtt/foundryvtt-cli@3.0.4

      - name: Build compendium packs from source
        run: |
          for name in $(jq -r '.packs[].name' module.json); do
            echo "==> Packing $name"
            fvtt package pack -n "$name" --in "pack-source/$name" --out packs --yaml --recursive
          done

      # Overwrites version & download keys in module.json to match this release
      - name: Update Manifest
        run: |
          jq '.version = "${{ steps.get_version.outputs.VERSION }}" | .download = "https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.VERSION }}/module.zip"' module.json > temp.json && mv temp.json module.json

      # Commits the updated module.json to main before building the release,
      # so main and the shipped release always match
      - name: Sync manifest to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.json
          git commit -m "release ${{ steps.get_version.outputs.VERSION }}"
          git push origin HEAD:main

      # Zips up the clean repository files (excluding internal git configuration
      # and the YAML dev source, which isn't needed at runtime)
      - name: Package Module
        run: zip -r module.zip . -x ".git/*" -x ".github/*" -x "pack-source/*"

      # Creates the GitHub Release and uploads the manifest + zip archive
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.get_version.outputs.VERSION }}
          files: |
            module.json
            module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
